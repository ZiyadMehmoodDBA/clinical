<div id="pnlPMSScheduler_AppointmentCancellation">
    <div id="actionPanPMSScheduler_AppointmentCancellation" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-smd">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="PMSScheduler_AppointmentCancellation.UnLoad();">
                    <span class="red">&nbsp;</span><span class="sr-only">Close</span>
                </button>
                <h4 id="headingTitle" class="modal-title">Cancel Reason</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmAppointmentCancellation" onsubmit="return false">
                    <div class="col-sm-12">
                        <label for="Description" class="control-label">Description<span class="required">*</span></label>
                        <textarea class="edit form-control" rows="3" id="CancellationReason" spellcheck="true" name="Description" maxlength="55" autofocus></textarea>
                    </div>
                    <div class="col-sm-2 col-md-3 pull-right pad-a-labelsize-btn">
                        <button id="Save_Exit" class="btn btn-primary btn-sm pull-right" type="submit">Save & Exit</button>
                    </div>
                    
                    <div class="clearfix"></div>
                 </form>
            </div>

        </div>
    </div>

</div>
