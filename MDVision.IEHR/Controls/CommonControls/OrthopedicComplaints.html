<div id="pnlOrthopedicComplaints">
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content  !important">
            <div class="modal-header hidden">
                <button type="button" class="close" onclick="OrthopedicComplaints.UnLoad()"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Add Complaints for Neck</h4>
            </div>
            <div class="modal-body p-none">
                <form method="post" id="frmOrthopedicComplaints" onsubmit="return false">
                    <div class="panel-sign">
                        <div class="ortho-complaint-heading" id="complaint_title"></div>
                        <div class="ortho-complaint-body">
                            <div class="ortho-left pull-left">
                                <ul id="ul_complaints" class="height-max200  own-scroll"> </ul>
                            </div>
                            <div class="ortho-right pull-left">
                                <textarea id="txtOrthoComplaints" spellcheck="true"></textarea>
                            </div>
                            <div class="clearfix"></div>
                            <div class="ortho-buttons">
                                <button class="btn btn-primary btn-sm" id="btnClear" onclick="OrthopedicComplaints.Clear()" type="button">Clear</button>
                                <button class="btn btn-primary btn-sm" id="btnOK" onclick="OrthopedicComplaints.OK()" type="button">OK</button>
                                <button class="btn btn-primary btn-sm" id="btnCancel" onclick="OrthopedicComplaints.UnLoad()" type="button">Cancel</button>
                                <button class="btn btn-primary btn-sm" id="btnAddNew" onclick="OrthopedicComplaints.AddNew()" type="button">Add New</button>
                            </div>
                        </div>

                        <div class="clearfix"></div>
                    </div>
                </form>
            </div>
        </div>
        <div class="clearfix"></div>
    </div>
</div>
