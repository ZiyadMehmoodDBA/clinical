
<div id="pnlUserReLogin">
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">Session Timeout</h4>
            </div>
            <div class="modal-body p-none">
                <form role="form" method="post" onsubmit="return false" id="frmUserReLogin">
                    <div class="sessionTimeout">
                        <header>
                            <p class="text-bold">Your session is about to expire in:</p>
                        </header>
                        <section>
                            <h1 class="timer"><b id="digit">30</b> <small>Sec.</small></h1>
                        </section>
                        <footer>
                            <p class="text-bold">Do you want to stay signed in?</p>
                            <div class="spacer15"></div>
                            <div class="text-center pr-default">
                                <button class="btn btn-default btn-sm" type="button" onclick="UserReLogin.LogInUser();">Yes, stay signed in</button>
                                <button class="btn btn-danger btn-sm" type="button" onclick="UserReLogin.LogOutUser();">No, sign me out</button>
                            </div>
                            <div class="spacer15"></div>
                        </footer>

                    </div>

                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
    <!--/Session Timeout-->

    <div class="clearfix"></div>
</div>
