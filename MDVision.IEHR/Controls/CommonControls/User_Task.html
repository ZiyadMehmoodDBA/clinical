<div id="pnlUserTask" style="display:none;" class="row">
    <div id="actionPanUserTask" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="User_Task.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">User Tasks</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" id="btnUserTaskAdd" class="btn btn-success btn-sm" onclick="User_Task.UserTaskAddEdit('-1', 'Add');"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <form method="post" id="frmUserTask" onsubmit="return false" style="display:none">
                        <section class="panel panel-featured mb-none">
                            <div class="panel-body">
                                <div class="form-group">
                                    <div class="col-sm-2">
                                        <label class="control-label">Type</label>
                                        <select class="form-control" id="ddlType" ddlist="GetMessageType"></select>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label" for="Status">Status</label>
                                        <select class="form-control" id="ddlStatus" ddlist="GetMessageStatus"></select>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Called Date</label>
                                        <div class="input-group">
                                            <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                            <input type="text" id="dtpCalledDate" data-plugin-datepicker="" class="form-control" autocomplete="off">
                                        </div>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Entry Date</label>
                                        <div class="input-group">
                                            <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                            <input type="text" id="dtpEntryDate" data-plugin-datepicker="" class="form-control" autocomplete="off">
                                        </div>
                                    </div>
                                    <div class="pull-right pt-md pr-default">
                                        <button class="btn btn-primary btn-sm" id="btnUserTaskSearch" type="button" onclick="Patient_Message.SearchPatientMessage();">Search</button>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>
                <div class="spacer5"></div>
                <div id="pnlUserTask_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <input type="hidden" id="UserTask_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvUserTask">
                                <thead>
                                    <tr>
                                        <th style="display:none;">PatientMessageId</th>
                                        <th id="ColumnAction" class="size95 size-min100">Action</th>
                                        <th class="size120">Message</th>
                                        <th class="size120">Status</th>
                                        <th class="size120">Type</th>
                                        <th class="size120 noWordBreak">Assigned To</th>
                                        <th class="size120 noWordBreak">Entered By</th>
                                        <th class="size120 noWordBreak">Entry Date</th>
                                    </tr>
                                </thead> 
                                <tbody></tbody>
                            </table>
                            <div id="divUserTaskPaging"></div>
                        </div>
                    </section>
                </div>
            </div>

        </div>
    </div>
</div>
<script type="text/javascript">
    (function ($) {

        'use strict';

        if ($.isFunction($.fn['tooltip'])) {
            $('[data-toggle=tooltip],[rel=tooltip]').tooltip({ container: 'body' });
        }

    }).apply(this, [jQuery]);


    $(document).ready(function () {

        //initialization of date-pickers.
        utility.CreateDatePicker('pnlUserTask #dtpCalledDate,#dtpStartDate', function () {
            //on-change callback method
        });

      
    });
</script>
