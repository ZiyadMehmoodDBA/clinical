<div class="row" id="pnldashboardchangepass" style="display:none;">
    <div id="actionPanDashboardboardchangepass" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="DashBoardChangePwd.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Change Password</h4>
            </div>
            <div class="modal-body">
                <form method="post" onsubmit="return false" id="frmdashboardchangepass">
                    <div class="form-group">
                        
                        <div class="col-xs-12">
                            <label class="control-label">Old Password<span id ="oldpswrd" class="required">*</span></label>
                            <input type="password" class="form-control password" id="txtoldpwd" name="oldpwd" maxlength="50" onchange="DashBoardChangePwd.EnableValidation();">
                        </div>
                        <div class="col-xs-12">
                            <label class="control-label">New Password<span class="required">*</span></label>
                            <input type="password" class="form-control password" id="txtnewpwd" name="newpwd" maxlength="50">
                        </div>
                        <div class="col-xs-12">
                            <label class="control-label">Confirm Password<span class="required">*</span></label>
                            <input type="password" class="form-control password" id="txtconpwd" name="conpwd"  maxlength="50">
                        </div >
                        <div class="col-xs-12 mt-sm">
                            <button type="submit" class="btn btn-primary btn-sm rightbtn">Change password</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
