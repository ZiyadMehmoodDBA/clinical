<div id="pnlScheduling_CheckInReason">
    <div id="actionPanScheduling_CheckInReason" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Scheduling_CheckInReason.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Check in reason</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmScheduling_CheckInReason" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-sm-12 col-md-12">
                            <label for="reason" class="control-label">Reason<span class="required">*</span></label>
                            <textarea class="form-control" rows="5" maxlength="2500" id="txtCheckInReason" name="CheckInReason" spellcheck="true"></textarea>
                        </div>
                        <div class="col-sm-3 pull-right mt-md mb-md">
                            <button class="btn btn-primary btn-sm rightbtn" type="submit" id="btnSave">Save</button>
                        </div>
                    </div>
                    <div class="clearfix"></div>
                </form>
            </div>
        </div>
    </div>
</div>
