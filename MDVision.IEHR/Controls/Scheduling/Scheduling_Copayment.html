<div class="row" id="schcopayment" style="display:none;">
    <div id="actionPanCopayment" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="schcopayment.UnLoad();"><span class="red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Copayment</h4>
            </div>
            <div class="modal-body">
                <div class="form-group" id="copaymentpanel">
                    <form method="post" onsubmit="return false" id="frmCopayment">
                        <div class="form-group">

                            <div class="col-sm-4 col-md-3">
                                <label class="control-label" for="Payment Type">Payment Type</label><span class="required">*</span>
                                <select id="ddlPaymentType" class="form-control" ddlist="GetPaymentType" name="PaymentType"></select>

                            </div>
                            <div class="col-sm-4 col-md-3">
                                <label class="control-label">Date Paid</label><span class="required">*</span>
                                <div class="input-group">
                                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                    <input type="text" name="DatePaid" data-plugin-datepicker="" class="form-control" id="dpDatePaid">
                                </div>
                            </div>

                            <div id="divAdvancePayment" class="col-sm-4  col-md-3" style="display:none;">
                                <label id="lblAdvancePayment" for="AdvancePayment" class="control-label">Advance Payment<span class="required">*</span></label>
                                <!--<a id="lnkAdvancePaymentEdit" style="display:none;" href="#" onclick="" title="Edit Advance Payment">Advance Payment<span class="required">*</span></a>-->
                                <div class="input-group">
                                    <input class="form-control" id="txtAdvancePayment" name="AdvancePayment" placeholder="" type="text" onblur="utility.ValidateAutoComplete(this, 'hfAdvancePaymentId', false); ">
                                    <div class="input-group-btn">
                                        <button id="lnkAdvancePayment" class="btn btn-primary btn-xs " type="button" onclick="schcopayment.OpenAdvancePayment();"><i class="fa fa-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div class="pull-right pl-sm" id="divAdvanceBalance">
                                <span>Advance Balance: <i class="fa fa-dollar text-success"></i></span>
                                <span class="text-success" id="lblAdvanceBalance">00.00</span>
                            </div>

                            <!--<div class="col-sm-3 pad-a-labelsize">
                                <div class="radio-custom radio-dafault">
                                    <input type="radio" id="rdPCP" name="SpecialistPCP">
                                    <label class="control-label" for="PCP">PCP</label>
                                </div>
                            </div>
                            <div class="col-sm-3 pad-a-labelsize">
                                <div class="radio-custom radio-dafault">
                                    <input type="radio" id="rdSpecialist" name="SpecialistPCP">
                                    <label class="control-label" for="Specialist">Specialist</label>
                                </div>
                            </div>-->

                        </div>

                        <div class="form-group">

                            <div class="col-sm-4 col-md-3" id="divCheckNumber">
                                <label class="control-label" for="Check Number">Check Number</label>
                                <input type="text" class="form-control" name="CheckNumber" id="txtCheckNumber">
                            </div>
                            <div class="col-sm-4 col-md-3" id="divCheckDate">
                                <label class="control-label">Check Date</label>
                                <div class="input-group">
                                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                    <input type="text" name="CheckDate" data-plugin-datepicker="" class="form-control" id="dpCheckDate">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-4 col-md-3" id="divCreditCadType">
                                <label class="control-label" for="Payment Type">Card Type</label>
                                <select name="creditCardType" id="ddlCardType" class="form-control" ddlist="GetCreditCardType"></select>

                            </div>
                            <div class="col-sm-4 col-md-3" id="divCardNumber">
                                <label class="control-label" for="Card Number">Card Number</label>
                                <input type="text" class="form-control" name="CardNumber" id="txtCardNumber" maxlength="16">
                            </div>
                            <div class="col-sm-4 col-md-3" id="divExpiryDate">
                                <label class="control-label" for="Cheque Date">Expiry Date (mm/yyyy)</label>
                                <div class="input-group">
                                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                    <input type="text" data-plugin-datepicker="" name="ExpiryDate" class="form-control" id="dpExpiryDate">
                                </div>
                            </div>

                        </div>
                        <div class="clearfix"></div>
                        <div class="form-group">
                            <div class="col-sm-4 col-md-3">
                                <div class="row">
                                    <div class="col-xs-5">
                                        <label for="Paid" class="control-label">Paid</label>
                                        <div class="input-group">
                                            <div class="input-group-addon"><i class="fa fa-dollar"></i></div>
                                            <input class="form-control" name="Paid" id="txtPaid" type="text" maxlength="10" placeholder="99999.99">
                                        </div>
                                    </div>
                                    <div class="col-xs-7">
                                        <label class="control-label">Paid A/C</label>
                                        <select id="ddlPaidLedger" name="PaidAC" class="form-control "></select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-4 col-md-3">
                                <div class="row">
                                    <div class="col-xs-5 pl-md pr-xs">
                                        <label for="Discount1" class="control-label">Discount</label>
                                        <div class="input-group">
                                            <div class="input-group-addon"><i class="fa fa-dollar"></i></div>
                                            <input class="form-control" id="txtDiscount" name="Discount" type="text" maxlength="10" placeholder="99999.99">
                                        </div>
                                    </div>
                                    <div class="col-xs-7 pr-md pl-xs">
                                        <label class="control-label">Discount A/C</label>
                                        <select id="ddlDiscountLedger" class="form-control " name="DiscountAC"></select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-4 col-md-3">
                                <label for="Balance" class="control-label">Balance</label>
                                <input class="form-control" id="txtBalance" name="Balance" type="text" disabled>
                            </div>
                            <div class="pull-right mt-md">
                                <button id="btnsave" class="btn btn-primary btn-sm rightbtn" type="submit">Save</button>
                                <button id="btnsaveExit" class="btn btn-primary btn-sm rightbtn" type="submit" onclick="schcopayment.SaveAndExit(event)">Save & Exit</button>
                            </div>
                            <span class="spacer10"></span>
                            <div class="col-sm-9">
                                <div class="pull-left mr-md">
                                    <label class="control-label">Comments</label>
                                </div>
                                <textarea class="form-control" rows="2" maxlength="2500" id="txtComments" name="Comments" spellcheck="true"></textarea>
                            </div>
                            <div class="pull-right pl-sm pr-default" id="divCopayBalance">
                                <label class="control-label" for="Copay Paid">Total Paid: <i class="fa fa-dollar"></i></label>
                                <label class="control-label" id="lblTotalPaid" for="00.00">00.00</label>
                                <span class="clearfix"></span>
                                <label class="control-label" for="Copay Discount">Total Discount: <i class="fa fa-dollar"></i></label>
                                <label class="control-label" id="lblTotalDiscount" for="00.00">00.00</label>
                            </div>
                            <span class="spacer10"></span>

                        </div>

                        <div class="clearfix"></div>
                        <input type="hidden" id="txtAccountNo" />
                        <input type="hidden" id="hfAppointmentId" />
                        <input type="hidden" id="hfPatientId" />
                        <input type="hidden" id="hfProviderId" />
                        <input type="hidden" id="hfFacilityId" />
                        <input type="hidden" id="hfAdvancePaymentId" value="" />
                    </form>
                    <div class="pull-right pr-default"><button id="btnPrint" type="button" class="btn btn-primary btn-sm pb-tiny" onclick="schcopayment.GetALLCheckedRecipts()" disabled >Print</button></div>
                    <div class="spacer10"></div>
                    <div id="pnlCopayment_Result" style="display: none;">

                                            <th class="size50 text-center va-middle">Entered By</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>
