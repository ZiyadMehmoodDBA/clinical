<div id="multipleViewGroupDetail">
    <div id="actionPanMultipleViewGroupDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="multipleViewGroupDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Schedule Group</h4>
            </div>
            <div class="modal-body">
                <div class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmMultipleViewGroupDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-sm-2">
                                <label class="control-label">Short Name</label><span class="required">*</span>
                                <input class="form-control" id="txtShortName" name="ShortName" type="text" maxlength="10" />
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Description</label>
                                <input class="form-control" id="txtDescription" name="Description" type="text" maxlength="55" />
                            </div>
                            <div id="divMultipleView_Entity" class="col-sm-4">
                                <label class="control-label">Entity<span class="required">*</span></label>
                                <select id="ddlEntity" class="form-control " name="Entity" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-sm-1 pad-a-labelsize" id="pnlIsActive">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Active" checked="" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>

                            <div class="col-sm-1 mt-md pull-right">
                                <button class="btn btn-primary btn-sm rightbtn" type="submit" id="btnMultpleSave">Save</button>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                        <div class="spacer20"></div>
                        <div id="pnlSchGroup">
                            <div class="col-md-6 panel">
                                <!--<header class="panel-blue col-md-12">
                                    <span class="col-md-2">Provider</span>
                                    <span class="col-md-2">Facility</span>
                                    <span class="col-md-2">From Date</span>
                                    <span class="col-md-2">To Date</span>
                                    <span class="col-md-2">From Time</span>
                                    <span class="col-md-2">To Time</span>
                                </header>-->
                                <div class="panel-body NoRadiusT p-none" id="pnlProvider">

                                </div>
                            </div>
                            <div class="col-md-6 panel">
                                <!--<header class="panel-blue col-md-12">
                                    <span class="col-md-2">Resource</span>
                                    <span class="col-md-2">Facility</span>
                                    <span class="col-md-2">From Date</span>
                                    <span class="col-md-2">To Date</span>
                                    <span class="col-md-2">From Time</span>
                                    <span class="col-md-2">To Time</span>
                                </header>-->
                                <div class="panel-body p-none NoRadiusT" id="pnlResources">
                                </div>
                            </div>
                        </div>
                        <div class="clearfix"></div>

                    </form>
                    <div class="clearfix"></div>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
