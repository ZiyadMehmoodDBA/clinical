<div id="pnlRescheduleAppointment">
    <div id="actionPanRescheduleAppointment" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog" class="modal-dialog modal-dialog-sm">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Scheduling_RescheduleAppointment.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Reschedule Appointment</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <form method="post" id="frmRescheduleAppointment" onsubmit="return false">
                        <section class="panel panel-featured">
                            <div class="panel-body" id="">
                                <div class="form-group">
                                    <div class="col-sm-6">
                                        <label class="control-label">To Date</label>
                                        <div class="input-group">
                                            <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                            <input type="text" data-plugin-datepicker="" maxlength="10" class="form-control" name="ToDate" id="dpToDate" >
                                        </div>
                                    </div>
                                    <div class="col-sm-6" id="divTimeOneTime">
                                        <label class="control-label" for="Block Reason">To Time<span class="required">*</span></label>
                                        <div class="input-group">
                                            <span class="input-group-addon"> <i class="fa fa-clock-o"></i> </span>
                                            <input type="text" class="form-control" data-plugin-timepicker id="ddlToTime" name="ToTime">
                                        </div>
                                    </div>
                                    <div class="">
                                        <button class="btn btn-primary btn-sm rightbtn" id="btnRescheduleAppointment" type="submit" onclick="">Reschedule</button>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>
                <div class="spacer10"></div>
            </div>

        </div>
    </div>

</div>
