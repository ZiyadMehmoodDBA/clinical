<div id="Unallocated_CopaymentView">
    <div id="actionPanUnallocatedCopayView" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Unallocated_CopaymentView.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Print Preview Copay Receipt</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <section class="panel">
                        <form method="post" id="frmUnallocatedCopaymentView" onsubmit="return false">
                            <div id="pnlNotes_Search">
                                <div class="btn-block">
                                    <div class="pull-left">
                                        <button id="btnReceiptPrint" type="button" class="btn btn-success btn-xs ml-xs" onclick="Unallocated_CopaymentView.PrintReceipt();"><i class="fa fa-print"></i> Print</button>
                                    </div>
                                </div>
                                <div class="spacer15"></div>
                                <div class="panel-body" id="PrintPdfControlDiv" style="display:block;">
                                    <input type="hidden" id="helperPDF" />
                                    <iframe id="PreviewPrintReceipt" src="Scripts/js/pdf/web/viewer.html" class="col-sm-12" style="height:1066px;"></iframe>
                                </div>

                                <script>
                                    kendo.pdf.defineFont({
                                        "DejaVu Sans": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans.ttf",
                                        "DejaVu Sans|Bold": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Bold.ttf",
                                        "DejaVu Sans|Bold|Italic": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Oblique.ttf",
                                        "DejaVu Sans|Italic": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Oblique.ttf"
                                    });
                                </script>

                                <div id="printcall" style="display:none;">
                                    <div id="PatientInfo" style="border:2px solid #000;padding:8px;" class="">
                                        <div class="col-sm-8 col-lg-2 pull-left">
                                            <img src="content/images/SHS-final-logo.png" class="img-responsive">
                                        </div>
                                        <ul class="list-unstyled pull-right col-sm-4 line-height-fix" id="PracticeList">
                                            <li id="PracticeName"></li>
                                            <li id="PracticeAddress"></li>
                                            <li id="PracticeCity"></li>
                                            <li id="PracticeContact"></li>
                                            <!--<li class="text-right"><div id="PracticePhone"></div><div id="PracticeFax"></div></li>-->
                                        </ul>
                                        <div class="clearfix"></div>
                                        <div class="splitter m-none mt-xs" style="background: #000;height:2px;"></div>
                                        <div class="col-xs-12"> <h5 class="text-center"><b>Receipt Of Payment</b></h5></div>

                                        <ul class="list-unstyled col-xs-6" id="PatientList">
                                            <li><div class="col-xs-4">Patient Account:</div><div id="PatientAccount" class="col-xs-8 borderB borderBlack"> </div></li>
                                            <li><div class="col-xs-4"> Patient Name: </div><div id="PatientName" class="col-xs-8 borderB borderBlack">  </div></li>
                                            <li><div class="col-xs-4"> Amount Paid: </div><div id="AmountPaid" class="col-xs-8 borderB borderBlack">  </div></li>
                                            <li><div class="col-xs-4"> Payment Type: </div><div id="PatientType" class="col-xs-8 borderB borderBlack">  </div></li>

                                        </ul>

                                        <ul class="list-unstyled col-xs-6" id="ReceiptList">
                                            <li><div class="col-xs-4">Appointment Date: </div> <div id="AppointmentDate" class="col-xs-8 borderB borderBlack"></div></li>
                                            <li><div class="col-xs-4">Receipt Date:</div> <div id="ReceiptDate" class="col-xs-8 borderB borderBlack">  </div></li>
                                            <li><div class="col-xs-4">Receipt Number:</div> <div id="ReceiptNumber" class="col-xs-8 borderB borderBlack">  </div></li>
                                        </ul>
                                        <div class="col-xs-12 pl-lg"><h5><b>Charges Details</b></h5></div>
                                        <table id="tblCharges" class="table table-bordered borderBlack" style="width:70%;margin-left:15%;border-spacing: 0 !important;border-collapse: collapse !important;">
                                            <thead>
                                                <tr class="noBg" style="color: black;">
                                                    <th>Date</th>
                                                    <th>Description</th>
                                                    <th>Payment</th>

                                                </tr>
                                            </thead>
                                            <tbody></tbody>
                                        </table>
                                        <table style="width:100%;margin-top: 30px;">
                                            <tbody>
                                                <tr>
                                                    <td style="width: 60%;">
                                                        <div class="col-xs-2"><b>Provider:</b></div>
                                                        <div id="ProviderName" class="col-xs-10"></div>

                                                        <div class="col-xs-2"><b>Facility:</b></div>
                                                        <div class="col-xs-10">
                                                            <ul class="list-unstyled">
                                                                <li id="FacilitytName"></li>
                                                                <li id="FacilityAddress"></li>
                                                                <li id="FacilityCity"></li>
                                                                <li id="FacilityContact"></li>
                                                            </ul>

                                                        </div>
                                                    </td>
                                                    <td style="width: 40%;">
                                                        <div><b>Comments</b></div>
                                                        <textarea id="Comments" class="form-control borderBlack" rows="4" spellcheck="true"></textarea>
                                                        <p><b>Processed By:</b><span id="ProcessedBy"></span></p>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
