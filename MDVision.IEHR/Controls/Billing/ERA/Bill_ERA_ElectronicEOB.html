<div id="pnlElectronicEOB">
    <div id="actionPanElectronicEOB" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog-full modal-dialog modal-dialog-lg">
        <div class="modal-content">
            <div class="modal-header" style="">
                <button type="button" class="close" onclick="Bill_ERA_ElectronicEOB.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">View Electronic EOB Report</h4>
            </div>

            <div class="modal-body">

                <form method="post" id="frmElectronicEOB" onsubmit="return false">
                    <div id="ReportDetails" class="col-xs-12">
                        <div class="col-xs-12">
                            <a id="aPatientDemographic" class="btn btn-success btn-xs" onclick="Bill_ERA_ElectronicEOB.OpenPatientDemographic();">Patient Demographics</a>
                            <a id="aPaymentPosting" class="btn btn-success btn-xs" onclick="Bill_ERA_ElectronicEOB.OpenPaymentPosting();"><i class="fa fa-dollar"></i> Payments</a>
                            <a id="aHistory" class="btn btn-success btn-xs" onclick="Bill_ERA_ElectronicEOB.ShowHistory('pnlEncounterChargeCapture');"><i class="fa fa-history"></i> History</a>
                            <button class="btn btn-primary btn-sm mb-md pull-right" id="printMe" onclick="Bill_ERA_ElectronicEOB.PrintReport();">
                                <i class="fa fa-print"></i> Print Report
                            </button>
                        </div>
                        <div class="clearfix"></div>
                        <div id="reportTable" class="Of-a">
                            <pre id="txtHTMLView" name="htmlView" class="pl-xlg" style="height:885px"></pre>
                        </div>
                    </div>
                    <div class="clearfix"></div>
                </form>


            </div>

        </div>
    </div>
</div>
