<div class="row" id="pnlBillFollowUpInsuranceAR" style="display:none;">
    <div id="actionPanBillFollowUpInsuranceAR" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">

        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Bill_FollowUpInsuranceAR.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Insurance AR</h2>
            </header>
            <div class="panel-body" id="pnlReason_Search">
                <form method="post" id="frmFollowUpInsuranceAR" onsubmit="return false">
                    <div class="form-group">

                        <div class="col-sm-2">
                            <label class="control-label" for="Entity">Group</label>
                            <select id="ddlGroup" name="GroupID" class="form-control" ddlist="GetFollowUpARGroup"></select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label" for="Entity">Action</label>
                            <select id="ddlAction" name="ActionID" class="form-control" ddlist="GetFollowUpAction"></select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label" for="Entity">Reason</label>
                            <select id="ddlReason" name="Reason" class="form-control" ddlist="GetFollowUpReasons"></select>
                        </div>

                        <!--div class="col-sm-2">
                            <label class="control-label">Insurance Plan</label>
                            <select id="ddlInsurancePlan" name="InsurancePlan" class="form-control" ddlist="GetInsurancePlan"></select>
                        </div>-->

                        <div class="col-sm-2" id="DivPatientInsuranceAutoComplete" style="display:inline">
                            <label id="lblInsurancePlan" class="control-label">Insurance Plan</label>
                            <a id="lnkInsurancePlanDetail" style="display:none;" href="#" onclick="Bill_FollowUpInsuranceAR.OpenInsurancePlanDetail();" title="Edit Insurance Plan">Insurance Plan</a>
                            <div class="input-group">
                                <input class="form-control" type="text" id="txtInsurancePlan" name="InsurancePlan" placeholder="Start typing to search" />
                                <div class="input-group-btn">
                                    <button class="btn btn-primary btn-xs " type="button" onclick="Bill_FollowUpInsuranceAR.OpenInsurancePlan();"><i class="fa fa-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label" for="Patient Account">Patient Account</label>
                            <div class="input-group">
                                <input class="form-control" id="txtPatientName" name="PatientAccount" type="text" />
                                <div id="divSearchPatient" class="input-group-btn">
                                    <button id="lnkPatientAccount" type="button" class="btn btn-primary btn-xs" onclick="Bill_FollowUpInsuranceAR.OpenPatientSearch();"><i class="fa fa-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label id="lblFacility" for="Facility" class="control-label">Facility</label>
                            <a id="lnkFacilityEdit" style="display:none;" href="#" onclick="Bill_FollowUpInsuranceAR.OpenFacilityDetail();" title="Edit Facility">Facility</a>
                            <div class="input-group">
                                <input class="form-control" id="txtFacility" name="Facility" placeholder="Start typing to search" type="text" />
                                <div class="input-group-btn">
                                    <button id="lnkFacility" class="btn btn-primary btn-xs " type="button" onclick="Bill_FollowUpInsuranceAR.OpenFacility();"><i class="glyphicon glyphicon-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label id="lblProvider" class="control-label">Provider</label>
                            <a id="lnkProviderEdit" style="display:none;" href="#" onclick="Bill_FollowUpInsuranceAR.OpenProviderDetail();" title="Edit Provider">Provider</a>
                            <div class="input-group">
                                <input type="text" class="form-control" id="txtProvider" name="Provider" placeholder="Start typing to search" />
                                <div class="input-group-btn">
                                    <button id="lnkProvider" class="btn btn-primary btn-xs " type="button" onclick="Bill_FollowUpInsuranceAR.OpenProvider();"><i class="glyphicon glyphicon-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label" for="Case Number">Claim Number</label>
                            <div class="input-group">
                                <input class="form-control" id="txtClaimno" name="ClaimNumber" type="text" />
                                <div id="divSearchClaim" class="input-group-btn">
                                    <button id="lnkClaimNumber" type="button" class="btn btn-primary btn-xs" onclick="utility.OpenPatientCharges('billTabFollowUpInsuranceAR');"><i class="fa fa-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">DOS From</label>
                            <div class="input-group">
                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                <input type="text" name="DatePaidFrom" data-plugin-datepicker="" class="form-control" id="dpDOSFrom" autocomplete="off">
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">DOS To</label>
                            <div class="input-group">
                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                <input type="text" name="DatePaidTo" data-plugin-datepicker="" class="form-control" id="dpDOSTo" autocomplete="off">
                            </div>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Last Name</label>
                            <input class="form-control" id="txtLastName" name="LastName" type="text">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">First Name</label>
                            <input class="form-control" id="txtFirstName" name="FirstName" type="text">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Suspend</label>
                            <select id="ddlSuspended" name="Suspend" class="form-control">
                                <option value="" selected="selected">All</option>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label" for="Age"> Age</label>
                            <select id="ddlAge" name="Age" class="form-control">
                                <option value="" selected="selected">All</option>
                                <option value="1">0-30 Days</option>
                                <option value="2">31-60 Days</option>
                                <option value="3">61-90 Days</option>
                                <option value="4">91-120 Days</option>
                                <option value="5">120+ Days</option>

                            </select>
                        </div>
                        <div class="col-sm-3 col-md-2 LoadZero">
                            <label class="control-label" for="Amount Received">Claim Type</label>
                            <select id="ddlClaimType" name="ClaimType" class="form-control">
                                <option value="" selected="selected">All</option>
                                <option value="1">Professional Medical</option>
                                <option value="2">Institutional</option>
                                <option value="4">Professional Anesthesia</option>

                            </select>
                        </div>

                        <div class="col-sm-2">
                            <label class="control-label">Insurance Plan Category</label>
                            <select id="ddlPlanCategory" class="form-control" name="PlanCategory" ddlist="GetPlanCategory"></select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Ins. Balance Greater Than</label>
                            <input class="form-control" id="txtInsBalGreater" name="InsBalGreater" type="number" min="0">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Ins. Balance Less Than</label>
                            <input class="form-control" id="txtInsBalLess" name="InsBalLess" type="number" min="0">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Last Name Initial From</label>
                            <input class="form-control" id="txtNameInitialFrom" name="NameInitialFrom" type="text" maxlength="1">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Last Name Initial To</label>
                            <input class="form-control" id="txtNameInitialTo" name="NameInitialTo" type="text" maxlength="1">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Last Modified</label>
                            <div class="input-group">
                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                <input type="text" name="LastModified" data-plugin-datepicker="" class="form-control" id="dpLastModified" autocomplete="off">
                            </div>
                        </div>
                        <div class="col-sm-2 hidden">
                            <label class="control-label">Last Comment </label>
                            <input class="form-control" id="txtComment " name="LastComment" type="text">
                        </div>
                        

                    </div>
                    <div class="col-sm-2 mt-xs pull-right">
                        <button class="btn btn-primary btn-sm rightbtn" id="btnDataFieldsSave" type="button" onclick="Bill_FollowUpInsuranceAR.ARSearch('Insurance');">Search</button>
                        <button class="btn btn-primary btn-sm rightbtn" id="btnSearchReset" type="button" onclick="Bill_FollowUpInsuranceAR.BillFollowUpInsuranceARReset();">Reset</button>
                    </div>
                    <input type="hidden" name="FacilityID" id="hfFacility" value="-1" />
                    <input type="hidden" name="ProviderID" id="hfProvider" value="-1" />
                    <input type="hidden" name="PatientID" id="hfPatientId" value="-1" />
                    <input type="hidden" name="VisitID" id="hfVisitId" value="-1" />
                    <input type="hidden" name="InsurancePlan" id="hfInsurancePlan" value="" />
                </form>
            </div>
        </section>
    </div>
    <div id="pnlBillFollowUpInsuranceAR_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body panel-featured">
                <input type="hidden" id="FollowUpAction_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvFollowUpInsuranceAR">
                    <thead>
                        <tr>
                            <th rowspan="2" style="display:none;">InsARDetailId</th>
                            <th rowspan="2" class="size-120">Action</th>
                            <th rowspan="2" class="noWordBreak">Practice</th>
                            <th rowspan="2" class="size180">Facility</th>
                            <th rowspan="2" class="noWordBreak">Provider</th>
                            <th rowspan="2" class="noWordBreak">Ins Plan</th>
                            <th rowspan="2" class="size120">Account</th>
                            <th rowspan="2" class="size120">DOS</th>
                            <th rowspan="2" class="size120 noWordBreak text-center">DOS Age</th>
                            <th rowspan="2" class="size120">Claim</th>
                            <th rowspan="2" class="size-min120 noWordBreak text-center">Last Name</th>
                            <th rowspan="2" class="size-min120 noWordBreak text-center">First Name</th>
                            <th rowspan="2" class="size120">Group</th>
                            <th rowspan="2" class="size120">Action</th>
                            <th rowspan="2" class="size120">Reason</th>
                            <th rowspan="2" class="size120">Suspend</th>
                            <th rowspan="2" class="size120 noWordBreak text-center">Age First Submit Date</th>
                            <th colspan="2" class="text-center noWordBreak">Insurance</th>
                            <th rowspan="2" class="size120 noWordBreak">First Submit Date</th>
                            <th rowspan="2" class="size120 noWordBreak">Submit Date</th>
                            <th rowspan="2" class="size120 noWordBreak">Modified On</th>
                            <th rowspan="2" class="size120 noWordBreak">Additional Comments</th>
                        </tr>
                        <tr>
                            <th class="noWordBreak">Charge</th>
                            <th class="noWordBreak">Balance</th>

                        </tr>

                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divFollowUpARInsurancePaging"></div>
            </div>
        </section>
    </div>
</div>
