<div id="pnlFollowUpARComments">
    <div id="actionPanFollowUpARComments" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-smd">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Bill_FollowUpARComments.UnLoad();">
                    <span class="red">&nbsp;</span><span class="sr-only">Close</span>
                </button>
                <h4 id="headingTitle" class="modal-title">Add Follow Up Comment</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmFollowUpARComments" onsubmit="return false">
                    <div class="col-sm-12">
                        <textarea class="edit form-control" rows="3" id="txtFollowUpArComments" name="txtFollowUpArComments" autofocus></textarea>
                    </div>
                    <div class="col-sm-2 col-md-3 pull-right pad-a-labelsize-btn">
                        <button id="Save_Exit" class="btn btn-primary btn-sm pull-right" type="submit">Save & Exit</button>
                    </div>

                    <div class="clearfix"></div>
                    <input type="hidden" name="hfVisitId" id="hfVisitId"/>
                    <input type="hidden" name="hfIsFromClaim" id="hfIsFromClaim" />
                    <input type="hidden" name="hfFollowUpCommentId" id="hfFollowUpCommentId" />
                </form>
            </div>

        </div>
    </div>

</div>
