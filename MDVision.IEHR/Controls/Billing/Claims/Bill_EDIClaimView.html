<div id="EDIClaimViewDetail">
    <div id="actionPanEDIClaimViewDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog-full modal-dialog modal-dialog-lg">
        <div class="modal-content">
            <div class="modal-header" style="">
                <button type="button" class="close" onclick="EDIClaimViewDetail.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Claims</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmEDIClaimDetail" onsubmit="return false">
                    <div class="col-sm-3 mb-xs">
                        <a id="btnResubmit" onclick="EDIClaimViewDetail.Claim_ReSubmit()" class="btn btn-link btn-xs"><i class="fa fa-upload pull-left" style="font-size:20px"></i> <span class="pull-left" style="margin-top: 3px;">Resubmit Claims</span></a>
                    </div>
                    <div class="clearfix"></div>

                    <div id="pnlEDIClaimViewDetail_Result" style="display: none;">
                        <section class="panel">
                            <div class="panel-body">
                                <table class="table table-bordered table-striped table-hover" id="dgvEDIClaimView">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">BatchClaimId</th>
                                            <th><input type="checkbox" title="Select all" name="checkbox" id="chkAllClaims"></th>
                                            <th class="">DOS</th>
                                            <th class="noWordBreak">Claim Number</th>
                                            <th class="">Account</th>
                                            <th class="noWordBreak">Patient Name</th>
                                            <th class="">Plan</th>
                                            <th class="noWordBreak">Subscriber ID</th>
                                            <th class="">Provider</th>
                                            <th class="">Facility</th>
                                            <th class="">Total Fee</th>
                                            <th class="noWordBreak">Ins Charges</th>
                                            <th class="">Balance</th>
                                            <th class="noWordBreak">Claim Status</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                    <input type="hidden" id="hfActivePageNumber"/>
                </form>
            </div>

        </div>
    </div>
</div>

<script type="text/javascript">
    $(function () {
        $("#pnlEDIClaimViewDetail_Result #chkAllClaims").change(function () {
            var CheckedAll = $(this).prop('checked');
            if (CheckedAll)
                $(this).attr('title', 'Unselect all');
            else
                $(this).attr('title', 'Select all');

            $("#pnlEDIClaimViewDetail_Result #dgvEDIClaimView").find("input[type='checkbox']").each(function(index){
            
                if(!$(this).attr("disabled"))
                    $(this).prop('checked', CheckedAll);
            });
               
        });
    });

</script>
