<div class="row" id="pnlClinicalTemplate" style="display:none;">
    <!------>
    <div id="actionPanClinicalTemplate" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div> <!------>
    <div class="mainScrollPan row" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Clinical_Template.TemplateAdd();"><i class="fa fa-plus-circle"></i> Add</button> <!------>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Clinical_Template.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Template </h2>
            </header>
            <div class="panel-body" id="pnlTemplate_Search">
                <form class="form-bordered" method="post" onsubmit="return false">

                    <div class="form-group">
                        <div class="col-sm-3 col-md-2">
                            <label class="control-label">Short Name</label>
                            <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                        </div>
                        <div class="col-sm-3 col-md-2">
                            <label class="control-label">Type<span class="required">*</span></label>
                            <select class="form-control" name="TemplateTypeId" ddlist="GetTemplateType" id="ddlTemplateTypeId">
                                <option selected="selected" value="">-Select-</option>

                            </select> </div>
                        <div class="col-sm-5 col-md-4">
                            <label class="control-label">Description</label>
                            <input class="form-control" id="txtDescription" type="text" maxlength="55" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Specialty</label>
                            <select class="form-control" name="Specialty" ddlist="GetSpecialty" id="ddlSpecialityID">
                                SpecialityID: "190"
                                <option selected="selected" value="">-Select-</option>

                            </select>
                        </div>
                        <div class="col-sm-2" id="divICDCode_Entity">
                            <label class="control-label">Provider</label>
                            <select class="form-control" name="Provider" ddlist="GetProvider" id="ddlProviderId">
                                <option selected="selected" value="">-Select-</option>

                            </select>
                        </div>
                       
                        <div class="col-xs-2">
                            <label class="control-label">Active?</label>
                            <select id="ddlActive" class="form-control">
                                <option value="">- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 mt-xs pull-right">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnTemplateSearch" type="button" onclick="Clinical_Template.TemplateSearch('0');">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <div id="pnlTemplate_Result" style="display: none;" class="row">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="Template_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvTemplate">
                    <thead>
                        <tr>
                            <th style="display:none;">TemplateId</th>
                            <th>Action</th>
                            <th>Short Name</th>
                            <th>Description</th>
                            <th>Type</th>
                            <th>Specialty</th>
                            <th>Provider</th>
                            <th>Letter Head</th>
                            <th>Folder</th>
                            <th>Is Active</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divTemplatePaging"></div>
            </div>
        </section>
    </div>
</div>
