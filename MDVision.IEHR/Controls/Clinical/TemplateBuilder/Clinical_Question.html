<div class="row" id="pnlClinicalQuestion" style="display:none;">
    <!------>
    <div id="actionPanClinicalQuestion" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div> <!------>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Clinical_Question.QuestionAdd();"><i class="fa fa-plus-circle"></i> Add</button> <!------>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Clinical_Question.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Question </h2>
            </header>
            <div class="panel-body" id="pnlQuestion_Search">
                <form class="form-bordered" method="post" onsubmit="return false">

                    <div class="form-group">
                        <div class="col-sm-2">
                            <label class="control-label">Short Name</label>
                            <input class="form-control" id="txtshortName" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Type </label>
                            <select id="lstTypeId" class="form-control" ddlist="GetQuestionType"></select>
                        </div>
                        <div class="col-sm-3">
                            <label class="control-label">Question</label>
                            <input class="form-control" id="txtQuestiontName" type="text" maxlength="30" />
                        </div>
                        <!--<div class="col-sm-3">
                            <label class="control-label">Last Name</label>
                            <input class="form-control" id="txtLastName" type="text" maxlength="30" />
                        </div>-->
                        <div class="col-sm-2">
                            <label class="control-label">Active?</label>
                            <select id="chkIsActice" class="form-control">
                                <option value="" selected="selected">- All -</option>
                                <option value="1">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 mt-xs pull-right">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnQuestionSearch" type="button" onclick="Clinical_Question.QuestionSearch('0');">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
        <input type="hidden" id="hfQuestionId" value="-1" />
    </div>

                            <th>Action</th>
