<div class="row" id="pnlClinicalLetter" style="display:none;">
    <div id="actionPanClinicalLetter" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Design_Letter.LetterAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Design_Letter.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">New Letter Template</h2>
            </header>
            <div class="panel-body" id="pnlLetter_Search">
                <form  method="post" id="tmpid" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-sm-2">
                            <label class="control-label">Name</label>
                            <input class="form-control" id="txtLetterName" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Description</label>
                            <input class="form-control" id="txtLetterDescription" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Category</label>
                            <select id="lstCategoryId" class="form-control" ddlist="LookupCategory"></select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Folder Type</label>
                            <select id="lstFolderTypeId" class="form-control" ddlist="GetDocumentType"></select>
                        </div>
                        <div class="col-sm-2" id="divEntity">
                            <label class="control-label">Entity</label>
                            <select id="lstEntityId" class="form-control" ddlist="GetEntity" onchange="Design_Letter.LoadEntityBasedData(this.value)"></select>
                        </div>
                        <div class="col-sm-2 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default ">
                                <input type="checkbox" name="Label" id="chkLabel">
                                <label class="control-label" for="chkLabel">Label</label>
                            </div>
                        </div>
                        </div>
                        <div class="form-group">

                            <div class="col-sm-2">

                                <label class="control-label">Active?</label>
                                <select id="ddlActive" class="form-control">
                                    <option value="">- All -</option>
                                    <option value="1" selected="selected">Active</option>
                                    <option value="0">Inactive</option>
                                </select>

                            </div>
                            <div class="col-sm-2 mt-xs pull-right">
                                <button class="btn btn-primary btn-sm rightbtn" id="btnDataFieldsSave" type="button" onclick="Design_Letter.LetterSearch('0');">Search</button>
                            </div>
                        </div>
                    <input type="hidden" id="hfLetterId" value="-1" />
                </form>
            </div>
        </section>
    </div>
    <div id="pnlLetter_Result" style="display: inline;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="Letter_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvLetter">
                    <thead>
                        <tr>
                            <th style="display:none;">LetterId</th>
                            <th>Action</th>
                            <th>Short Name</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Document</th>
                            <th>Entity</th>
                            <th>Labeled</th>
                            <th>Active</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

       
    </div>
</div>
