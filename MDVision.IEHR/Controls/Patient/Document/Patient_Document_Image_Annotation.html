<div class="row" id="pnlImageAnnotation" style="display:none;">
    <div id="actionPanImageAnnotation" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog" class="modal-dialog modal-dialog-full mt-lg mb-none">
        <div id="modalcontent" class="modal-content">
            <div id="modalheader" class="modal-header">
                <button type="button" class="close" onclick="Patient_Document_Image_Annotation.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Annotate Image</h4>
            </div>
            <div id="modalbody" class="modal-body pt-none">
                <div class="mainScrollPan" id="mainScrollPan">
                    <form method="post" id="frmImage_Annotation" onsubmit="return false">
                        <section class="col-xs-12 mb-sm p-none">
                                <div class="form-group">
                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Folder <span class="required">*</span></label>
                                        <select class="form-control" id="ddlFolder" name="Folder" ddlist="GetDocument" onchange="Document_Import.checkSelection();"></select>
                                    </div>

                                    <div class="col-sm-6 col-lg-3">
                                        <label class="control-label">Patient Name</label>
                                        <input class="form-control" id="txtFullName" name="FullName" type="text" disabled="disabled">
                                    </div>

                                
                                    <div class="col-sm-6 col-lg-3">
                                        <label class="control-label">File Name <span class="required">*</span></label>
                                        <div class="input-group">
                                            <input class="form-control" id="txtFileName" name="FileName" disabled="disabled"  type="text">
                                            <div class="input-group-btn">
                                                <input class="form-control" id="lnkFileNameExt" name="FileNameExt" type="text" style="width: 40px;" readonly="readonly" value=".png">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-sm-6 col-lg-4">
                                        <label class="control-label" for="Comments">Comments</label>
                                        <textarea class="form-control" id="txtComments" name="Comments" rows="2" maxlength="250" spellcheck="true"></textarea>
                                    </div>
                                </div>
                        </section>
                        <div class="col-xs-12">
                            <section class="panel panel-featured mb-none">
                                <div class="panel-body p-none">
                                    <div id="annotation_editor"></div>
                                    <div class="clearfix"></div>
                                </div>
                            </section>
                        </div>
                        <div class="clearfix"></div>
                        <div class="pr-default pull-right mt-default">
                            <button id="btnReset" class="btn btn-primary btn-sm rightbtn ml-xs mr-xs" type="button" onclick="Patient_Document_Image_Annotation.Reset()" >Reset</button>
                            <button id="btnSave" class="btn btn-primary btn-sm rightbtn ml-xs mr-xs" type="button" onclick="Patient_Document_Image_Annotation.SavePatientDocument(false)" >Save</button>
                            <button id="btnAddToNote" class="btn btn-primary btn-sm rightbtn ml-xs mr-xs" type="button" onclick="Patient_Document_Image_Annotation.SavePatientDocument(true)">Add to Note</button>
                            <button id="btnSubmit" class="btn btn-primary btn-sm rightbtn ml-xs mr-xs hidden" type="submit">Submit</button>
                        </div>
                        <div class="clearfix"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
