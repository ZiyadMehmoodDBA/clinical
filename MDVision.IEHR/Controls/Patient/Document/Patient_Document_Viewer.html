<div id="pnlDocumentViewer">
    <div id="actionPanDocumentViewer" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div id="Patient_Search"></div>-->

    <div class="modal-dialog mt-none size99per mb-none">
        <div class="modal-content" style="height:99vh;overflow:hidden;">

            <div class="modal-header">
                <button type="button" class="close" onclick="Document_Viewer.UnLoadTab();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Document Viewer  <small class="sub-heading" id="pHeaderPatientInfo"></small> <small class="sub-heading" id="smDocumentInfo"></small></h4>            
            </div>

           
            <div class="modal-body pr-none pl-none pt-none">
                <div id="tblDocumentAssignedTo" class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmDocumentViewer">

                        <section class="control-strip-top mb-default">
                            <div class="controls-left">
                                <a class="btn btn-link btn-xs btn-next-prev pr-none" id="lnkPreviousDocument" onclick="Document_Viewer.previousDocument();" title="Previous Document"><i class="fa fa-angle-left text-success"></i> Prev Doc <span class="pipe">|</span></a>
                                <a class="btn btn-link btn-xs btn-next-prev pl-none" id="lnkNextDocument" onclick="Document_Viewer.nextDocument();" title="Next Document">Next Doc <i class="fa fa-angle-right text-success"></i> </a>
                            </div>
                            <div class="controls" id="imagesControls" style="margin-left:0">

                                <a class="btn btn-link btn-xs" title="Zoom In" onclick="Document_Viewer.ZoomIn();"><i class="fa fa-search-plus text-success"></i></a>
                                <a class="btn btn-link btn-xs p-none" title="Zoom Out" onclick="Document_Viewer.ZoomOut();"><i class="fa fa-search-minus text-danger"></i> </a>

                                <a class="btn btn-link btn-xs" title="Reset Image" onclick="Document_Viewer.navigateCanvas('reset')"><i class="fa fa-refresh text-default"></i></a>

                                <!--<a class="btn btn-link btn-xs" title="Move Up" onclick="Document_Viewer.navigateCanvas('up')"><i class="fa fa-arrow-circle-o-up"></i></a>
                                <a class="btn btn-link btn-xs" title="Move Down" onclick="Document_Viewer.navigateCanvas('down')"><i class="fa fa-arrow-circle-o-down"></i></a>

                                <a class="btn btn-link btn-xs" title="Move Left" onclick="Document_Viewer.navigateCanvas('left')"><i class="fa fa-arrow-circle-o-left"></i></a>
                                <a class="btn btn-link btn-xs" title="Move Right" onclick="Document_Viewer.navigateCanvas('right')"><i class="fa fa-arrow-circle-o-right"></i></a>-->



                            </div>
                            <div id="rightpanel" class="controls-right" style="margin-left:auto">
                                <button id="btnFaxDocument" class="btn btn-link btn-xs" type="button" onclick="Document_Viewer.sendAsFax();"><i class="fa fa-fax black"></i> Fax</button>
                                <button id="btnReviewDocument"  class="btn btn-link btn-xs"  type="button" onclick="Document_Viewer.ReviewDocument(1, 1);"><i class="fa fa-check-square-o text-warning"></i> Review &amp; Sign</button>
                                <!--<button id="btnSignDocument" class="btn btn-primary btn-sm rightbtn" type="button" onclick="Document_Viewer.ReviewDocument(0, 1);">Sign</button>-->
                                <button id="btnSave" class="btn btn-link btn-xs"  type="submit"><i class="fa fa-save text-success"></i> Save</button>

                                <button id="btnPrint" class="btn btn-link btn-xs" type="button" onclick="Document_Viewer.PrintDocument();"><i class="fa fa-print text-default"></i> Print</button>

                                <button type="button" id="btnDocumentDelete" class="btn btn-link btn-xs"  onclick="Document_Viewer.DocumentDelete();"><i class="fa fa-trash text-danger"></i> Delete</button>
                            </div>

                            <input type="hidden" id="hfPatientId" value="-1" />
                            <input type="hidden" id="hfVisitId" value="-1" />
                            <input type="hidden" id="hfCaseId" value="-1" />
                            <input type="hidden" id="hfDocumentTagId" />
                            <input type="hidden" id="reviewed" />
                            <input type="hidden" id="hfXddlAssignedUserto" />
                            <input type="hidden" id="hfddlAssignedUserto" />
                            <input type="hidden" id="hfEOBManualPostingId" />
                        </section>

                                            </div>

                                            </div>
                                        </div>
                                    </div>
                                    <div id="divOtherDocumentSource" class="col-xs-6 hidden">

                                        <input id="txtOtherDocumentSource" name="OtherDocumentSource" maxlength="255" class="form-control" type="text" />
                                    </div>

                                        <textarea class="form-control" id="txtReferenceLink" type="text" name="ReferenceLink" rows="2" maxlength="255" spellcheck="true"></textarea>
