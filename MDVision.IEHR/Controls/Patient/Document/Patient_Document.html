    // folderToggle
    $('.btn-toggle-folder').click(function (e) {

        $('#' + Patient_Document.params["PanelID"] + ' #folderPanel').parent().addClass('folder');
        $('#' + Patient_Document.params["PanelID"] + ' #splitterbody').addClass('folder-main');
        //$('#divDocScan').addClass('folder-main');
        if ($('.ds-dwt-container-box')) {
            var prntWdth = $('#dwtcontrolContainer').innerWidth();
            $('.ds-dwt-container-box').width(prntWdth ? prntWdth : 580);
        }
    });
</script>
