<div id="pnlDocumentImport">
    <div id="actionPanDocumentImport" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg" id="modaldocument">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Document_Import.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title" id="titleDocument">Import Document</h4>
            </div>
            <div class="modal-body">
                <div id="tblDocumentAssignedTo" class="col-md-12 pl-xxs pr-xxs">
                    <form method="post" onsubmit="return false" id="frmDocumentImport">
                        <div class="form-group">
                            <!--<div class="col-sm-8">-->
                            <div class="col-sm-12" data-provides="fileinput" id="fileinputImport">
                                <div class="row">
                                    <div class="col-xs-8">
                                        <label class="control-label" for="uploadFilePH">File(s)<span class="required">*</span></label>
                                        <input type="text" class="form-control size100per ellipses disableAll" name="fileupload" id="uploadFilePH" placeholder="No File Selected" onkeydown="Document_Import.fileNameChange(event,this)"/>
                                    </div>
                                    <div class="col-xs-4 pl-xs pr-none pt-lg size-min125 ">
                                        <span class="btn btn-default btn-xs ml-xxs mr-sm btn-file">
                                            <i class="fa fa-folder-open"></i>
                                            <span>Browse</span>
                                            <input type="file" name="Upload_Import_file"  accept="application/pdf,image/jpg,image/bmp,image/png,image/jpeg,image/gif,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document" id="Upload_Import_file" multiple="multiple" onchange="Document_Import.BufferFile(this);" />
                                        </span>

                                        <label class="control-label" id="totalFiles">0 file(s) selected</label>

                                    </div>
                                </div>
                            </div>
                            <!--</div>-->
                            <div id="divPatientAccount" class="col-sm-3" name="conditionalTag">
                                <label class="control-label" for="txtAccountNumber">Patient Account<!--<span class="required">*</span>--></label>
                                <div class="input-group">
                                    <input class="form-control" id="txtAccountNumber" name="AccountNumber" type="text" />
                                    <div id="divSearchPatient" class="input-group-btn">
                                        <button id="lnkPatientAccount" type="button" class="btn btn-primary btn-xs" onclick="Document_Import.OpenPatientSearch();"><i class="fa fa-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div name="conditionalTag">
                                <div class="col-sm-3" style="display:none">
                                    <div class="spacer10"></div>
                                    <div class="checkbox-custom checkbox-default">
                                        <input id="chkSplitPage" name="SplitPage" type="checkbox">
                                        <label class="control-label" for="chkSplitPage">Split each page into a document</label>
                                    </div>
                                </div>
                                <div id="divClaimNumber" class="col-sm-3">
                                    <label class="control-label" for="Case Number">Claim Number</label>
                                    <div class="input-group">
                                        <input class="form-control" id="txtClaimNumber" name="ClaimNumber" type="text" />
                                        <div id="divSearchClaim" class="input-group-btn">
                                            <button id="lnkClaimNumber" type="button" class="btn btn-primary btn-xs" onclick="utility.OpenPatientCharges('Document_Import', true);"><i class="fa fa-search"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <div id="divCaseNumber" class="col-sm-3">
                                    <label id="lblCaseNumber" class="control-label">Case Number</label>
                                    <a id="lnkCaseNumberEdit" style="display:none;" href="#" onclick="Document_Import.OpenCaseDetail('hfCaseId');" title="Edit Case">Case Number</a>
                                    <div class="input-group">
                                        <input class="form-control " id="txtCaseNumber" type="text" placeholder="Start typing to search" name="CaseNumber" onblur="utility.ValidateAutoComplete(this, 'hfCaseId', false);" maxlength="35" />
                                        <div class="input-group-btn">
                                            <button id="lnkCaseNumber" class="btn btn-primary btn-xs " type="button" onclick="Document_Import.OpenCase('Search Case', 'txtCaseNumber', 'hfCaseId', 'lblCaseNumber', 'lnkCaseNumberEdit');"><i class="fa fa-search"></i></button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div id="divDocumentProvider" class="col-sm-3">
                                    <label for="ddlDocumentProvider" class="control-label">Document Provided By</label>
                                    <select class="form-control" id="ddlDocumentProvider" name="DocumentProvider" ddlist="GetDocumentProvider"></select>
                                </div>
                                <div id="divDateOfService" name="conditionalTag" class="col-sm-3">
                                    <label class="control-label pull-left pr-sm ">DOS</label>
                                    <label class="radio-inline"><input id="rdCalendar" type="radio" name="DOSDate" value="Calendar" onchange="Document_Import.SelectedDOSControl(this)" checked /> Calendar</label>
                                    <label class="radio-inline"><input id="rdDropdown" type="radio" name="DOSDate" value="Dropdown" onchange="Document_Import.SelectedDOSControl(this)"  /> Visits</label>
                                    
                                    <div class="clearfix"></div>
                                    
                                        <div class="input-group ">
                                            <span class="input-group-addon">
                                                <i class="fa fa-calendar"></i>
                                            </span>
                                            <input class="form-control" id="dtpDOS" name="DOS" type="text" data-plugin-datepicker="">
                                        </div>
                                </div>
                                <div class="col-sm-3">
                                    <div id="divddlDOS" >
                                        <label class="control-label"> Visit Date(s)</label>
                                        <div class="input-group col-sm-12">
                                            <select id="ddlDOS" class="form-control" disabled>
                                                <option value="">-Select-</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                
                                <div id="divFolder" class="col-sm-3">
                                    <label class="control-label">Folder <span class="required">*</span></label>
                                    <!--<select class="form-control" id="ddlFolder" name="Folder" ddlist="GetDocument" onchange="Document_Import.checkSelection();"></select>-->
                                    <select id="ddlFolder" name="Folder" multiple="multiple" customid="Folder" onchange="Document_Import.checkSelection();"  class="form-control multiselect" ddlmultilist="GetDocument" required></select>
                                </div>
                                <div id="divAssignUserto" class="col-sm-3">
                                    <label class="control-label">Assign User to Review </label>
                                    <select class="form-control" id="ddlAssignUserto" name="AssignedUserTo" ddlist="GetCoWorkerGroupUsersFullName"></select>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                            <div id="divDocumentSource" class="col-sm-3">
                                <label for="ddlDocumentSource" class="control-label">Source </label>
                                <select class="form-control" id="ddlDocumentSource" name="DocumentSource" ddlist="GetDocumentSource"></select>
                            </div>
                            <div id="divReceivedOn" class="col-sm-3">
                                <label for="dtpReceivedOn" class="control-label">Received On</label>
                                <div class="input-group">
                                    <span class="input-group-addon">
                                        <i class="fa fa-calendar"></i>
                                    </span>
                                    <input class="form-control" id="dtpReceivedOn" name="ReceivedOn" type="text" data-plugin-datepicker="">
                                </div>
                            </div>
                            
                            <div id="divExpirtyDate" class="col-sm-3">
                                <label for="dtpExpirtyDate" class="control-label">Expiry Date</label>
                                <div class="input-group">
                                    <span class="input-group-addon">
                                        <i class="fa fa-calendar"></i>
                                    </span>
                                    <input class="form-control" id="dtpExpirtyDate" name="ExpirtyDate" type="text" data-plugin-datepicker="">
                                </div>
                            </div>
                            <div id="divDocumentTag" class="col-sm-3">
                                <label id="lblDocumentTag" class="control-label">Tags</label>

                                <div class="input-group">
                                    <input class="form-control " id="txtTagName" type="text" placeholder="Start typing to search" name="Document Tag" maxlength="35" />
                                    <div class="input-group-btn">
                                        <button id="lnktags" class="btn btn-primary btn-xs " type="button" onclick="Document_Import.AddTags()"><i class="fa fa-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div id="divPriority" class="col-sm-3">
                                <label for="ddlDocumentPriority" class="control-label">Priority</label>
                                 <select class="form-control" id="ddlDocumentPriority" name="Priority" ddlist="GetDocumentPriority"></select>
                            </div>
                            <div class="col-sm-3 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Reviewed" id="chkReviewed">
                                    <label class="control-label" for="chkReviewed">Reviewed</label>
                                </div>
                            </div>
                            <div class="col-sm-3 pad-a-labelsize" id="DivPrivate">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Private" id="chkPrivate" onclick="Document_Scan.PrivateDocument(this, 'Document_Import');">
                                    <label class="control-label" for="chkPrivate" >Private</label>
                                </div>
                            </div>
                            <div class="col-sm-12" name="conditionalTag">
                                <label class="control-label ">Comments</label>
                                <textarea id="txtComments" name="Comments" maxlength="256" class="form-control" rows="2" spellcheck="true"></textarea>
                            </div>
                            <div id="divOtherDocumentSource" class="col-sm-3 hidden">
                                <label for="txtOtherDocumentSource" class="control-label ">Other Document Source</label>
                                <input id="txtOtherDocumentSource" name="OtherDocumentSource" maxlength="255" class="form-control" type="text" />
                            </div>
                            <div class="spacer20"></div>
                            <div id="divDocumentRefrenceDetailHeading" class="splitter m-none">Document Reference Details</div>
                            <div class="panel-body NoRadiusT" id="divDocumentRefrenceDetail">
                                <div class="col-sm-6">
                                    <label for="txtNarrativeReference" class="control-label">Narrative Reference</label>
                                    <textarea class="form-control" id="txtNarrativeReference" type="text" name="NarrativeReference" rows="2" maxlength="255" spellcheck="true"></textarea>
                                </div>
                                <div class="col-sm-6">
                                    <label for="txtReferenceLink" class="control-label">Reference Link</label>
                                    <textarea class="form-control" id="txtReferenceLink" type="text" name="ReferenceLink" rows="2" maxlength="255" spellcheck="true"></textarea>
                                </div>
                            </div>
                            <div class="conditional pull-right pt-sm">
                                <button id="btnDocumentImport" type="submit" class="btn btn-primary btn-sm  rightbtn">Upload</button>
                                <button id="btnSaveBatchDocument" style="display:none;" class="btn btn-primary btn-xs  pull-right" onclick="Document_Import.saveBatchDocument();">Upload</button>
                                <button id="btnSaveDirectMSGDocument" style="display:none;" class="btn btn-primary pull-right" onclick="Document_Import.saveDirectMSGDocument();">Upload</button>
                            </div>

                        </div>
                        <input type="hidden" id="hfPatientId" value="-1" />
                        <input type="hidden" id="hfVisitId" value="-1" />
                        <input type="hidden" id="hfCaseId" value="-1" />
                        <input type="hidden" id="hfPhoneEncounterFolder" value="-1" />
                        <input type="hidden" id="hfDocumentTagId" />
                        <input type="hidden" id="hfAssignedUserId" />
                        <input type="hidden" id="hfEOBManualPostingId"/>
                    </form>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
