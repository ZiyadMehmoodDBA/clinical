<div id="pnlPatientUserMessages" style="display:none;" class="">
    <div id="actionPanPatientUserMessages" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <!--<button type="button" class="close" onclick="Patient_UserMessages.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>-->
                <!--<h4 id="headingTitle" class="modal-title">Search Messages</h4>-->
            </div>
            <div id="modalbody" class="row">
                <div class="mainScrollPan" id="mainScrollPan">
                    <div class="clearfix"></div>
                    <section>
                        <div id="formpanelheading" style="display: none;">
                            <section class="panel panel-featured">
                                <header class="panel-heading">
                                    <div class="panel-actions">
                                        <a href="#" class="closebtn pull-right" onclick="Patient_UserMessages.UnLoadTab();"></a>

                                    </div>
                                    <h2 class="panel-title">Patient Messages</h2>
                                </header>
                            </section>
                        </div>
                        <form method="post" id="frmPatientUserMessages" onsubmit="return false">
                            <ul class="tabs-custom">
                                <li id="MessagesTabPractice" class=""><a class="custom-made-tabs" id="Lipracmessages" href="#msgsPrac" onclick="Patient_UserMessages.SearchPracticeMessage();" data-toggle="tab">Practice<span class="badge"></span></a></li>
                                <li id="MessagesTabPatient" class=""><a class="custom-made-tabs" id="Lipatmessages" href="#msgsPat" onclick="Patient_UserMessages.SearchPatientMessage();" data-toggle="tab">Patient<span class="badge"></span></a></li>
                                <li id="MessagesTabLog" class=""><a class="custom-made-tabs" id="LiLogMessages" href="#msgsPatLog" onclick="Patient_UserMessages.SearchLogMessages();" data-toggle="tab">Log</a></li>
                            </ul>

                            <div class="tab-content tabs-custom-body pl-xxs pr-xxs">
                                <div id="msgsPrac" class="tab-pane active custom-made-tabs">

                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Name</label>
                                        <input class="form-control" id="txtMsgsName" type="text">
                                    </div>
                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Priority</label>
                                        <select class="form-control" id="ddlPriority" ddlist="GetMessagesPriority"></select>
                                    </div>
                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Date</label>
                                        <div class="input-group">
                                            <div class="input-group-addon">
                                                <i class="fa fa-calendar"></i>
                                            </div>
                                            <input type="text" id="dtpMsgDate" name="MsgDate" class="form-control" data-plugin-datepicker="">
                                        </div>
                                    </div>
                                    <div class="pr-default pt-md pull-left">

                                        <button type="button" onclick="Patient_UserMessages.SearchPracticeMessage();" id="btnPracsearch" class="btn btn-primary btn-sm">Search</button>
                                    </div>

                                    <div class="col-sm-12">
                                        <button class="btn btn-sm btn-danger mt-default" title="Delete" onclick="Patient_UserMessages.DeleteSelectedMessages('dgvPracMessagesGrid')"><span class="glyphicon glyphicon-trash"></span></button>
                                        <button id="PracbtnComposeMsg" type="button" class="btn btn-success btn-sm mt-sm" onclick="Patient_UserMessages.ComposePracMessage();"><i class="fa fa-plus-circle"></i> Compose</button>
                                    </div>

                                    <div class="spacer3"></div>
                                    <section class="panel">
                                        <div class="panel-body">
                                            <input type="hidden" id="Patient_SelectedDataKeys" />
                                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPracMessagesGrid">
                                                <thead>
                                                    <tr>

                                                        <th class="" style="width: 100px;">From</th>
                                                        <th class="" style="width: 500px;">Subject</th>
                                                        <th class="" style="width: 150px;">Date</th>
                                                        <th class="" style="width: 10px;">Priority</th>
                                                    </tr>
                                                </thead>
                                                <tbody></tbody>
                                            </table>
                                            <div id="divPracMessagesPaging"></div>
                                        </div>
                                    </section>
                                </div>

                                <div id="msgsPat" class="tab-pane custom-made-tabs">

                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Name</label>
                                        <input class="form-control" id="txtMsgsName" type="text">
                                    </div>
                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Priority</label>
                                        <select class="form-control" id="ddlPriorityPatientMessages" ddlist="GetMessagesPriority"></select>
                                    </div>
                                    <div class="col-sm-6 col-lg-2">
                                        <label class="control-label">Date & Time</label>
                                        <div class="input-group">
                                            <div class="input-group-addon">
                                                <i class="fa fa-calendar"></i>
                                            </div>
                                            <input type="text" id="dtpMsgDate" name="MsgDate" class="form-control" data-plugin-datepicker="">
                                        </div>
                                    </div>
                                    <div class="pull-left pt-md pr-default">
                                        <button type="button" onclick="Patient_UserMessages.SearchPatientMessage();" id="btnPatientDocument" class="btn btn-primary btn-sm">Search</button>
                                    </div>

                                    <div class="col-sm-12">
                                        <button class="btn btn-sm btn-danger mt-default" title="Delete" onclick="Patient_UserMessages.DeleteSelectedMessages('dgvPatMessagesGrid')"><span class="glyphicon glyphicon-trash"></span></button>
                                        <button id="PatbtnComposeMsg" type="button" class="btn btn-success btn-sm mt-sm" onclick="Patient_UserMessages.ComposePatMessage();"><i class="fa fa-plus-circle"></i> Compose</button>
                                    </div>

                                    <div class="spacer3"></div>
                                    <section class="panel">
                                        <div class="panel-body">
                                            <input type="hidden" id="Patient_SelectedDataKeys" />
                                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPatMessagesGrid">
                                                <thead>
                                                    <tr>

                                                        <th class="" style="width: 100px;">From</th>
                                                        <th class="" style="width: 500px;">Subject</th>
                                                        <th class="" style="width: 150px;">Date</th>
                                                        <th class="" style="width: 70px;">Priority</th>
                                                        <th class="" style="width: 70px;">Hash</th>
                                                </thead>
                                                <tbody></tbody>
                                            </table>
                                            <div id="divPatMessagesPaging"></div>
                                        </div>
                                    </section>
                                </div>

                                <div id="msgsPatLog" class="tab-pane custom-made-tabs">


                                    <section class="panel">
                                        <div class="panel-body">
                                            <input type="hidden" id="PatientLog_SelectedDataKeys" />
                                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPatientMessageLog">
                                                <thead>
                                                    <tr>
                                                        <th class="" style="width: 150px;">Date</th>
                                                        <th class="" style="width: 150px;">From</th>
                                                        <th class="" style="width: 150px;">To</th>
                                                        <th class="" style="width: 400px;">Subject</th>
                                                        <th class="" style="width: 120px;">Type</th>
                                                </thead>
                                                <tbody></tbody>
                                            </table>
                                            <div id="divLogsPaging"></div>
                                            <div class="clearfix"></div>
                                        </div>
                                    </section>

                                </div>

                            </div>
                            <input type="hidden" id="hfPatientId" />
                        </form>
                    </section>
                </div>
                <div class="spacer3"></div>
            </div>

        </div>
    </div>
</div>
