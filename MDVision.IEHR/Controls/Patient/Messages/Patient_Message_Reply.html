<div id="pnlPatientMessageReply" style="display:none;" class="row">
    <div id="actionPanPatientMessageReply" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="row">
        <div id="modaldialog">
            <div id="modalcontent">
                <div id="modalheader" style="display:none;">
                    <button type="button" class="close" onclick="Patient_MessageReply.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                    <h4 class="modal-title">Reply Message</h4>
                </div>
                <div id="modalbody">
                    <div class="mainScrollPan" id="mainScrollPan">
                        <div class="clearfix"></div>
                        <form method="post" id="frmPatientMessageReply" onsubmit="return false">
                            <div class="form-group">
                                <div class="col-xs-12">
                                    <label class="control-label">Reply<span class="required">*</span></label>
                                    <textarea class="form-control" rows="3" id="txtMessage" name="msgDetail" spellcheck="true"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-4">
                                    <label class="control-label">Assigned to</label>
                                    <select class="form-control" id="ddlAssignedto" name="Assignedto" ddlist="GetCoWorkerGroupUsersFullName"></select>
                                </div>
                                <div class="col-sm-4">
                                    <label class="control-label">Status</label>
                                    <select class="form-control" id="ddlStatus" name="Status" ddlist="GetMessageStatus"></select>
                                </div>
                                <div class="col-sm-3">
                                    <div class="hidden-xs"><div class="pad-a-labelsize"></div></div>
                                    <div class="visible-xs"><span class="spacer10"></span></div>
                                    <div class="checkbox-custom checkbox-default">
                                        <input id="chkVisibleToPatient" name="VisibleToPatient" type="checkbox">
                                        <label class="control-label" for="chkVisibleToPatient">Spoke with Patient</label>
                                    </div>
                                </div>
                                <div class="col-sm-2 pull-right">
                                    <div class="hidden-xs"><div class="spacer20"></div></div>
                                    <div class="visible-xs"><span class="spacer10"></span></div>
                                    <button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
