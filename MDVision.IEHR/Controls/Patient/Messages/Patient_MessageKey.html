<div id="pnlPatientMessageKey" style="display:none;" class="row">
    <div id="actionPanPatientMessageKey" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="row">
        <div id="modaldialog">
            <div id="modalcontent">
                <div id="modalheader" style="display:none;">
                    <button type="button" class="close" onclick="Patient_MessageKey.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                    <h4 class="modal-title" id="titleMessage">Secret Key</h4>
                </div>
                <div class="modal-body">
                    <form method="post" id="frmPatientMessageKey" onsubmit="return false">
                        <div class="col-sm-12 p-none">
                            <div id="divProvider" class="col-sm-12 MessageSecretKey">
                                <div class="" id="txttopractice">
                                    <label id="LblSecretKey" class="control-label">Your secret key has been sent in the email. Please enter it here to read your message.<span class="required">*</span></label>
                                    <label id="LblInvalidKey" for="" class="control-label red hidden">The secret key is invalid. Please try again!</label>
                                    <input id="txtSecretKey" type="text" name="MessageSecretKey" customname="SecretKey" class="form-control green bold" />
                                </div>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                        <div class="pull-left col-sm-6 mt-md " id="divButtons">
                            <button type="submit" id="btnSend" class="btn btn-sm btn-success">Submit</button>
                        </div>
                    </form>
                    <div class="clearfix"></div>
                </div>
            </div>
        </div>
    </div>
</div>
