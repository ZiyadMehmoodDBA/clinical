<div id="pnlPatientMessage" style="display:none;" class="">
    <div id="actionPanPatientMessage" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>

    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Patient_Message.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search Messages</h4>
            </div>
            <div id="modalbody" class="row">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" id="btnPatientMessageAdd" class="btn btn-success btn-sm" onclick="Patient_Message.MessageAddEdit('-1', 'Add');"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div>
                    <div class="clearfix"></div>
                    <section>
                        <div id="formpanelheading" style="display: none;">
                            <section class="panel panel-featured">
                                <header class="panel-heading">
                                    <div class="panel-actions">
                                        <a href="#" class="closebtn pull-right" onclick="Patient_Message.UnLoadTab();"></a>

                                    </div>
                                    <h2 class="panel-title">Patient Messages</h2>
                                </header>
                            </section>
                        </div> 
                        <form method="post" id="frmPatientMessage" onsubmit="return false">
                            <section class="panel panel-featured mb-none">
                                <div class="panel-body">
                                    <div class="form-group">
                                        <div id="divCommonControls">
                                            <div class="col-sm-6 col-lg-2">
                                                <label class="control-label">Account Number</label>
                                                <div class="input-group">
                                                    <input class="form-control" title="Account Number" name="Account Number" id="txtAccountNumber" type="text" />
                                                    <div class="input-group-btn">
                                                        <button id="lnkPatientAccount" type="button" class="btn btn-primary btn-xs" onclick="Patient_Message.OpenPatientAccount();"><i class="fa fa-search"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-2">
                                            <label class="control-label">Type</label>
                                            <select class="form-control" id="ddlType" ddlist="GetMessageType"></select>
                                        </div>
                                        <div class="col-sm-6 col-lg-2">
                                            <label class="control-label" for="Status">Status</label>
                                            <select class="form-control" id="ddlStatus" ddlist="GetMessageStatus"></select>
                                        </div>
                                        <div class="col-sm-6 col-lg-2">
                                            <label class="control-label">Called Date</label>
                                            <div class="input-group">
                                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                                <input type="text" id="dtpCalledDate" data-plugin-datepicker="" class="form-control" autocomplete="off">
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-2">
                                            <label class="control-label">Entry Date & Time</label>
                                            <div class="input-group">
                                                <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                                <input type="text" id="dtpEntryDate" data-plugin-datepicker="" class="form-control" autocomplete="off">
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-2">
                                            <label class="control-label">Active?</label>
                                            <select id="chkActive" name="Active" class="form-control">
                                                <option value="">- All -</option>
                                                <option value="1" selected="selected">Active</option>
                                                <option value="0">Inactive</option>
                                            </select>
                                        </div>
                                        <div class="pull-right pr-default mt-md">
                                            <button class="btn btn-primary btn-sm" id="btnPatientMessageSearch" type="button" onclick="Patient_Message.SearchPatientMessage();">Search</button>
                                        </div>
                                    </div>
                                </div>
                            </section>
                            <input type="hidden" id="hfPatientId" />
                        </form>
                    </section>
                </div>
                <div class="spacer5"></div>
                <div id="pnlPatientMessage_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <input type="hidden" id="PatientMessage_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPatientMessage">
                                <thead>
                                    <tr>
                                        <th style="display:none;">PatientMessageId</th>
                                        <th id="ColumnAction" class="size95">Action</th>
                                        <th class="size120">Message</th>
                                        <th class="size120">Status</th>
                                        <th class="size120">Type</th>
                                        <th class="size120">Assigned To</th>
                                        <th class="size120">Entered By</th>
                                        <th class="size120">Entry Date</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divMessagesPaging"></div>
                        </div>
                    </section>
                </div>
            </div>

        </div>
    </div>
</div>
<script type="text/javascript">
    (function ($) {

        'use strict';

        if ($.isFunction($.fn['tooltip'])) {
            $('[data-toggle=tooltip],[rel=tooltip]').tooltip({ container: 'body' });
        }

    }).apply(this, [jQuery]);

</script>
