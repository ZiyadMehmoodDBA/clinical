<div class="row" id="pnlSchool" style="display:none;">
    <div id="actionPanSchool" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Patient_School.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search School</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Patient_School.SchoolAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div class="panel-body" id="pnlSchool_Search">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-3">
                                        <label class="control-label">Name</label>
                                        <input class="form-control" id="txtName" type="text" maxlength="20" />
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="control-label">Address</label>
                                        <input class="form-control" id="txtAddress" type="text" maxlength="55" />
                                    </div>
                                    <div class="col-sm-3">
                                        <div class="row">
                                            <div class="col-xs-8 pl-md pr-xs">
                                                <label class="control-label">City</label>
                                                <input class="form-control" id="txtCity" type="text" maxlength="25" />
                                            </div>
                                            <div class="col-xs-4 pl-none pr-md">
                                                <label class="control-label">State</label>
                                                <input class="form-control" id="txtState" type="text" placeholder="aa" data-mask="aa" />
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-3">
                                        <div class="row">
                                            <div class="col-xs-8 pl-md pr-xs">
                                                <label class="control-label">Zip</label>
                                                <input id="txtZip" class="form-control" type="text" placeholder="99999" data-mask="99999" />
                                            </div>
                                            <div class="col-xs-4 pad-a-labelsize pl-none pr-md">
                                                <input id="txtZipExt" class="form-control" type="text" />
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Active?</label>
                                        <select id="chkIsActice" class="form-control">
                                            <option value="" selected="selected">- All -</option>
                                            <option value="1">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-3 pad-a-labelsize-btn pull-right">
                                        <button class="btn btn-primary btn-sm pull-right" id="btnSchoolSearch" type="button" onclick="Patient_School.SchoolSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>
                <div id="pnlSchool_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body">
                            <input type="hidden" id="School_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvSchool">
                                <thead>
                                    <tr>
                                        <th style="display:none;">SchoolId</th>
                                        <th>Action</th>
                                        <th>Name</th>
                                        <th>Address</th>
                                        <th>City</th>
                                        <th>State</th>
                                        <th>Zip</th>
                                        <th>Telephone</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
