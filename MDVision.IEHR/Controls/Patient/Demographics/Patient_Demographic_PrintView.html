<div id="pnlPatient_Demographic_PrintView">
    <div id="actionPanPatient_Demographic_PrintView" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Patient_Demographic_PrintView.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Patient Information</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <section class="panel">
                        <form method="post" id="frmPatient_Demographic_PrintView" onsubmit="return false">
                            <div id="pnlDemographicInsurancePrint">
                                <div class="btn-block">
                                    <div class="pull-left">
                                        <button id="btnDemoInsurancePrint" type="button" class="btn btn-success btn-xs ml-xs" onclick="Patient_Demographic_PrintView.PrintDemoInsurance();"><i class="fa fa-print"></i> Print</button>
                                        <button id="DemoInsuranceSendFax" type="button" class="btn btn-success btn-xs" onclick="Patient_Demographic_PrintView.sendAsFax();"><i class="fa fa-fax"></i> Fax </button> 
                                    </div>
                                </div>
                                <div class="spacer15"></div>
                                <div class="panel-body" id="PrintPdfControlDiv" style="display:block;">
                                    <input type="hidden" id="helperPDF" />
                                    <iframe id="PreviewPrintDemoInsurance" src="Scripts/js/pdf/web/viewer.html" class="col-sm-12" style="height:1066px;"></iframe>
                                </div>

                                <script>
                                    kendo.pdf.defineFont({
                                        "DejaVu Sans": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans.ttf",
                                        "DejaVu Sans|Bold": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Bold.ttf",
                                        "DejaVu Sans|Bold|Italic": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Oblique.ttf",
                                        "DejaVu Sans|Italic": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Oblique.ttf"
                                    });
                                </script>
                                
                                <script type="x/kendo-template" id="page-templateDemoInsurance">
                                    <div class="page-template" id="DemoInsuranceViewTemplate">
                                        <div style="position: absolute;left: 20px;right: 20px;font-size: 90%;bottom: 20px;">
                                            <div class="footerBorderPrint" style="float:left; width:100%; height:3px;margin-bottom:3px;"></div>
                                            <div style="float:left;font-size:10px; width:100%;padding:2px 5px 0 5px;height:22px;">Generated by: MDVISION PM EMR</div>
                                        </div>
                                    </div>
                                </script>

                                <div id="printcall" style="display:none;">
                                    <style type="text/css" media="all">
                                        .footerBorderPrint {
                                            border-bottom: 2px solid #000;
                                        }
                                        .demoinsurance-header-title {
                                            float: left;
                                        }
                                        .demoinsurance-header-date {
                                            float: right;
                                        }
                                        .demoinsurance-table {
                                            width: calc(100% - 30px);
                                            margin: 0 15px;
                                            border-collapse: collapse;
                                            box-sizing: border-box;
                                            font-size: 12px;
                                        }

                                        .demoinsurance-table tr > td:nth-child(1) {
                                            width: 25%;
                                        }
                                        .demoinsurance-table tr > td:nth-child(2) {
                                            width: 25%;
                                        }
                                        .demoinsurance-table tr > td:nth-child(3) {
                                            width: 25%;
                                        }
                                        .demoinsurance-table tr > td:nth-child(4) {
                                            width: 25%;
                                        }
                                    </style>

                                    <div id="PatientInfo"  class="">
                                        <div class="col-sm-8 col-lg-2 pull-left">
                                            <img src="content/images/SHS-final-logo.png" class="img-responsive">
                                        </div>

                                        <div class="clearfix"></div>
                                        <div class="splitter m-none mt-xs" style="background: #000;height:2px;"></div>
                                        <div class="col-xs-12"> 
                                            <h4>
                                                <label id="HeadingTitle" class="demoinsurance-header-title" style="color: #0088cc;"></label>
                                                <label class="demoinsurance-header-date"><b>Date: </b><span id="HeaderCurrDate"></span></label>
                                            </h4>
                                        </div>
                                        <div class="clearfix"></div>
                                        <div class="spacer10"></div>
                                        <div class="splitter m-none mt-xs" style="background: #000;height:2px;"></div>
                                        <div class="spacer20"></div>
                                        
                                        <table id="tblPatientDemoInsurance" class="table table-bordered demoinsurance-table" style="font-size:16px;">
                                            <tbody></tbody>
                                        </table>
                                        <div class="clearfix"></div>
                                    </div>
                                </div>

                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
