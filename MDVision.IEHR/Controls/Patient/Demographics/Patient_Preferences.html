<div id="pnlPatientPreferences" style="display:none;">
    <div id="actionPanPatientPreferences" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Patient_Preferences.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Preferences</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <!--<div id="formpanelheading">
                        <header class="panel-heading">
                            <div class="panel-actions"><a href="#" class="closebtn pull-right" onclick="Patient_Preferences.UnLoadTab();"></a></div>
                            <h4 class="panel-title">Patient Preferences</h4>
                        </header>
                    </div>-->
                    <form method="post" id="frmPatientPreferences" onsubmit="return false">
                        <div class="form-group">
                            <div class="col-sm-3">
                                <label class="control-label">1st Preference</label>
                                <select id="ddl1stPreference" name="PreferredComm" class="form-control" onchange="Patient_Preferences.checkPreference(this);" ddlist="GetCommunication"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">2nd Preference</label>
                                <select id="ddl2ndPreference" name="PreferredComm" class="form-control" onchange="Patient_Preferences.checkPreference(this);" ddlist="GetCommunication"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label" id="lblSchool">School</label>
                                <!--<a id="lnkSchoolDetail" href="#" class="btn btn-link" onclick="Patient_Preferences.OpenSchoolDetail();" style="display:none;font-size:10px;"><i class="fa fa-edit"></i></a>-->
                                <a id="lnkSchoolDetail" style="display:none;" href="#" onclick="Patient_Preferences.OpenSchoolDetail();" title="Edit School">School</a>
                                <div class="input-group">
                                    <input class="form-control" id="txtSchool" name="School" type="text" onblur="utility.ValidateAutoComplete(this, 'frmPatientPreferences #hfSchool', false);">
                                    <div class="input-group-btn">
                                        <button class="btn btn-primary btn-xs" onclick="Patient_Preferences.OpenSchool();"><i class="fa fa-search"></i></button>
                                    </div>
                                </div>
                            </div>

                            <div class="visible-xs"><div class="clearfix"></div></div>
                            <div class="col-sm-3">
                                <label class="control-label">School Status</label>
                                <select id="ddlSchoolStatus" name="SchoolStatus" class="form-control " ddlist="GetSchoolStatus"></select>
                            </div>
                            <!--<div class="col-sm-3">
                                <label class="control-label">Date of Death</label>
                                <div class="input-group">
                                    <span class="input-group-addon">
                                        <i class="fa fa-calendar"></i>
                                    </span>
                                    <input class="form-control" id="dtpDateOfDeath" name="DateOfDeath" type="text" data-plugin-datepicker="">
                                </div>
                            </div>-->
                            <div class="col-sm-3 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default mt-xs">
                                    <input type="checkbox" id="chkcommnwithgrntr" name="commnwithgrntr" onclick="Patient_Preferences.IsPatientHasGuarantor(this);">
                                    <label class="control-label" for="chkcommnwithgrntr">Communicate with Guarantor</label>
                                </div>
                            </div>
                            <div class="col-sm-3 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default mt-xs">
                                    <input type="checkbox" val="true" id="chkcommnoptout" onclick="Patient_Preferences.EnableDisableoptions(this)" name="commnoptout">
                                    <label class="control-label" for="chkcommnoptout">Communication Opt-out</label>
                                </div>
                            </div>
                            <div class="col-sm-3 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default mt-xs">
                                    <input type="checkbox" id="chkPatientStatement" name="PatientStatement" checked>
                                    <label class="control-label" for="chkPatientStatement">Patient Statement</label>
                                </div>
                            </div>
                            <!--</div>
                            <div class="form-group">-->
                            <!--<div class="col-sm-6">
                                <label class="control-label">Cause of Death</label>
                                <textarea class="form-control" name="CauseOfDeath" id="txtCauseOfDeath" maxlength="350" rows="3" spellcheck="true"></textarea>
                            </div>-->
                            <div class="col-sm-2 pull-right pad-a-labelsize-btn">
                                <button id="btnPatPreferences" class="btn btn-primary btn-sm rightbtn" onclick="Patient_Preferences.PatientPreferencesSave()" type="submit">Save & Exit</button>
                            </div>
                        </div>
                        <input type="hidden" id="hfSchool" />
                        <span class="spacer20"></span>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function () {
        //utility.ValidateDOB('frmPatientPreferences', 'pnlPatientPreferences #dtpDateOfDeath', new Date('1800-01-01'), new Date(), true);

        $.widget("ui.autocomplete", $.ui.autocomplete, {
            _renderMenu: function (ul, items) {
                var that = this;
                $.each(items, function (index, item) {
                    that._renderItemData(ul, item);
                });
                $(ul).wrap("<div></div>");
            },
        });
    });
</script>
