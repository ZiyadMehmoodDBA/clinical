<div class="row" id="pnlAdminPatientEligibilityService" style="display:none;">
    <div id="actionPanAdminPatientEligibilityService" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_PatientEligibilityService.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search Patient Eligibility Service</h4>
            </div>
            <div id="modalbody">

                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Admin_PatientEligibilityService.PatientEligibilityServiceAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>

                    <section class="panel panel-featured">
                        <header class="panel-heading">
                            <div class="panel-actions">
                                <a href="#" class="closebtn pull-right" onclick="Admin_PatientEligibilityService.UnLoadTab()"></a>
                            </div>
                            <h2 class="panel-title max">Search EDI Service </h2>
                        </header>
                        <div class="panel-body" id="pnlAdminPatientEligibilityService_Search">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class=" col-sm-2">
                                        <label class="control-label">Clearing House</label>
                                        <select id="ddlClearingHouse" name="ClearingHouse" class="form-control" ddlist="GetClearingHouse"></select>
                                    </div>
                                    <div id="divPatientEligibilityService_Entity" class="col-sm-2">
                                        <label class="control-label">Entity</label>
                                        <select id="ddlEntity" name="Entity" class="form-control" ddlist="GetEntity"></select>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Schedule Days</label>
                                        <select id="ddlScheduleDays" class="form-control" name="ScheduleDays">
                                            <option value="" selected="selected">- Select -</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                            <option value="6">6</option>
                                            <option value="7">7</option>
                                            <option value="8">8</option>
                                            <option value="9">9</option>
                                            <option value="10">10</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Mode</label>
                                        <select id="ddlInterval" class="form-control" onchange="PatientEligibilityServiceDetail.ModeChanged();" name="Mode">
                                            <option value="" selected="selected">- Select -</option>
                                            <option value="Daily">Daily</option>
                                            <option value="Interval">Interval</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Active?</label>
                                        <select id="chkIsActice" class="form-control">
                                            <option value="" >- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <!--<div class=" col-sm-2">
                                        <label class="control-label">Time</label>
                                        <input type="text" class="form-control" id="txtTime" name="Time" maxlength="55">
                                    </div>-->
                                    <!--<div class=" col-sm-2">
                                        <div class="checkbox-custom checkbox-default">
                                            <input type="checkbox" name="IsActive" id="chkIsActive" checked="checked">
                                            <label for="chkIsActive">Active</label>
                                        </div>
                                    </div>-->
                                    <div class="col-sm-2 pad-a-labelsize-btn">
                                        <div class="btn-block">
                                            <button class="btn btn-primary btn-sm" id="btnPatientEligibilityServiceSearch" type="button" onclick="Admin_PatientEligibilityService.PatientEligibilityServiceSearch();">Search</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                    <div id="pnlPatientEligibilityService_Result" style="display: none;">
                        <section class="panel">
                            <div class="panel-body">
                                <input type="hidden" id="PatientEligibilityService_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPatientEligibilityService">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">PatientEligibilityServiceId</th>
                                            <th>Action</th>
                                            <th>Entity</th>
                                            <th>Clearing House</th>
                                            <th>Schedule Days</th>
                                            <th>Mode</th>
                                            <th>Time</th>
                                            <th>Interval Hours</th>
                                            <th>Interval Minutes</th>
                                            <th>Active</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divPatientEligibilityServicePaging"></div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
