<div class="row" id="pnlAdminStatementMessage" style="display:none;">
    <div id="actionPanAdminStatementMessage" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_StatementMessage.StatementMessageAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>

        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions"> <a href="#" class="closebtn pull-right" onclick="Admin_StatementMessage.UnLoadTab()"></a> </div>
                <h4 class="panel-title">Search Statement Message</h4>
            </header>

            <div id="pnlSupperBill_Search" class="panel-body">
                <form id="frmSupperBill" class="form-bordered" method="post" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-sm-2">
                            <label class="control-label" for="txtShortName">Short Name</label>
                            <input class="form-control" id="txtShortName" name="ShortName" type="text">
                        </div>
                        <div class="col-sm-5">
                            <label class="control-label" for="txtDescription">Message</label>
                            <input class="form-control" id="txtMessage" name="Message" type="text">
                        </div>

                        <div class="col-sm-3">
                            <label class="control-label" for="ddlActive">Active?</label>
                            <select id="ddlActive" name="Active" class="form-control">
                                <option value="" >All</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>

                            </select>
                        </div>

                        <div class="col-sm-2 pad-a-labelsize-btn">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnUserSearch" type="button" onclick=" Admin_StatementMessage.SearchStatementMessage();">Search</button>
                        </div>
                    </div>
                </form>



            </div>

            <div class="modal-body">
                <div id="pnlStatementMessage_Result" style="display: none;">
                    <section class="panel row">
                        <div class="panel-body">
                            <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvStatementMessage">
                                <thead>
                                    <tr>
                                        <th style="display:none;">MessageId</th>
                                        <th>Action</th>
                                        <th>Short Name</th>
                                        <th>Message</th>

                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divStatementMessagePaging"></div>
                        </div>
                    </section>
                </div>
                <div class="clearfix"></div>
            </div>
        </section>

    </div>
</div>
