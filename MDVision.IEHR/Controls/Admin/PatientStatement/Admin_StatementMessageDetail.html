<div id="StatementMessageDetail">
    <div id="actionPanStatementMessageDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="StatementMessageDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Statement Message</h4>
            </div>
            <div class="modal-body pl-xs pr-xs">
                
                    <form method="post" onsubmit="return false" id="frmStatementMessage">
                        <div class="form-group">

                            <div class="col-sm-6">
                                <label class="control-label" for="Short Name">Short Name<span class="required">*</span></label>
                                <input class="form-control" id="txtShortName" name="shortName" type="text" maxlength="50">
                            </div>
                            <div class="col-sm-2 pad-a-labelsize">
                                <div class="checkbox-default checkbox-custom">
                                    <input type="checkbox" id="chkActive" checked="checked">
                                    <label class="control-label" for="Active">Active</label>
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <label class="control-label" for="Message">Message<span class="required">*</span></label>
                                <textarea class="form-control" rows="5" id="txtMessage" name="message" type="text" spellcheck="true"></textarea>
                            </div>
                            <div class="col-xs-6 col-sm-6 pull-right mt-md">
                                <button id="btnsaveStatementMessage" class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                                <!--<button id="btnHistoryStatementMessage" class="btn btn-primary btn-sm rightbtn" type="button" onclick="StatementMessageDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>

                        <input type="hidden" id="hfStatementMessageId" />
                        
                    </form>


                    <div class="clearfix"></div>
                
                <div class="clearfix"></div>
            </div>

     

        </div>
    </div>
</div>
