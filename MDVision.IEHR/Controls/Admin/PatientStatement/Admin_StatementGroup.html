<div class="row" id="pnlAdminStatementGroup" style="display:none;">
    <div id="actionPanAdminStatementGroup" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_StatementGroup.StatementGroupAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>

        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions"> <a href="#" class="closebtn pull-right" onclick="Admin_StatementGroup.UnLoadTab()"></a> </div>
                <h4 class="panel-title">Search Statement Group</h4>
            </header>

            <div id="pnlSupperBill_Search" class="panel-body">
                <form id="frmSupperBill" class="form-bordered" method="post" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-sm-2">
                            <label class="control-label" for="txtShortName">Name</label>
                            <input class="form-control" id="txtName" name="Name" type="text">
                        </div>
                        <div class="col-sm-5">
                            <label class="control-label" for="txtDescription">Cycle Days</label>
                            <input class="form-control" id="txtCycleDays" name="CycleDays" type="text">
                        </div>

                        <div class="col-sm-3">
                            <label class="control-label" for="ddlActive">Active?</label>
                            <select id="ddlActive" name="Active" class="form-control">
                                <option value="" >All</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>

                            </select>
                        </div>

                        <div class="col-sm-2 pad-a-labelsize-btn">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnUserSearch" type="button" onclick=" Admin_StatementGroup.SearchStatementGroup();">Search</button>
                        </div>
                    </div>
                </form>



            </div>

            <div class="modal-body">
                <div id="pnlStatementGroup_Result" style="display: none;">
                    <section class="panel row">
                        <div class="panel-body">
                            <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvStatementGroup">
                                <thead>
                                    <tr>
                                        <th style="display:none;">MessageId</th>
                                        <th>Action</th>
                                        <th>Name</th>
                                        <th>Description</th>
                                        <th>Cycle Days</th>
                                        <th>Outstanding Days</th>
                                        <th>No of Statements</th>
                                        <th>Letter</th>

                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divStatementGroupPaging"></div>
                        </div>
                    </section>
                </div>
                <div class="clearfix"></div>
            </div>
        </section>

    </div>
</div>
