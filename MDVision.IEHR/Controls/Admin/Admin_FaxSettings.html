<div class="row" id="pnlAdminFaxSettings" style="display:none;">
    <div id="actionPanAdminFaxSettings" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_Provider.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Electronic Fax Setup</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" id="btn-add" onclick="Admin_FaxSettings.loadFaxSettingsDetail();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_Provider.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Search Settings</h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnl_FaxSetting">
                            <form class="form-bordered" id="frmProviderIdFax" onsubmit="return false" method="post">
                                <div class="row">
                                    <div class="col-sm-2">

                                        <div id="divSwitch"><span class="pr-xs">Facility</span><div class="btnWidgetSwitch switch switch-xs switch-success success-off"><input id="switchActive" isactive="1" type="checkbox" checked="checked" name="switch" data-plugin-ios-switch="" style="display: none;" onchange="Admin_FaxSettings.changeSwitch(this);"></div><span class="pl-xs">Provider</span> </div>
                                    </div>
                                    <div id="Selector" class="col-sm-9"></div>

                                </div>


                            </form>
                        </div>
                    </section>
                </div>




                <div id="pnlProvider_Result" hidden>
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <input type="hidden" id="Provider_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvProviderFaxSettings">
                                <thead>
                                    <tr>
                                        <td style="display:none;">Provider Id</td>
                                        <th>Action</th>
                                        <th>Provider</th>
                                        <th>Fax Number</th>
                                        <th>Last Updated</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divProviderPaging"></div>
                        </div>
                    </section>
                </div>






                <div id="pnlFacility_Result" hidden>
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <input type="hidden" id="Facility_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvFacilityFaxSettings">
                                <thead>
                                    <tr>
                                        <td style="display:none;">Facility Id</td>
                                        <th>Action</th>
                                        <th>Facility</th>
                                        <th>Fax Number</th>
                                        <th>Last Updated</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divFacilityPaging"></div>
                        </div>
                    </section>
                </div>


            </div>
        </div>
    </div>
</div>
