<div class="row" id="pnlAdminCoWorkersGroup" style="display:none;">
    <!--<div id="actionPanAdminPractice" class="actionPan" style="padding-top:10px;"></div>-->
    <div id="actionPanAdminCoWorkersGroup" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_CoWorkersGroup.CoWorkersGroupAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_CoWorkersGroup.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Co-Workers Group </h2>
            </header>
            <div class="panel-body" id="pnlCoWorkersGroup_Search">
                <form class="form-bordered" method="post" onsubmit="return false">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-sm-4">
                            <label class="control-label">Co-Workers Group Name</label>
                            <input class="form-control" id="txtUserName" name="Name" type="text" maxlength="100" />
                        </div>

                        <div class="col-sm-2">
                            <label class="control-label">Active?</label>
                            <select id="chkIsActice" class="form-control" name="IsActive">
                                <option value="">- All -</option>
                                <option value="true" selected="selected">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 mt-md">
                            <button class="btn btn-primary btn-sm" id="btnUserSearch" type="submit" onclick="Admin_CoWorkersGroup.CoWorkersGroupSearch('0');">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div id="pnlCoWorkersGroup_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="CoWorkersGroup_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvCoWorkersGroup">
                    <thead>
                        <tr>
                            <!--<th width="20px"><input type="checkbox" id="chk-header" onclick="Admin_Practice.CheckAll();" /> </th>-->
                            <th style="display:none;">CoWorkersGroupId</th>
                            <th class="size120 sorting_disabled">Action</th>
                            <th>Co-Workers Group Name</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divCoWorkersGroupPaging"></div>
            </div>
        </section>
    </div>
</div>
