<div class="row" id="pnlAdminLoggedInUsers" style="display:none;">
    <div id="actionPanAdminLoggedInUsers" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_LoggedInUsers.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Logged In Users </h2>
            </header>
            <div class="panel-body" id="pnlLoggedInUsers_Search">
                <form class="form-bordered" method="post" onsubmit="return false">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-sm-2">
                            <label class="control-label">User Name</label>
                            <input class="form-control" id="txtUserName" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Entity </label>
                            <select id="lstEntityId" class="form-control" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Session Status </label>
                            <select id="ddSessionStatusId" class="form-control">
                                <option value="" selected="selected">-- ALL --</option>
                                <option value="active">Active</option>
                                <option value="loggedout">Logged Out</option>
                                <option value="suspended">Suspended</option>
                            </select>
                        </div>

                        <div class="col-sm-2 mt-xs pull-right">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnUserSearch" type="button" onclick="Admin_LoggedInUsers.UserSearch();">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div id="pnlUser_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="User_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvLoggedinUsers">
                    <thead>
                        <tr>
                            <th style="display:none;">SessionId</th>
                            <th>Action</th>
                            <th>Username</th>
                            <th>Entity</th>
                            <th>Browser</th>
                            <th>Browser Version</th>
                            <th>IP Address</th>
                            <th>Platform</th>
                            <th>Machine Info</th>
                            <th>Last Activity</th>
                            <th>Session Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divUsersPaging"></div>
            </div>
        </section>
    </div>
</div>
