<div id="planfeelinkDetail">
    <div id="actionPanplanfeelinkDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="planfeelinkDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Plan Fee Link</h4>
            </div>
            <div class="modal-body">
                <div id="tblplanfeelinkDetail" class="col-md-12 p-none">
                    <form method="post" onsubmit="return false" id="frmPlanFeeLinkDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-xs-5">
                                <label class="control-label">Name</label><span class="required">*</span>
                                <input class="form-control" name="Name" id="txtName" placeholder="eg.: Paul Hug" maxlength="10" type="text" />
                            </div>
                            <div id="divPlanFeeLink_Entity" class="col-xs-4">
                                <label class="control-label">Entity<span class="required">*</span></label>
                                <select id="ddlEntity" name="entity" class="form-control" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-sm-2 pad-a-labelsize" id="pnlIsActive">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Active" id="chkIsActive">
                                    <label for="chkIsActive">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-xs-8">
                                <label class="control-label">Description</label>
                                <input class="form-control" name="Description" id="txtDescription" placeholder="eg.: Some Description" maxlength="55" type="text" />
                            </div>
                            <div class="col-xs-4 mt-md mb-md p-none">
                                <button class="btn btn-primary btn-sm rightbtn " type="submit">Save & Exit</button>
                                <!--<button id="btnHistoryplanfeelink" class="btn btn-primary btn-sm rightbtn" type="button" onclick="planfeelinkDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                        <div class="clearfix"></div>
                    </form>
                </div>
            </div><div class="clearfix"></div>
        </div>
    </div>
</div>
