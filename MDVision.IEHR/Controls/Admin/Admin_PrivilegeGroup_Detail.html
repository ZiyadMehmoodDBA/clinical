                <h4 class="modal-title">Security Entity Group</h4>
            </div>

                                </div>

                            <div class="col-xs-4 col-sm-2 pl-md">

                                    </div>
                                </div>
                            </div>
                            <div class="col-xs-4 col-sm-2 col-md-1 pad-a-labelsize-btn">
                                <button class="btn btn-primary btn-sm rightbtn" type="submit">Save</button>
                            </div>

                        <div class="spacer20"></div>
