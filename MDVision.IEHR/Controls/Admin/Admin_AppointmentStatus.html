<div class="row" id="pnlAdminAppointmentStatus" style="display:none;">
    <div id="actionPanAdminAppointmentStatus" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <button type="button" class=" btn btn-success btn-sm" id="btnAppointmentStatusAdd" onclick="Admin_AppointmentStatus.AppointmentStatusAdd();"><i class="fa fa-plus-circle"></i> Add</button>
    <div class="spacer10"></div><div class="clearfix"></div>
    <section class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Admin_AppointmentStatus.UnLoadTab();"></a>
            </div>
            <h2 class="panel-title">Search Appointment Status </h2>
        </header>
        <div class="panel-body" id="pnlAppointmentStatus_Search">
            <form class="form-bordered" method="post" onsubmit="return false">
                <!--start - CONTENTS-->
                <div class="form-group">
                    <div class="col-sm-3">
                        <label class="control-label">Short Name</label>
                        <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                    </div>
                    <div class="col-sm-5">
                        <label class="control-label">Description</label>
                        <input class="form-control" id="txtDescription" type="text" maxlength="55" />
                    </div>
                    <div class="col-sm-2">
                        <label class="control-label">Active?</label>
                        <select id="chkIsActice" class="form-control">
                            <option value="" selected="selected">- All -</option>  
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                    <div class="col-sm-2 pad-a-labelsize-btn">
                        <div class="btn-block">
                            <button class="btn btn-primary btn-sm" id="btnAppointmentStatusSearch" type="button" onclick="Admin_AppointmentStatus.AppointmentStatusSearch();">Search</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <div id="pnlAppointmentStatus_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="AppointmentStatus_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvAppointmentStatus">
                    <thead>
                        <tr>
                            <th style="display:none;">AppointmentId</th>
                            <th>Action</th>
                            <th>Short Name</th>
                            <th>Description</th>
                            <th>Color</th>
                            <th>Active</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divAppointmentStatusPaging"></div>
            </div>
        </section>
    </div>
</div>
