<div id="pnlAdmin_CoWorkersGroupDetail">
    <div id="actionPanAdminCoWorkersGroupDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Admin_CoWorkersGroupDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Add Co-Worker Group</h4>
            </div>
            <div class="modal-body">
                <div id="tblAdminCoWorkersGroupDetail">
                    <form method="post" onsubmit="return false;" id="frmAdminCoWorkersGroupDetail">
                        <div class="form-group">
                            <div class="col-sm-6">
                                <label class="control-label" for="shortname">Co-Workers Group Name <span class="required">*</span></label>
                                <input id="txtName" type="text" class="form-control" name="grpName" maxlength="100" />
                            </div>
                            <div class="col-sm-2 pad-a-labelsize">
                                <div class="checkbox-custom">
                                    <input type="checkbox" id="chkIsActive" checked name="IsActive">
                                    <label class="control-label">Active</label>
                                </div>
                            </div>
                            <div class="col-sm-4 mt-md">
                                <button id="btnSaveCoWorkersGroup" class="btn btn-primary btn-sm rightbtn" type="submit">Save</button>
                                <!--<button id="btnHistoryCoWorkersGroup" class="btn btn-primary btn-xs rightbtn" type="button" onclick="Admin_CoWorkersGroupDetail.ShowHistory();">History</button>-->
                            </div>
                            <div class="spacer15"></div>
                            <div class="col-sm-5">
                                <div class="panel-blue">
                                    <h5 class="mt-xxs mb-xxs">Available Users</h5>
                                </div>
                                <select name="from[]" id="multiselect" onclick="Admin_CoWorkersGroupDetail.ClearSelection('#multiselect_to')" ddlmultilist="GetUsersForCoWorker" class="form-control own-scroll NoRadiusT" size="8" multiple="multiple"></select>
                            </div>
                            <div class="col-sm-2 pt-xlg text-center">
                                <div class="spacer20"></div>
                                <button type="button" id="multiselect_rightSelected" class="btn btn-link p-none btn-lg font-md">
                                    <i class="fa fa-arrow-right"></i>
                                </button>
                                <div class="spacer3"></div>
                                <button type="button" id="multiselect_leftSelected" class="btn btn-link p-none btn-lg font-md">
                                    <i class="fa fa-arrow-left"></i>
                                </button>
                            </div>

                            <div class="col-sm-5">
                                <div class="panel-blue">
                                    <h5 class="mt-xxs mb-xxs">Assigned</h5>
                                </div>
                                <select name="to[]" id="multiselect_to" onclick="Admin_CoWorkersGroupDetail.ClearSelection('#multiselect')" size="8" class="form-control own-scroll NoRadiusT" multiple="multiple"></select>
                            </div>
                        </div>
                        <input type="hidden" name="PatientId" id="hfPatientId" />
                        <input type="hidden" name="CoWorkersGroupId" id="hfCoWorkersGroupId" value="-1" />
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
