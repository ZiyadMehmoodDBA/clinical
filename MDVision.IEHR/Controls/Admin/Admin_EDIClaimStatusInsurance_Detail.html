<div id="EDIClaimStatusInsuranceDetail">
    <div id="actionPanEDIClaimStatusInsuranceDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="EDIClaimStatusInsuranceDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">EDI Claim Status Insurance</h4>
            </div>
            <div class="modal-body">
                <div id="tblEDIClaimStatusInsuranceDetail" class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmEDIClaimStatusInsuranceDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-sm-3">
                                <label for="Clearinghouse" class="control-label">Clearing House <span class="required">*</span></label>
                                <select id="ddlClearinghouse" class="form-control" name="ClearingHouse" ddlist="GetClearingHouse"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label" for="EDI Status Insurance">EDI Status Insurance<span class="required">*</span></label>
                                <input type="text" class="form-control" name="ClaimStatusInsurance" id="txtClaimStatusInsurance" maxlength="55">
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label" for="Payor ID">Payor ID <span class="required">*</span></label>
                                <input type="text" class="form-control" name="PayorId" id="txtPayorId" maxlength="10">
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label" for="Telephone">Telephone</label>
                                <input type="text" class="form-control" id="txtTelephone" name="Telephone" data-mask="(999) 999-9999" placeholder="(999) 999-9999">
                            </div>
                            <div class="clearfix"></div>
                            <div class="col-sm-3">
                                <label class="control-label" for="Ext">Ext</label>
                                <input type="text" class="form-control" id="txtExt" name="Ext" maxlength="5" placeholder="99999">
                            </div>
                            <div class="col-sm-3 col-xs-4 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" checked="" name="TaxID" id="chkTaxID">
                                    <label for="chkTaxID">Tax ID</label>
                                </div>
                            </div>
                            <div class="col-sm-3 col-xs-4 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Active" checked="" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>
                            <div class="col-sm-12 col-xs-4 pad-a-labelsize-btn mb-sm">
                                <button type="submit" id="btnClaimStatusSave" class="btn btn-primary btn-sm rightbtn">Save & Exit</button>
                                <!--<button id="btnHistoryEDIClaimStatusInsurance" class="btn btn-primary btn-sm rightbtn" type="button" onclick="EDIClaimStatusInsuranceDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                       
                        
                    </form>
                    <div class="clearfix"></div>
                </div>
            </div><div class="clearfix"></div>
        </div>
    </div>
</div>
