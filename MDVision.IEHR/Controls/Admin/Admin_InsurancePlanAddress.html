<div class="row" id="pnlAdminInsurancePlanAddress" style="display:none;">
    <div id="actionPanAdminInsurancePlanAddress" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog" class="modal-dialog modal-dialog-lg">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_InsurancePlanAddress.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search Insurance Plan Address</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_InsurancePlanAddress.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Search Insurance Plan Address</h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlInsurancePlanAddress_Search">
                            <form class="form-bordered" onsubmit="return false" method="post">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">Insurance Plan</label>
                                        <input class="form-control" id="txtInsurancePlan" type="text" maxlength="10" />
                                    </div>
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">Description</label>
                                        <input class="form-control" id="txtDescription" type="text" maxlength="55" />
                                    </div>
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">Address</label>
                                        <input class="form-control" id="txtAddress" type="text" maxlength="100" />
                                    </div>
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">City</label>
                                        <input class="form-control" id="txtCity" type="text" maxlength="25" />
                                    </div>
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">State</label>
                                        <input class="form-control" id="txtState" type="text" name="State" placeholder="AA" style="text-transform:uppercase" maxlength="2"/>
                                    </div>
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">Zip</label>
                                        <input id="txtZip" class="form-control" type="text" name="Zip" placeholder="99999" maxlength="5" />
                                    </div>
                                    <div class="col-sm-3 col-md-3">
                                        <label class="control-label">Telephone</label>
                                        <input class="form-control" id="txtTelephone" type="text" placeholder="(999)999-9999" data-mask="(999)999-9999" />
                                    </div>
                                    <div class="col-sm-2 pad-a-labelsize-btn pull-right">
                                        <button class="btn btn-primary btn-sm rightbtn" id="btnInsurancePlanSearch" type="submit" onclick="Admin_InsurancePlanAddress.InsurancePlanAddressSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>

                <div id="pnlInsurancePlanAddres_Result">
                    <div class="panel-body panel-featured">
                        <input type="hidden" id="InsurancePlan_Address" />
                        <table id="dgvPlanAddress" class="table table-bordered table-striped table-condensed table-hover">
                            <thead>
                                <tr>
                                    <th style="display:none;">InsurancePlanId</th>
                                    <th>Insurance Plan</th>
                                    <th>Description</th>
                                    <th>Address</th>
                                    <th>City</th>
                                    <th>State</th>
                                    <th>Zip</th>
                                    <th>Telephone</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                        <div id="divInsurancePlanAddressPaging"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
