<div id="EDISubmitInsuranceDetail"> 
    <div id="actionPanAdminEDISubmitInsuranceDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="EDISubmitInsuranceDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">EDI Submit Insurance</h4>
            </div>
            <div class="modal-body">
                <div id="tblEDISubmitInsuranceDetail">
                    <form method="post" onsubmit="return false" id="frmEDISubmitInsuranceDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="control-label">Clearing House <span class="required">*</span></label>
                                <select id="ddlClearinghouse" class="form-control" name="ClearingHouse" ddlist="GetClearingHouse"></select>
                            </div>
                            <div class="col-sm-4">
                                <label class="control-label">Submit Insurance Name<span class="required">*</span></label>
                                <input type="text" class="form-control" name="SubmitInsName" id="txtSubmitInsuranceName" maxlength="55">
                            </div>
                            <div class="col-sm-4">
                                <label class="control-label">Payor ID <span class="required">*</span></label>
                                <input type="text" class="form-control" name="PayorId" id="txtPayorId" maxlength="10">
                            </div>
                            <div class="col-sm-4">
                                <div class="row">
                                    <div class="col-xs-8 pl-md pr-xs">
                                        <label class="control-label">Telephone</label>
                                        <input type="text" class="form-control" id="txtTelephone" name="Telephone" data-mask="(999) 999-9999" placeholder="(999) 999-9999">
                                    </div>
                                    <div class="col-xs-4 pl-none pr-md">
                                        <label class="control-label" for="Ext">Ext</label>
                                        <input type="text" class="form-control" id="txtExt" name="Ext" maxlength="5" placeholder="99999">
                                    </div>
                                </div>
                            </div>
                                <div class="col-sm-4 pad-a-labelsize ">
                                    <div class="checkbox-custom checkbox-default">
                                        <input type="checkbox" name="AdmissionDateRequired" checked="" id="chkAdmissionDateRequired">
                                        <label for="chkAdmissionDateRequired">Admission Date Required</label>
                                    </div>
                                </div>
                                <div class="col-sm-4 pad-a-labelsize">
                                    <div class="checkbox-custom checkbox-default">
                                        <input type="checkbox" name="AnesthesiaByMinutes" checked="" id="chkAnesthesiaByMinutes">
                                        <label for="chkAnesthesiaByMinutes">Anesthesia By Minutes</label>
                                    </div>
                                </div>
                                <div class="col-sm-4 mt-sm">
                                    <div class="checkbox-custom checkbox-default">
                                        <input type="checkbox" name="Active" checked="" id="chkActive">
                                        <label for="chkActive">Active</label>
                                    </div>
                                </div>
                                <div class="col-sm-12 pad-a-labelsize-btn mb-sm pull-right">
                                    <button type="submit" id="btnEDISubmitInsuranceSave" class="btn btn-primary btn-sm rightbtn">Save & Exit</button>
                                    <!--<button id="btnHistoryEDISubmitInsurance" class="btn btn-primary btn-sm rightbtn" type="button" onclick="EDISubmitInsuranceDetail.ShowHistory();">History</button>-->
                                </div>
                            </div>
                       
                    </form>
                    <div class="clearfix"></div>
                </div>
            </div><div class="clearfix"></div>
        </div>
    </div>
</div>
