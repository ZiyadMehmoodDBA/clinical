<div class="row" id="pnlAdminProvider" style="display:none;">
    <div id="actionPanAdminProvider" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_Provider.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search Provider</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" id="btn-add" onclick="Admin_Provider.ProviderAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_Provider.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Search Provider </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlProvider_Search">
                            <form class="form-bordered" onsubmit="return false" method="post">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-2">
                                        <label class="control-label size-min90">Short Name</label>
                                        <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="control-label">Last Name</label>
                                        <input class="form-control" id="txtLastName" type="text" maxlength="60" />
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="control-label">First Name</label>
                                        <input class="form-control" id="txtFirstName" type="text" maxlength="35" />
                                    </div>
                                    
                                    <div class="col-sm-2">
                                        <label class="control-label">Specialty</label>
                                        <select id="ddlSpeciality" class="form-control" ddlist="GetSpecialty"></select>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">NPI</label>
                                        <input class="form-control" id="txtNPI" type="text" placeholder="9999999999" data-mask="9999999999" />
                                    </div>
                                    <div id="divProvider_Entity" class="col-sm-2">
                                        <label class="control-label">Entity</label>
                                        <select id="ddlEntity" class="form-control" ddlist="GetEntity"></select>
                                    </div>
                                    <div class="col-sm-2 pad-a-labelsize-btn pull-right">
                                        <button class="btn btn-primary btn-sm rightbtn" id="btnProviderSearch" type="submit" onclick="Admin_Provider.ProviderSearch();">Search</button>
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Active?</label>
                                        <select id="chkActive" name="Active" class="form-control">
                                            <option value="">- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>

                <div id="pnlProvider_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <input type="hidden" id="Provider_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvProvider">
                                <thead>
                                    <tr>
                                        <th style="display:none;">ProviderId</th>
                                        <th class="size120 size-min110">Action</th>
                                        <th>Short Name</th>
                                        <th>Last Name</th>
                                        <th>First Name</th>
                                        <th>Specialty</th>
                                        <th class="text-center">NPI</th>
                                        <th class="text-center">Entity</th>
                                        <th>Specialist</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divProviderPaging"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
