<div id="planCategoryDetail">
    <div id="actionPanplanCategoryDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="planCategoryDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Plan Category</h4>
            </div>
            <div class="modal-body">
                <div id="tblplanCategoryDetail" class="col-md-12">
                    <form method="post" id="frmPlanCategoryDetail" onsubmit="return false">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-md-4">
                                <label class="control-label">Short Name <span class="required">*</span></label>
                                <input class="form-control size100" name="ShortName" id="txtShortName" type="text" maxlength="10" />
                            </div>
                            <div id="divPlanCategory_Entity" class="col-md-4">
                                <label class="control-label">Entity<span class="required">*</span></label>
                                <select id="ddlEntity" name="Entity" class="form-control" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-md-4 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" checked="" name="Active" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <label class="control-label">Description</label>
                                <input class="form-control" id="txtDescription" name="Description" type="text" maxlength="55" />
                            </div>
                            <div class="spacer10"></div>
                            <button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                            <!--<button id="btnHistoryPlanCategory" class="btn btn-primary btn-sm rightbtn" type="button" onclick="planCategoryDetail.ShowHistory();">History</button>-->
                        </div>
                    </form>
                    <div class="clearfix"></div>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
