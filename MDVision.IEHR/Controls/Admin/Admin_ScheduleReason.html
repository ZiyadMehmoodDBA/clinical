<div class="row" id="pnlAdminScheduleReason" style="display:none;">
    <div id="actionPanAdminScheduleReason" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_ScheduleReason.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search Schedule Reason</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class=" btn btn-success btn-sm" id="btnScheduleReasonAdd" onclick="Admin_ScheduleReason.ScheduleReasonAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id ="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_ScheduleReason.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Search Schedule Reason </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlScheduleReason_Search">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-2">
                                        <label class="control-label">Short Name</label>
                                        <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                                    </div>
                                    <div id="divReason_Entity" class="col-sm-2">
                                        <label class="control-label">Entity</label>
                                        <select id="ddlEntity" class="form-control " name="Entity" ddlist="GetEntity"></select>
                                    </div>
                                    <div class="col-sm-4 col-md-6">
                                        <label class="control-label">Description</label>
                                        <input class="form-control" id="txtDescription" type="text" maxlength="55" />
                                    </div>
                                    <div class="col-sm-2 col-md-1">
                                        <label class="control-label">Active?</label>
                                        <select id="chkIsActice" class="form-control">
                                            <option value="">- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-2 col-md-1 pad-a-labelsize-btn">
                                        <button class="btn btn-primary btn-sm" id="btnScheduleReasonSearch" type="button" onclick="Admin_ScheduleReason.ScheduleReasonSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>

                    <div id="pnlScheduleReason_Result" style="display: none;">
                        <section class="panel">
                            <div class="panel-body">
                                <input type="hidden" id="ScheduleReason_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvScheduleReason">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">ScheduleReasonId</th>
                                            <th>Action</th>
                                            <th>Short Name</th>
                                            <th>Description</th>
                                            <th>Duration</th>
                                            <th>Entity</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divScheduleReasonPaging"></div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>
