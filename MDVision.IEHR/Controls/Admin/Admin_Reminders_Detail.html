<div class="row" id="pnlRemindersDetail">
    <div id="actionPanRemindersDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="remindersDetail.UnLoadTab();"></button>
                <h4 class="modal-title" id="headerId">Reminder</h4>
            </div>
            <div class="modal-body">
                <form id="frmRemindersDetail" method="post" onsubmit="return false">

                    <div id="divDelivery" class="col-md-2 col-sm-4">
                        <label class="control-label">Delivery<span class="required">*</span></label>
                        <select class="form-control" id="ddlDelivery" name="delivery" onchange="remindersDetail.getDeliveryDateTime(this);">
                            <option value="no">Immediately</option>
                            <option value="10">In 10 Minutes</option>
                            <option value="30">In 30 Minutes</option>
                            <option value="1">In 1 Hour</option>
                            <option value="2">In 2 Hours</option>
                            <option value="4">In 4 Hours</option>
                            <!--<option value="other">Other...</option>-->
                        </select>
                    </div>

                    <div id="divDeliveryDate" class="col-md-2  col-sm-4" style="display:none;">
                        <label class="control-label">Date</label>
                        <div class="input-group">
                            <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                            <input type="text" id="deliveryDate" name="DeliveryDate" data-plugin-datepicker="" class="form-control ">
                        </div>
                    </div>

                    <div id="SMSreminder" style="display: none;">
                        <div id="SelectTemplatedropdownSMS" class="col-sm-4 col-lg-2">
                            <label class="control-label">Select Template </label>
                            <select class="form-control" id="ddlTextTemplate" name="TextTemplate" onchange="remindersDetail.fillTextTemplate('text');"></select>
                        </div>
                        <div class="col-sm-4 col-lg-2">
                            <label class="control-label">Caller ID <span class="required">*</span></label>
                            <input type="text" class="form-control" id="txtSMSCalleeName" name="SMSCalleeName" maxlength="50" disabled />
                        </div>
                        <div class="col-sm-4 col-lg-2">
                            <label class="control-label">Phone Number <span class="required">*</span></label>
                            <input type="text" class="form-control" id="txtSMSPhoneNumber" name="SMSPhoneNumber" data-mask="9999999999" maxlength="10" />
                        </div>
                        <div class="col-sm-4 col-lg-2" id="divSMSGuarantor">
                            <label class="control-label">Guarantor's Number <span class="required">*</span></label>
                            <input type="text" class="form-control" id="txtSMSGuarantorPhoneNumber" name="SMSGuarantorPhoneNumber" data-mask="9999999999" maxlength="10" />
                        </div>
                        <!--<div class="col-sm-4 col-lg-2">
                            <label class="control-label">Time Zone<span class="required">*</span></label>
                            <select class="form-control" id="ddlTextTimeZone" name="TextTimeZone" ddlist="GetTimeZones"></select>
                        </div>-->
                        <div class="col-md-3 pad-a-labelsize  col-sm-4">
                            <div class="checkbox-custom checkbox-default">
                                <input type="checkbox" name="ChkQuickSMSVoiceReminderFailover" id="ChkQuickSMSVoiceReminderFailover" checked>
                                <label class="control-label" for="ChkQuickSMSVoiceReminderFailover">Voice Reminder Failover</label>
                            </div>
                        </div>
                    </div>
                    <div id="voicereminder" style="display: none;">
                        <div id="SelectTemplatedropdownVoice" class="col-sm-4 col-lg-2">
                            <label class="control-label">Select Template </label>
                            <select class="form-control" id="ddlVoiceTemplate" name="VoiceTemplate" onchange="remindersDetail.fillTextTemplate('voice');"></select>
                        </div>
                        <div class="col-sm-4 col-lg-2">
                            <label class="control-label">Caller ID<span class="required">*</span></label>
                            <input type="text" id="txtVoiceCalleeName" class="form-control" name="VoiceCalleeName" maxlength="50" disabled />
                        </div>
                        <div class="col-sm-4 col-lg-2">
                            <label class="control-label">Phone Number <span class="required">*</span></label>
                            <input type="text" id="txtVoicePhoneNumber" class="form-control" name="VoicePhoneNumber" data-mask="9999999999" maxlength="100" />
                        </div>
                        <div class="col-sm-4 col-lg-2" id="divVoiceGuarantor">
                            <label class="control-label">Guarantor Number<span class="required">*</span></label>
                            <input type="text" id="txtVoiceGuarantorPhoneNumber" class="form-control" name="VoiceGuarantorPhoneNumber" data-mask="9999999999" maxlength="100" />
                        </div>
                        <!--<div class="col-sm-4 col-lg-2">
                            <label class="control-label">Time Zone<span class="required">*</span></label>
                            <select class="form-control" id="ddlVoiceTimeZone" name="VoiceTimeZone" ddlist="GetTimeZones"></select>
                        </div>-->
                        <div class="col-md-3 pad-a-labelsize  col-sm-4" >
                            <div class="checkbox-custom checkbox-default">
                                <input type="checkbox" name="ChkVoiceRepeatMessage" id="ChkVoiceRepeatMessage" checked>
                                <label class="control-label" for="ChkVoiceRepeatMessage">Repeat Message</label>
                            </div>
                        </div>
                    </div>
                    <div id="emailreminder" style="display: none;">
                        <div class="col-sm-12 col-lg-12">
                            <div id="SelectTemplatedropdown" class="col-sm-4 col-lg-4">
                                <label class="control-label">Select Template </label>
                                <select class="form-control" onchange="remindersDetail.fillTextTemplate('email');" id="ddlEmailTemplate" name="EmailTemplate">
                                    <option selected>-Select-</option>
                                </select>
                            </div>
                            <div id="divDeliveryEmail" class="col-sm-4 col-lg-4">
                                <label class="control-label">Delivery<span class="required">*</span></label>
                                <select class="form-control" id="ddlDeliveryEmail" name="delivery" >
                                    <option value="no">Immediately</option>
                                    <option value="10">In 10 Minutes</option>
                                    <option value="30">In 30 Minutes</option>
                                    <option value="1">In 1 Hour</option>
                                    <option value="2">In 2 Hours</option>
                                    <option value="4">In 4 Hours</option>
                                </select>
                            </div>
                            <!--<div class="col-sm-4 col-lg-4">
                                <label class="control-label">Time Zone<span class="required">*</span></label>
                                <select class="form-control" id="ddlEmailTimeZone" name="EmailTimeZone" ddlist="GetTimeZones"></select>
                            </div>-->
                        </div>
                        <div class="col-sm-4 col-lg-12">
                            <div class="col-sm-4 col-lg-12">
                                <label class="control-label">From <span class="required">*</span></label>
                                <input type="text" class="form-control" name="FromName" id="txtfromname"  maxlength="55" />
                            </div>
                        </div>
                        <div class="col-sm-4 col-lg-12">
                            <div class="col-sm-4 col-lg-12">
                                <label class="control-label">To <span class="required">*</span></label>
                                <input type="text" class="form-control" id="txtEmailTo" name="EmailTo" placeholder="eg.: john@abc.com" maxlength="55"  />
                            </div>
                        </div>
                        <div class="col-sm-4 col-lg-12">
                            <div class="col-sm-4 col-lg-12">
                                <label class="control-label">Subject <span class="required">*</span></label>
                                <input type="text" class="form-control" name="Subject" maxlength="50" />
                            </div>
                        </div>
                    </div>

                    <div class="panel-body panel-featured pl-none pr-none">
                        <div class="col-sm-12 mt-sm">
                            <label class="control-label" for="comments">Message<span class="required">*</span></label>
                            <textarea maxlength="160" id="txtTemplate" name="HTMLTemplate" class="form-control" rows="15" spellcheck="true" oninput="remindersDetail.setMessageCount();"></textarea>
                        </div>
                    </div>

                    <div id="divSpanCount" class="col-sm-4" style="display:none">
                        <label class="control-label">Characters Remaining:</label>
                        <span id="spnCount">160</span>
                    </div>
                    <div id="divSpanvoiceCount" class="col-sm-4" style="display:none">
                        <label class="control-label">Characters Allowed:</label>
                        <span id="spnvoiceCount">160</span>
                    </div>
                    <div class="clearfix"></div>
                    <div class="pull-left mt-md pr-default"><button type="submit" class="btn btn-primary btn-sm">Send</button></div>
                    <div class="spacer10"></div>

                </form>
            </div>
        </div>
    </div>
</div>
