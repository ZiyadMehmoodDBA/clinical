<div class="row" id="pnlAdminPOSFeeSchedule" style="display:none;">
    <div id="actionPanAdminPOSFeeSchedule" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_POSFeeSchedule.POSFeeScheduleAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_POSFeeSchedule.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Fee Group Plan CPT POS </h2>
            </header>
            <div class="panel-body" id="pnlPOSFeeSchedule_Search">
                <form class="form-bordered" method="post" onsubmit="return false">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                       
                        <div class="col-sm-3">
                            <label class="control-label">Fee Group</label>
                            <select id="ddlFeeGroup" class="form-control" ddlist="GetFeeGroup" onchange="Admin_POSFeeSchedule.LoadEntityBasedData()"></select>
                        </div>
                        <div class="col-sm-3">
                            <label class="control-label">Plan Fee Link</label>
                            <select id="ddlPlanFeeLink" class="form-control" ddlist="GetPlanFeeLink"></select>
                        </div>
                        
                        <div class="col-sm-3">
                            <label class="control-label">CPT Code</label>
                            <input class="form-control" id="txtCPTCode" type="text" oninput="Admin_POSFeeSchedule.BindAutoComplete(this)" maxlength="5" name="CPTCode" />
                        </div>
                        <div class="clearfix"></div>
                        <div class="col-sm-6">
                            <label class="control-label">Place Of Service</label>
                            <select id="ddlPOSCode" class="form-control" ddlist="GetPlaceOfService"></select>
                        </div>
                        <div class="col-md-2  ">
                            <label class="control-label">Active?</label>
                            <select id="ddlActive" class="form-control ">
                                <option value="">- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 pad-a-labelsize-btn pull-right">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnPOSFeeScheduleSearch" type="button" onclick="Admin_POSFeeSchedule.POSFeeScheduleSearch();">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div id="pnlPOSFeeSchedule_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="POSFeeSchedule_SelectedDataKeys" />
                <table class="table table-bordered table-condensed table-striped table-hover mb-none" id="dgvPOSFeeSchedule">
                    <thead>
                        <tr>
                            <th style="display:none;">POSFeeScheduleId</th>
                            <th>Action</th>
                            <th>Fee Group</th>
                            <th>Plan Fee Link</th>
                            <th>CPT Code</th>
                            <th>POS</th>
                            <th class="size90">Fee</th>
                            <th class="size90">Expected Fee</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="DivPOSFeeSchedulePaging"></div>
            </div>
        </section>
    </div>
</div>
