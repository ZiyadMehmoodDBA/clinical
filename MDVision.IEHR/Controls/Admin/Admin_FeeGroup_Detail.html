<div id="feegroupDetail">
    <div id="actionPanfeegroupDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="feegroupDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Fee Group</h4>
            </div>
            <div class="modal-body">
                <div id="tblfeegroupDetail" class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmFeeGroupDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-md-4">
                                <label class="control-label">Name</label><span class="required">*</span>
                                <input class="form-control size100" name="Name" id="txtName" placeholder="eg.: Paul Hug" maxlength="10" type="text" />
                            </div>
                            <div id="divFeeGroup_Entity" class="col-md-4">
                                <label class="control-label">Entity<span class="required">*</span></label>
                                <select id="ddlEntity" name="Entity" class="form-control " onchange="feegroupDetail.LoadNextFeeGroup(this.value)" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-md-4 pad-a-labelsize" id="pnlIsActive">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Active" id="chkIsActive">
                                    <label for="chkIsActive">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-md-12">
                                <label class="control-label">Description</label>
                                <input class="form-control" name="Description" id="txtDescription" placeholder="eg.: Some Description" maxlength="55" type="text" />
                            </div>

                        </div>
                        <div class="form-group">

                            <div class="col-md-4">
                                <label class="control-label">End Date</label>
                                <div class="input-group">
                                    <span class="input-group-addon add-on">
                                        <i class="fa fa-calendar"></i>
                                    </span>
                                    <input class="form-control size80" name="date" type="text" id="txtEndDate">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="control-label" for="Next Basic Fee Group">Next Fee Group</label>
                                <select class="form-control size100" name="NextFeeGroup" id="ddlNextFeeGroup" ddlist="GetFeeGroup"></select>
                            </div>
                        </div>
                        <div class="spacer20"></div>
                        <button class="btn btn-primary btn-sm rightbtn " type="submit">Save & Exit</button>
                        <!--<button id="btnHistoryfeegroup" class="btn btn-primary btn-sm rightbtn" type="button" onclick="feegroupDetail.ShowHistory();">History</button>-->
                        <div class="spacer20"></div>
                        <div class="clearfix"></div>
                    </form>
                </div>
            </div><div class="clearfix"></div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function () {

        //initialization of date-picker.
        utility.CreateDatePicker('feegroupDetail #txtEndDate', function () {
            //on-change callback method 
        });
    });
</script>
