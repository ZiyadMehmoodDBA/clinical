<div class="row" id="pnlAdminHolidays" style="display:none;">
    <div id="actionPanAdminHolidays" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <button type="button" class=" btn btn-success btn-sm" id="btnHolidaysAdd" onclick="Admin_Holidays.HolidaysAdd();"><i class="fa fa-plus-circle"></i> Add</button>
    <div class="spacer10"></div><div class="clearfix"></div>
    <section class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Admin_Holidays.UnLoadTab();"></a>
            </div>
            <h2 class="panel-title">Search Holidays </h2>
        </header>
        <div class="panel-body" id="pnlHolidays_Search">
            <form class="form-bordered" method="post" onsubmit="return false">
                <!--start - CONTENTS-->
                <div class="form-group">
                    <div class="col-sm-3">
                        <label class="control-label">Date</label>
                        <div class="input-group">
                            <span class="input-group-addon add-on">
                                <i class="fa fa-calendar"></i>
                            </span>
                            <input class="form-control " name="date" type="text" id="holidayDate">
                        </div>
                    </div>
                    <div class="col-sm-5">
                        <label class="control-label">Holiday</label>
                        <input class="form-control" id="txtHoliday" type="text" maxlength="55" />
                    </div>
                    <div id="divHoliday_Entity" class="col-sm-2">
                        <label class="control-label">Entity</label>
                        <select id="ddlEntity" class="form-control" ddlist="GetEntity"></select>
                    </div>
                    <div class="col-sm-2">
                        <label class="control-label">Active?</label>
                        <select id="ddlActive" class="form-control ">
                            <option value="" >- All -</option>
                            <option value="1" selected="selected">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                    <div class="col-sm-2 pad-a-labelsize-btn pull-right">
                        <button class="btn btn-primary btn-sm pull-right" id="btnHolidaysSearch" type="button" onclick="Admin_Holidays.HolidaysSearch();">Search</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <div id="pnlHolidays_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="Holidays_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvHolidays">
                    <thead>
                        <tr>
                            <th style="display:none;">HolidaysId</th>
                            <th>Action</th>
                            <th>Date</th>
                            <th>Holiday</th>
                            <th>Entity</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divHolidaysPaging"></div>
            </div>
        </section>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function () {

        //initialization of date-picker.
       
    });
</script>
