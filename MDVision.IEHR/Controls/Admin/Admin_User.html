<div class="row" id="pnlAdminUser" style="display:none;">
    <!--<div id="actionPanAdminPractice" class="actionPan" style="padding-top:10px;"></div>-->
    <div id="actionPanAdminUser" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_User.UserAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured mb-default">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_User.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search User </h2>
            </header>
            <div class="panel-body" id="pnlUser_Search">
                <form class="form-bordered" method="post" onsubmit="return false">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-sm-2">
                            <label class="control-label">User Name</label>
                            <input class="form-control" id="txtUserName" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Entity </label>
                            <select id="lstEntityId" class="form-control" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">First Name</label>
                            <input class="form-control" id="txtFirstName" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Last Name</label>
                            <input class="form-control" id="txtLastName" type="text" maxlength="30" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Active?</label>
                            <select id="chkIsActice" class="form-control">
                                <option value="">- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="pr-default pt-md pull-right">
                            <button class="btn btn-primary btn-sm" id="btnUserSearch" type="button" onclick="Admin_User.UserSearch('0');">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div id="pnlUser_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body panel-featured">
                <input type="hidden" id="User_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvUsers">
                    <thead>
                        <tr>
                            <!--<th width="20px"><input type="checkbox" id="chk-header" onclick="Admin_Practice.CheckAll();" /> </th>-->
                            <th style="display:none;">UserId</th>
                            <th class="size80 size-max70">Action</th>
                            <th>User Name</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Entity</th>
                            <th class="noWordBreak size70 size-max70">Is Admin</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divUsersPaging"></div>
            </div>
        </section>
    </div>
</div>
