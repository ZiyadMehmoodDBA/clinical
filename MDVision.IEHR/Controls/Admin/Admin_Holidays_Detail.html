<div id="holidaysDetail">
    <div id="actionPanholidaysDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="holidaysDetail.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Holidays</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmHolidaysDetail" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-xs-5">
                            <label class="control-label">Date<span class="required">*</span></label>
                            <div class="input-group">
                                <span class="input-group-addon add-on">
                                    <i class="fa fa-calendar"></i>
                                </span>
                                <input class="form-control" name="Holidaydate" type="text" id="holidayDate">
                            </div>
                        </div>
                        <div id="divHoliday_Entity" class="col-xs-4">
                            <label class="control-label">Entity<span class="required">*</span></label>
                            <select id="ddlEntity" class="form-control " name="Entity" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-xs-2 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default">
                                <input type="checkbox" checked="" name="Active" id="chkActive">
                                <label for="chkActive">Active</label>
                            </div>
                        </div>
                        <div class="col-xs-9">
                            <label class="control-label">Holiday<span class="required">*</span></label>
                            <input class="form-control " id="txtHoliday" type="text" name="Holiday" maxlength="100"/>
                        </div>
                        <div class="col-xs-3 mt-md mb-md pl-none pr-none">
                            <button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                            <!--<button id="btnHistoryHoliday" class="btn btn-primary btn-sm rightbtn" type="button" onclick="holidaysDetail.ShowHistory();">History</button>-->
                        </div>
                    </div>                    
                    <div class="clearfix"></div>
                </form>
            </div>
            <div class="clearfix"></div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function () {
        //initialization of date-picker.
        utility.CreateDatePicker('holidaysDetail #holidayDate', function () {
            //on-change callback method 
            $('#frmHolidaysDetail').bootstrapValidator('revalidateField', 'Holidaydate');
        });
    });
</script>
