<div id="followUpAdjustmentCodeDetail">
    <div id="actionPanfollowUpAdjustmentCodeDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="followUpAdjustmentCodeDetail.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Adjustment Reason Codes</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmfollowUpAdjustmentCodeDetail" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-sm-3">
                            <label class="control-label" for="Name">Code<span class="required">*</span></label>
                            <input class="form-control" id="txtCode" name="Code" type="text" maxlength="10">
                        </div>
                        <div class="col-sm-6">
                            <label class="control-label" for="Description">Description<span class="required">*</span></label>
                            <textarea class="form-control" id="txtDescription" name="Description" rows="2" spellcheck="true"></textarea>
                        </div>

                        <div class="col-sm-3 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default">
                                <input checked="checked" id="chkActive" type="checkbox">
                                <label class="control-label" for="Active">Active</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-4 col-xs-6 mt-md pull-right">
                        <button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                        <!--<button id="btnHistoryFollowupadjtmntcode" class="btn btn-primary btn-sm rightbtn" type="button" onclick="followUpAdjustmentCodeDetail.ShowHistory();">History</button>-->
                    </div>
                    <div class="spacer5"></div>
                </form>
            </div>
            <div class="clearfix"></div>
        </div>
    </div>
</div>
