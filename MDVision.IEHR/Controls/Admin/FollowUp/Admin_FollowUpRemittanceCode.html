<div class="row" id="pnlAdminFollowUpRemittanceCode" style="display:none;">
    <div id="actionPanAdminFollowUpRemittanceCode" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_FollowUpRemittanceCode.RemittanceCodeAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_FollowUpRemittanceCode.UnLoadTab()"></a>
                </div>
                <h4 class="panel-title">Search Remittance Advice Remark Codes</h4>
            </header>
            <div class="panel-body" id="pnlRemittanceCode_Search">
                <form method="post" id="frmRemittanceCode" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-sm-3">
                            <label class="control-label" for="Name">Code</label>
                            <input class="form-control" id="txtCode" name="Code" type="text" maxlength="50">
                        </div>
                        <div class="col-sm-4">
                            <label class="control-label" for="Description">Description</label>
                            <input class="form-control" id="txtDescription" name="Description" type="text" maxlength="4000">
                        </div>

                        <!--<div class="col-sm-3 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default">
                                <input id="chkRejection" type="checkbox">
                                <label class="control-label" for="Rejection">Rejection</label>
                            </div>
                        </div>-->

                        <div class="col-sm-2">
                            <label class="control-label">Rejection?</label>
                            <select id="ddlRejection" name="Active" class="form-control">
                                <option value="" selected="selected">- All -</option>
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Active?</label>
                            <select id="chkIsActice" class="form-control">
                                <option value="" selected="selected">- All -</option>
                                <option value="1">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 mt-xs pull-right">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnRemittanceCodeSearch" type="button" onclick="Admin_FollowUpRemittanceCode.RemittanceCodeSearch('0');">Search</button>
                        </div>
                    </div>                    
                </form>
            </div>
        </section>    
    <div id="pnlRemittanceCode_Result" style="display: inline;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="RemittanceCode_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvRemittanceCode">
                    <thead>
                        <tr>
                            <th style="display:none;">RemittanceId</th>
                            <th>Action</th>
                            <th>Code</th>
                            <th>Description</th>
                            <th>Rejection</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divRemittancePaging"></div>
            </div>
        </section>


    </div>
</div>
