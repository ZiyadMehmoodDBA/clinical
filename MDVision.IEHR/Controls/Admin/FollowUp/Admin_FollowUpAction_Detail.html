<div id="pnlFollowUpActionDetail">
    <div id="actionPanFollowUpActionDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div id="modalcontent" class="modal-content">
            <div id="modalheader" class="modal-header" style="">
                <button type="button" class="close" onclick="FollowUp_Action_Detail.Unload();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Action</h4>
            </div>
            <div class="modal-body">
                <form id="frmFollowUpActionDetail" onsubmit="return false" >
                    <div class="form-group">
                        <div class="col-sm-3 col-md-2">
                            <label class="control-label" for="shortName">Short Name<span class="required">*</span></label>
                            <input class="form-control" id="txtShortName" name="shortName" type="text" maxlength="50">
                        </div>
                        <div class="col-sm-4">
                            <label class="control-label" for="Description">Description<span class="required">*</span></label>
                            <input class="form-control" id="txtDescription" name="Description" type="text" maxlength="100">
                        </div>
                        <div class="col-sm-3">
                            <label class="control-label">Letter</label>
                            <select id="ddlLetter" class="form-control" ddlist="GetLetters"></select>
                        </div>
                        <div id="ddlContainer">
                            <div class="col-sm-2 col-md-3">
                                <label class="control-label">Type</label>
                                <select id="ddlType" class="form-control" ddlist="GetARType"></select>
                            </div>
                            <div class="clearfix"></div>
                            <div class="col-sm-3 col-md-2">
                                <label class="control-label" for="suspendDays">Suspend after days<span class="required">*</span></label>
                                <input class="form-control" id="txtSuspendAfterDays" name="suspendDays" type="text" maxlength="10" onkeypress="return utility.ValidateZero(event, this);">
                            </div>
                            <div class="col-sm-2 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input checked="checked" id="chkIsActive" type="checkbox">
                                    <label class="control-label" for="Active">Active</label>
                                </div>
                            </div>
                            <div class="spacer10"></div>
                            <div class="splitter"> Auto Action </div>
                            <div class="col-sm-3">
                                <label class="control-label">Auto Action Name</label>
                                <select id="ddlAutoAction" class="form-control" ddlist="GetAutoAction" onchange="FollowUp_Action_Detail.SetLedgerAccount(this)"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label" for="Name">Ledger Account</label>
                                <select id="ddlLedgerAccount" disabled="disabled" name="ledgerAccount" class="form-control"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Next Action</label>
                                <select id="ddlNextAction" class="form-control" ddlist="GetFollowUpAction"></select>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                        <button type="submit" class="btn btn-primary btn-sm rightbtn">Save & Exit</button>
                        <!--<button id="btnHistoryFollowupAction" class="btn btn-primary btn-sm rightbtn" type="button" onclick="FollowUp_Action_Detail.ShowHistory();">History</button>-->
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
