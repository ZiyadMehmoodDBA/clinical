<div id="followUpReasonDetail">
    <div id="actionPanfollowUpReasonDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div id="modalcontent" class="modal-content">
            <div id="modalheader" class="modal-header" style="">
                <button type="button" class="close" onclick="followUpReasonDetail.UnLoad(); "><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Reason</h4>
            </div>
            <div class="modal-body">
                <form method="post" onsubmit="return false;" id="frmfollowUpReasonDetail">
                    <div class="form-group">
                        <div class="col-sm-3">
                            <label class="control-label" for="Name">Short Name<span class="required">*</span></label>
                            <input class="form-control" id="ShortName" name="ShortName" type="text" maxlength="50">
                        </div>
                        <div class="col-sm-5">
                            <label class="control-label" for="Description">Description<span class="required">*</span></label>
                            <input class="form-control" id="Description" name="Description" type="text" maxlength="100">
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label" for="Entity">Type</label>
                            <select id="lstARTypeId" name="lstARTypeId" class="form-control" ddlist="GetARType"></select>
                        </div>
                        <div class="col-sm-2 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default">
                                <input id="Active" checked="checked" name="active" type="checkbox">
                                <label class="control-label"  for="Active">Active</label>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                        <button class="btn btn-primary btn-sm rightbtn" id="btnReasonSave" type="submit">Save & Exit</button>
                        <!--<button id="btnHistoryFollowupReason" class="btn btn-primary btn-sm rightbtn" type="button" onclick="followUpReasonDetail.ShowHistory();">History</button>-->
                    </div>
                    <input type="hidden" id="hfReasonId" value="-1" />
                </form>
            </div>
        </div>
    </div>
</div>
