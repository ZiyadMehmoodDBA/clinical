<div id="followUpTypeDetail">
    <div id="actionPanfollowUpTypeDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div id="modalcontent" class="modal-content">
            <div id="modalheader" class="modal-header" style="">
                <button type="button" class="close" onclick="followUpTypeDetail.UnLoad(); "><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">AR Type</h4>
            </div>
            <div class="modal-body">
                <form role="form" onsubmit="return false;" id="frmfollowUpTypeDetail">
                    <div class="form-group">
                        <div class="col-sm-3">
                            <label class="control-label" for="Name">Short Name<span class="required">*</span></label>
                            <input class="form-control" id="ShortName" name="ShortName" type="text" maxlength="50">
                        </div>
                        <div class="col-sm-6">
                            <label class="control-label" for="Description">Description<span class="required">*</span></label>
                            <input class="form-control" id="Description" name="Description" type="text" maxlength="100">
                        </div>

                        <div class="col-sm-3 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default">
                                <input checked="checked" id="Active" name="active" type="checkbox">
                                <label class="control-label"  for="Active">Active</label>
                            </div>
                        </div>
                        <div class="clearfix"></div>
                        <button class="btn btn-primary btn-sm rightbtn">Save & Exit</button>
                        <!--<button id="btnHistoryFollowupType" class="btn btn-primary btn-sm rightbtn" type="button" onclick="followUpTypeDetail.ShowHistory();">History</button>-->
                    </div>
                    <input type="hidden" id="hfTypeId" value="-1" />
                </form>
            </div>
        </div>
    </div>
</div>
