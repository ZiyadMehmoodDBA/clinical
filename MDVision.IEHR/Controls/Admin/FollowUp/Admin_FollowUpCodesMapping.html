<div class="row" id="pnlAdminFollowUpCodesMapping" style="display:none;">
    <div id="actionPanAdminFollowUpCodesMapping" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <button type="button" class="btn btn-success btn-sm" onclick="Admin_FollowUpCodesMapping.CodesMappingAdd();"><i class="fa fa-plus-circle"></i> Add</button>
    <div class="spacer10"></div><div class="clearfix"></div>
    <section class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Admin_FollowUpCodesMapping.UnLoadTab()"></a>
            </div>
            <h4 class="panel-title">Search Codes Mapping</h4>
        </header>
        <div class="panel-body" id="pnlCodesMapping_Search">
            <form method="post" id="frmCodesMapping" onsubmit="return false">
                <div class="form-group">
                    <div class="col-sm-3 ">
                        <label class="control-label" for="Claim Status Code">Claim Status Code</label>
                        <select id="ddlCSCode" class="form-control" ddlist="GetClaimStatusCode"></select>                            
                    </div>
                    <div class="col-sm-3 ">
                        <label class="control-label" for="Claim Status Category Code">Claim Status Category Code</label>
                        <select id="ddlCSCategoryCode" class="form-control" ddlist="GetClaimStatusCategoryCode"></select>
                    </div>
                    <div class="col-sm-3">
                        <label class="control-label" for="Action">Action</label>
                        <select id="ddlAction" class="form-control" ddlist="GetFollowUpAction"></select>
                    </div>
                    <div class="col-sm-3 ">
                        <label class="control-label" for="Reason">Reason</label>
                        <select id="ddlReason" class="form-control" ddlist="GetFollowUpReasons"></select>
                    </div>
                    <!--<div class="col-sm-3 pad-a-labelsize">

                        <div class="checkbox-custom checkbox-default">
                            <input type="checkbox" id="chkActive" checked="checked">
                            <label class="control-label " for="Active">Active</label>
                        </div>
                    </div>-->
                    <!--bug# PMS-2274-->
                    <div class="col-sm-2">
                        <label class="control-label">Active?</label>
                        <select id="ddlActive" name="Active" class="form-control">
                            <option value="">- All -</option>
                            <option value="1" selected="selected">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                    <!--bug# PMS-2274-->
                    <div class="col-sm-2 mt-xs pull-right">
                        <button class="btn btn-primary btn-sm rightbtn" id="btnCodesMappingSearch" type="button" onclick="Admin_FollowUpCodesMapping.CodesMappingSearch('0');">Search</button>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <div id="pnlCodesMapping_Result" style="display: inline;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="CodesMapping_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvCodesMapping">
                    <thead>
                        <tr>
                            <th style="display:none;">CodesMappingId</th>
                            <th class="size-min110">Action</th>
                            <th>Claim Status Code</th>
                            <th>Claim Status Remittance Code</th>
                            <th>Action</th>
                            <th>Reason</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divCodesMappingPaging"></div>
            </div>
        </section>
    </div>
</div>
