<div class="row" id="pnlAdminPasswordConfiguration" style="display:none;">
    <section class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Admin_PasswordConfiguration.UnLoadTab()"></a>
            </div>
            <h2 class="panel-title">Password Configuration</h2>
        </header>
        <div class="panel-body" id="pnlPasswordConfiguration">
            <form method="post" onsubmit="return false" id="frmPasswordConfiguration">
                <div class="form-group">

                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Entity <span class="required">*</span></label>
                        <select id="lstEntityId" name="Entity" class="form-control" ddlist="GetEntity" onchange="Admin_PasswordConfiguration.EntityChanged(this);"></select>
                    </div>
                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Minimum Password Length <span class="required">*</span></label>
                        <input id="txtMinPasswordLength" class="form-control" name="MinPasswordLength" type="number" min="1" max="50" value="8" />
                    </div>

                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Minimum Special Character<span class="required">*</span></label>
                        <input id="txtMinSpecialCharacter" class="form-control" name="MinSpecialCharacter" type="number" min="0" max="10" value="1" />
                    </div>

                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Minimum Alpha Character<span class="required">*</span></label>
                        <input id="txtMinAlphaCharacter" class="form-control" name="MinAlphaCharacter" type="number" min="0" max="10" value="1" />
                    </div>

                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Minimum Numeric Character<span class="required">*</span></label>
                        <input id="txtMinNumericCharacter" class="form-control" name="MinNumericCharacter" type="number" min="0" max="10" value="1" />
                    </div>


                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Minimum Uppercase Letter<span class="required">*</span></label>
                        <input id="txtMinUppercaseCharacter" class="form-control" name="MinUppercaseCharacter" type="number" min="0" max="10" value="1" />
                    </div>

                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Maximum Password Age (Days)<span class="required">*</span></label>
                        <input id="txtMaxPasswordAge" class="form-control" name="MaxPasswordAge" type="number" min="0" max="10" value="60" />
                    </div>

                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Password History<span class="required">*</span></label>
                        <input id="txtPasswordHistory" class="form-control" name="PasswordHistory" type="number" min="0" max="10" value="24" />
                    </div>
                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Account Lockout Threshold<span class="required">*</span></label>
                        <input id="txtAccountLockoutThreshold" class="form-control" name="AccountLockoutThreshold" type="number" min="0" max="10" value="0" />
                    </div>
                    <div class="col-sm-2 col-md-3">
                        <label class="control-label">Idle Session Time Out (Mins)<span class="required">*</span></label>
                        <input id="txtIdleSessionTimeout" class="form-control" name="IdleSessionTimeout" type="number" min="0" max="10" value="10" />
                    </div>
                    <div class="pull-right pr-default pad-a-labelsize-btn">
                        <button class="btn btn-primary btn-sm" type="submit">Save</button>
                    </div>
                </div>
                <div class="spacer20"></div>
            </form>
        </div>
    </section>
</div>
