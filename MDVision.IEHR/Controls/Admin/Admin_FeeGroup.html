<div class="row" id="pnlAdminFeeGroup" style="display:none;">
    <div id="actionPanAdminFeeGroup" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_FeeGroup.FeeGroupAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_FeeGroup.UnLoadTab();"></a>
                </div>
                <h2 class="panel-title">Search Fee Group </h2>
            </header>
            <div class="panel-body" id="pnlFeeGroup_Search">
                <form class="form-bordered" method="post" onsubmit="return false">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-md-3">
                            <label class="control-label">Name</label>
                            <input class="form-control" id="txtName" type="text" />
                        </div>
                        <div class="col-md-3">
                            <label class="control-label">Description</label>
                            <input class="form-control" id="txtDescription" type="text" />
                        </div>
                        <div id="divFeeGroup_Entity" class="col-md-2">
                            <label class="control-label">Entity</label>
                            <select id="ddlEntity" class="form-control size130" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-md-2  ">
                            <label class="control-label">Active?</label>
                            <select id="ddlActive" class="form-control ">
                                <option value="">- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-md-2 pad-a-labelsize-btn">
                            <div class="btn-block">
                                <button class="btn btn-primary btn-sm" id="btnFeeGroupSearch" type="button" onclick="Admin_FeeGroup.FeeGroupSearch();">Search</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
        <div id="pnlFeeGroup_Result" style="display: none;">
            <section class="panel">
                <div class="panel-body">
                    <input type="hidden" id="FeeGroup_SelectedDataKeys" />
                    <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvFeeGroup">
                        <thead>
                            <tr>
                                <th style="display:none;">FeeGroupId</th>
                                <th class="size120">Action</th>
                                <th class="size120">Name</th>
                                <th class="size120">Description</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <div id="divFeeGroupPaging"></div>
                </div>
            </section>
        </div>
    </div>
</div>
