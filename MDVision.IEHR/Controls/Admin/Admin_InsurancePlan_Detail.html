<div id="insurancePlanDetail">

                                <table id="dgvAddressInfo" class="table table-bordered table-striped table-condensed table-hover">

                                            <th>State</th>

                                        </tr>
                                    </thead>

    <div id="addressDetailGrid" style="display:none;" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">

            <div class="modal-content ">
                <div class="modal-header">

                    <h4 class="modal-title">Insurance Plan Address Info</h4>
                </div>
                <div class="modal-body">
                    <div id="tblAddressDetail">
                        <form method="post" id="frmAddressInfo" onsubmit="return false">
                            <div class="col-sm-6">
                                <label class="control-label">Address<span class="required">*</span></label>
                                <input class="form-control" id="txtAddInfoAddress" type="text" name="Address" maxlength="100"/>
                            </div>
                            <div class="col-sm-3 p-none">
                                
                                    <div class="col-xs-7">
                                        <label class="control-label">City<span class="required">*</span></label>
                                        <input class="form-control" id="txtAddInfoCity" type="text" name="City" />
                                    </div>
                                    <div class="col-xs-5">
                                        <label class="control-label">State<span class="required">*</span></label>
                                        <input class="form-control" id="txtAddInfoState" type="text" name="State" data-mask="aa" placeholder="AA" style="text-transform:uppercase" />
                                    </div>
                                
                             </div>
                            <div class="col-sm-3 p-none">
                                    <div class="col-xs-7">
                                        <label class="control-label">Zip<span class="required">*</span></label>
                                        <input class="form-control" id="txtAddInfoZip" onblur="utility.FillCityState('#insurancePlanDetail #addressDetailGrid #frmAddressInfo', '#txtAddInfoZip', '#txtAddInfoCity', '#txtAddInfoState')" type="text" name="Zip" data-mask="99999" placeholder="99999" />
                                    </div>
                                    <div class="col-xs-5 pad-a-labelsize">
                                        <input class="form-control" id="txtAddInfoZipExt" type="text" name="ZipExt" data-mask="9999" placeholder="9999" />

                            </div>

                                        <input class="form-control" id="txtAddInfoTelephone" type="text" name="Telephone" data-mask="(999) 999-9999" placeholder="(999) 999-9999" />
                                    </div>
                                    <div class="col-xs-5 pad-a-labelsize">
                                        <input class="form-control" id="txtAddInfoPhoneExt" type="text" name="PhoneExt" data-mask="99999" placeholder="99999" />
                                    </div>
                            </div>
                            <div class="col-sm-3">
