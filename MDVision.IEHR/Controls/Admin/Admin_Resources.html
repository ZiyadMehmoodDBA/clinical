<div class="row" id="pnlAdminResources" style="display:none;">
    <div id="actionPanAdminResources" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_Resources.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search Resource</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Admin_Resources.ResourcesAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_Resources.UnLoadTab()"></a>
                                </div>
                                <h2 class="panel-title">Search Resources </h2>
                            </header>
                            </div>
                        <div class="panel-body" id="pnlResources_Search" onkeypress="return Admin_Resources.checkSubmit(event)">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-3">
                                        <label class="control-label">Short Name</label>
                                        <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                                    </div>
                                    <div class="col-sm-2">
                                        <label class="control-label">Active?</label>
                                        <select id="chkActive" name="Active" class="form-control">
                                            <option value="">- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-2 pad-a-labelsize-btn">
                                        <div class="btn-block">
                                            <button class="btn btn-primary btn-sm" id="btnResourcesSearch" type="button" onclick="Admin_Resources.ResourcesSearch('0');">Search</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>

                <div id="pnlResources_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body">
                            <input type="hidden" id="Resources_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvResources">
                                <thead>
                                    <tr>
                                        <th style="display:none;">ResourceId</th>
                                        <th id="ColumnAction" class="size-min120">Action</th>
                                        <th>Short Name</th>
                                        <th>Description</th>
                                        <th>Facility Name</th>
                                        <th>Duration</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divResourcePaging"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
