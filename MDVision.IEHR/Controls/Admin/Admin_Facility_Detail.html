<div id="facilityDetail">
    <div id="actionPanFacilityDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="facilityDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Facility</h4>
            </div>
            <div class="modal-body">
                <div id="tblfacilityDetail" class="col-sm-12">
                    <form method="post" onsubmit="return false" id="frmFacilityDetail">

                        <div class="form-group">
                            <div class="col-sm-2 col-md-3">
                                <label class="control-label">Short Name <span class="required">*</span></label>
                                <input id="txtShortName" class="form-control" name="ShortName" type="text" placeholder="eg.: Paul Hug" maxlength="50" />
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Description<span class="required">*</span></label>
                                <input id="txtDescription" class="form-control" name="Description" type="text" placeholder="eg.: Some Description" maxlength="55" />
                            </div>
                            <div class="col-sm-3 col-md-2">
                                <label class="control-label ">Practice <span class="required">*</span></label>
                                <select id="ddlPractice" class="form-control" name="Practice" ddlist="GetPractice"></select>
                            </div>

                            <div class="col-sm-2">
                                <label class="control-label ">Place of Service <span class="required">*</span></label>
                                <select id="ddlPos" class="form-control" name="POS" ddlist="GetPlaceOfService"></select>
                            </div>
                            <div class="col-sm-2">
                                <label class="control-label ">NPI <span class="required">*</span></label>
                                <input id="txtNPI" class="form-control" name="NPI" type="text" onblur="utility.ValidateCtrlMask('facilityDetail #frmFacilityDetail', this)" placeholder="9999999999" data-mask="9999999999" />
                            </div>

                            <div class="col-sm-2 col-md-3">
                                <label class="control-label ">Fee Group</label>
                                <select id="ddlFeeGroup" name="FeeGroup" class="form-control" ddlist="GetFeeGroup"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label ">Basic Fee Group</label>
                                <select id="ddlBasicFeeGroup" name="BasicFeeGroup" class="form-control" ddlist="GetBasicFeeGroup"></select>
                            </div>
                            <div class="col-sm-3 col-md-2">
                                <label class="control-label ">Revenue Code</label>
                                <select id="ddlRevenueCode" name="RevenueCode" class="form-control" ddlist="GetRevenueCode"></select>
                            </div>

                            <div class="col-sm-2">
                                <label class="control-label">Taxonomy Code</label>
                                <input id="txtTaxonomyCode" name="TaxonomyCode" class="form-control" type="text" maxlength="10" />
                            </div>
                            <div class="col-sm-2">
                                <label class="control-label ">Statement Group</label>
                                <select id="ddlStatementGroup" name="StatementGroup" class="form-control" ddlist="GetStatementGroup"></select>
                            </div>
                            <div class="col-sm-2 col-md-3">
                                <label class="control-label">Start Date</label>
                                <div class="input-group">
                                    <span class="input-group-addon add-on">
                                        <i class="fa fa-calendar"></i>
                                    </span>
                                    <input class="form-control" name="date" type="text" id="dtpStartDate">
                                </div>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Org. ID </label>
                                <input id="txtOrgId" class="form-control" name="OID" type="text" placeholder="Organization ID" />
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Facility Type</label>
                                <select id="ddlFacilityType" name="FacilityType" class="form-control" ddlist="GetFacilityType" onchange="facilityDetail.facilityTypeChange();"></select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Location</label>
                                <select id="ddlLocation" name="Location" class="form-control" ddlist="GetFacilityLocation"></select>
                            </div>
                            <div class="col-sm-3 col-md-2">
                                <label class="control-label">Mammography Cert #</label>
                                <input id="txtMammographyCert" name="MammographyCert" class="form-control" type="text" maxlength="15" />
                            </div>
                            <div class="col-sm-4">
                                <label class="control-label ">Address <span class="required">*</span></label>
                                <input id="txtAddress" class="form-control" name="Address" type="text" maxlength="55" />
                            </div>

                            <div class="col-sm-5 col-md-3 pl-none">
                                <div class="size65per pl-default pr-default pull-left">
                                    <label class="control-label ">City <span class="required">*</span></label>
                                    <input id="txtCity" class="form-control" name="City" type="text" maxlength="25" />
                                </div>
                                <div class="size35per pull-left pl-default">
                                    <label class="control-label"> State <span class="required">*</span></label>
                                    <input id="txtState" class="form-control" name="State" type="text" onblur="utility.ValidateCtrlMask('facilityDetail #frmFacilityDetail', this)" placeholder="AA" data-mask="aa" style="text-transform:uppercase" />
                                </div>
                            </div>
                            <div class="col-sm-3 pl-none">
                                <div class="size65per pl-default pull-left">
                                    <label class="control-label">Zip </label><span class="required">*</span>
                                    <input id="txtZip" name="Zip" class="form-control" onblur="utility.ValidateCtrlMask('facilityDetail #frmFacilityDetail', this); utility.FillCityState('#facilityDetail #frmFacilityDetail', '#txtZip', '#txtCity', '#txtState')" type="text" placeholder="99999" data-mask="99999" />
                                </div>
                                <div class="size35per pull-left pl-default pad-a-labelsize">
                                    <input id="txtExt" name="Ext" class="form-control" type="text" data-mask="9999" placeholder="9999" />
                                </div>
                            </div>
                            <div class="col-sm-2">
                                <label class="control-label" for="inputDefault"> Telephone #</label>
                                <input id="txtTelephone" name="Telephone" class="form-control" placeholder="(999) 999-9999" type="text" data-mask="(999) 999-9999" />
                            </div>
                            <div class="col-sm-2">
                                <label class="control-label ">Fax #</label>
                                <input id="txtFax" name="Fax" class="form-control" placeholder="(999) 999-9999" type="text" data-mask="(999) 999-9999" />
                            </div>
                            <div class="visible-sm"><div class="clearfix"></div></div>
                            <div class="col-sm-5 col-md-2">
                                <label class="control-label">Email</label>
                                <input id="txtEmail" name="Email" class="form-control" placeholder="eg.: john@abc.com" type="text" maxlength="55" onblur="facilityDetail.EnableValidation(this)" />
                            </div>
                            <div class="col-sm-5 col-md-2">
                                <label class="control-label ">CLIA </label>
                                <input id="txtCLIA" class="form-control" name="CLIA" type="text" maxlength="10" />
                            </div>

                            <div class="hidden-sm"><div class="clearfix"></div></div>
                            <div class="col-sm-3 col-md-3">
                                <label class="control-label">Website</label>
                                <input id="txtWebSite" name="WebSite" class="form-control" type="text" maxlength="190" onblur="facilityDetail.EnableValidation(this)" />
                            </div>
                            <div class="col-sm-4 col-md-5">
                                <label class="control-label">Comments</label>
                                <textarea id="txtComments" name="Comments" class="form-control" maxlength="100" rows="2" spellcheck="true"></textarea>
                            </div>
                            <div class="col-sm-2 col-xs-6 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="BillToPractice" checked="" id="chkBillToPractice">
                                    <label for="Bill to Practice">Bill to Practice</label>
                                </div>
                            </div>
                            <div class="col-sm-2 col-xs-6 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" checked="" name="Active" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                            <div class="col-sm-2">
                                <label class=" control-label">Color</label>
                                <div class="input-group color demo2" data-plugin-colorpicker id="divFacilityColor">
                                    <span class="input-group-addon" style="padding:1px 4px; padding-top:2px;"><i></i></span>
                                    <input type="text" class="form-control" name="Color" id="txtColor">
                                </div>
                            </div>
                            <div class="col-sm-4 col-xs-6 pad-a-labelsize-btn pull-right">
                                <button class="btn btn-primary rightbtn btn-sm" type="submit"> Save & Exit</button>
                                <!--<button id="btnHistoryFacility" class="btn btn-primary btn-xs rightbtn" type="button" onclick="facilityDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                        <div class="spacer20"></div>
                    </form>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
