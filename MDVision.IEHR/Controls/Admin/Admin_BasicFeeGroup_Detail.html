<div id="basicfeegroupDetail">
    <div id="actionPanbasicfeegroupDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="basicfeegroupDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Basic Fee Group</h4>
            </div>
            <div class="modal-body">
                <div id="tblbasicfeegroupDetail" class="col-sm-12">
                    <form method="post" onsubmit="return false" id="frmBasicFeeGroupDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="control-label">Name</label><span class="required">*</span>
                                <input class="form-control" name="Name" id="txtName" placeholder="eg.: Paul Hug" maxlength="10" type="text" />
                            </div>
                            <div id="divBasicFeeGroup_Entity" class="col-sm-4">
                                <label class="control-label">Entity<span class="required">*</span></label>
                                <select id="ddlEntity" name="Entity" class="form-control" onchange="basicfeegroupDetail.LoadNextBasicFeeGroup(this.value);" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-sm-4 pad-a-labelsize" id="pnlIsActive">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Active" id="chkIsActive">
                                    <label for="chkIsActive">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-12">
                                <label class="control-label">Description</label>
                                <input class="form-control" id="txtDescription" name="Description" placeholder="eg.: Some Description" maxlength="55" type="text" />
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="control-label" for="End Date">End Date</label>
                                <div class="input-group">
                                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                                    <input class="form-control" type="text" name="EndDate"   data-plugin-datepicker="" id="txtEndDate">
                                </div>
                            </div>
                            <div class="col-sm-4">
                                <label class="control-label" for="Next Basic Fee Group">Next Fee Group</label>
                                <select class="form-control" name="NextBasicFeeGroup" id="ddlNextBasicFeeGroup" ddlist="GetBasicFeeGroup"></select>
                            </div>
                            <div class="col-sm-4 mt-md">
                                <button class="btn btn-primary btn-sm rightbtn " type="submit">Save & Exit</button>
                                <!--<button id="btnHistorybasicfeegroup" class="btn btn-primary btn-sm rightbtn" type="button" onclick="basicfeegroupDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                        <div class="hidden-xs"><div class="clearfix spacer10"></div></div>
                    </form>
                    <div class="clearfix"></div>
                </div>
            </div><div class="clearfix"></div>
        </div>
    </div>
</div>
