<div id="modifierDetail">
    <div id="actionPanmodifierDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close"  onclick="modifierDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Modifier</h4>
            </div>
            <div class="modal-body">
                <div id="tblmodifierDetailDetail" class="col-md-12">
                    <form method="post" id="frmModifierDetail" onsubmit="return false">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="control-label">Modifier Code<span class="required">*</span></label>
                                <input class="form-control" name="ModifierCode" id="txtModifierCode" type="text" data-mask="ww" />
                            </div>
                            <div class="col-sm-8">
                                <label class="control-label">Description</label><span class="required">*</span>
                                <input class="form-control" id="txtDescription" name="Description" type="text" maxlength="55" />
                            </div>
                            <div class="clearfix"></div>
                            <div class="col-sm-3 col-xs-6 mt-sm">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="Active" checked="" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>
                            <div class="col-sm-4 col-xs-6 mt-sm pull-right"><button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button></div>
                            <!--<button id="btnHistoryModifier" class="btn btn-primary btn-sm rightbtn" type="button" onclick="modifierDetail.ShowHistory();">History</button>-->
                        </div>
                    </form>
                    <div class="clearfix"></div>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
