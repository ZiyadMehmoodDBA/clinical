<div id="folderDetail">
    <div id="actionPanfolderDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="folderDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Folder</h4>
            </div>
            <div class="modal-body">
                <div id="tblfolderDetail" class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmfolderDetail">
                        <div class="form-group">
                            <div class="col-sm-3">
                                <label class="control-label">Name <span class="required">*</span></label>
                                <input class="form-control" id="txtName" name="Name" type="text" maxlength="15">
                            </div>
                            <div class="col-sm-6">
                                <label class="control-label">Description</label>
                                <input class="form-control" id="txtDescription" name="Description" type="text">
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Type <span class="required">*</span></label>
                                <select class="form-control" id="ddlType" name="Type" ddlist="GetDocumentType"></select>
                            </div>
                            <div class="clearfix"></div>
                            <div class="col-sm-3">
                                <label class="control-label">Barcode Value</label>
                                <input class="form-control" type="text" name="BarcodeValue" id="txtBarcodeValue" maxlength="250">
                            </div>
                            <div class="col-sm-3 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input id="chkActive" name="Active" checked type="checkbox">
                                    <label class="control-label" for="chkActive">Active</label>
                                </div>
                            </div>
                            <div class="col-xs-6 pad-a-labelsize-btn pull-right">
                                <button id="btnSaveFolder" type="submit" class="btn btn-primary rightbtn btn-sm">Save & Exit</button>
                                <!--<button id="btnHistoryfolder" class="btn btn-primary btn-sm rightbtn" type="button" onclick="folderDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                    </form>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
