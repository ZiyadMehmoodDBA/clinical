<div class="row" id="pnlAdminInsur" style="display:none;">
    <div id="actionPanAdminInsur" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog" class=" modal-dialog-full">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_Insur.UnLoadTab();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search Insurance</h4>
            </div>
            <div id="modalbody">
                <button type="button" class="btn btn-success btn-sm" onclick="Admin_Insur.InsuranceAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                <div class="spacer10"></div><div class="clearfix"></div>
                <section class="panel panel-featured">
                    <header class="panel-heading">
                        <div class="panel-actions">
                            <a href="#" class="closebtn pull-right" onclick="Admin_Insur.UnLoadTab();"></a>
                        </div>
                        <h2 class="panel-title">Search Insurance </h2>
                    </header>
                    <div class="panel-body" id="pnlInsur_Search">
                        <form class="form-bordered" method="post" onsubmit="return false">
                            <!--start - CONTENTS-->
                            <div class="form-group">
                                <div class="col-sm-2 col-md-2">
                                    <label class="control-label">Short Name</label>
                                    <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                                </div>
                                <div class="col-sm-5 col-md-6">
                                    <label class="control-label">Description</label>
                                    <input class="form-control" id="txtDescription" type="text" maxlength="55" />
                                </div>
                                <div id="divInsurance_Entity" class="col-sm-3 col-md-2">
                                    <label class="control-label">Entity</label>
                                    <select id="ddlEntity" class="form-control" ddlist="GetEntity"></select>
                                </div>
                                <div class="col-sm-2  col-md-2">
                                    <label class="control-label">Active?</label>
                                    <select id="ddlActive" class="form-control ">
                                        <option value="">- All -</option>
                                        <option value="1" selected="selected">Active</option>
                                        <option value="0">Inactive</option>
                                    </select>
                                </div>
                                <div class="col-sm-2 pad-a-labelsize-btn pull-right">
                                    <button class="btn btn-primary btn-sm" id="btnInsurSearch" type="submit" onclick="Admin_Insur.InsuranceSearch();">Search</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </section>

                <div id="pnlInsur_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body">
                            <input type="hidden" id="Insur_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvInsur">
                                <thead>
                                    <tr>
                                        <th style="display:none;">InsuranceId</th>
                                        <th class="size120">Action</th>
                                        <th class="size150">Short Name</th>
                                        <th>Description</th>
                                        <th>Email</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divInsurancePaging"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
