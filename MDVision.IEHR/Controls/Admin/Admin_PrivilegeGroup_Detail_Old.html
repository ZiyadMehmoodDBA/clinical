<div class="col-md-12" id="privilegeGroupDetail">
    <div class="panel-body">
        <form method="post" onsubmit="return false" id="frmPrivilegeGroupDetail">
            <!--start - CONTENTS-->
            <div class="form-group">
                <div class="col-md-1 size120">
                    <label class="control-label">Short Name</label>
                    <input class="form-control size100" id="txtShortName" name="ShortName" type="text" />
                </div>
                <div class="col-md-3">
                    <label class="control-label">Description</label>
                    <input class="form-control" id="txtDiscription" name="Description" type="text" />
                </div>
                <div class="col-md-3 pad-a-labelsize">
                    <div class="checkbox-custom checkbox-default">
                        <input type="checkbox" checked="" id="chkActive">
                        <label for="chkActive">Active</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary btn-sm rightbtn" type="button" onclick="privilegeGroupDetail.PrivilegeGroupSave_OnClick();">Save</button>
                </div>
            </div>
            <div class="clearfix"></div>
            <div class="spacer20"></div>
            <div id="pnlPrivilegeGroup" style="display:inline;">
                <div class="col-md-7 five-three">
                    <div class="col-md-4 panel">
                        <header class="panel-blue center">Entity</header>
                        <div class="panel-body height150" id="pnlEntity">
                        </div>
                    </div>
                    <div class="col-md-4 panel">
                        <header class="panel-heading center">Practice</header>
                        <div class="panel-body height150" id="pnlPractice">
                        </div>
                    </div>
                    <div class="col-md-4 panel">
                        <header class="panel-heading center">Facility</header>
                        <div class="panel-body height150" id="pnlFacility">
                        </div>
                    </div>
                </div>
                <div class="col-md-5 five-two">
                    <div class="col-md-6 panel">
                        <header class="panel-heading  center">Provider</header>
                        <div class="panel-body height150" id="pnlProvider">
                        </div>
                    </div>
                    <div class="col-md-6 panel">
                        <header class="panel-heading center">Resource</header>
                        <div class="panel-body height150" id="pnlResources">
                        </div>
                    </div>
                </div>
            </div>
            <div class="clearfix"></div>
        </form>
    </div>
</div>
