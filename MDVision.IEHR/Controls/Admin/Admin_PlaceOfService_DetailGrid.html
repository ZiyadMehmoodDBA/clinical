<div id="placeofserviceDetailGrid">

    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="placeofserviceDetailGrid.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">POS Plan Info</h4>
            </div>
            <div class="modal-body">
                <div id="tblspecialtyDetail">
                    <form method="post" id="frmplaceofserviceDetailGrid" onsubmit="return false">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-md-12">
                                <label class="control-label">Plan<span class="required">*</span></label>
                                <select id="ddlInsurancePlan" name="Plan" class="form-control size100" ddlist="GetInsurancePlan"></select>
                            </div>
                            <div class="col-md-12">
                                <label class="control-label">POS</label>
                                <input class="form-control" id="txtPOS" name="POS" type="text" maxlength="55" />
                            </div>
                            <div class="col-md-6 pad-a-labelsize-btn">
                                <div class="btn-block">
                                    <button class="btn btn-primary btn-sm" type="submit">Save & Exit</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
