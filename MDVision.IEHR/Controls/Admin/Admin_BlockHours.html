<script type="text/javascript">
    $(document).ready(function () {

        //------------ Radio Provider/Resource check-------

        $('#pnlAdminBlockHours #divResource').hide();

        $('#pnlAdminBlockHours #rdResource').click(function () {
            if ($(this).is(':checked')) {


                $('#pnlAdminBlockHours #divResource').show();
                $('#pnlAdminBlockHours #divProvider').hide();

                $('#pnlAdminBlockHours #ddlProvider').val("");

            }
            else {

            }
        });

        $('#pnlAdminBlockHours #rdProvider').click(function () {
            if ($(this).is(':checked')) {

                $('#pnlAdminBlockHours #divResource').hide();
                $('#pnlAdminBlockHours #divProvider').show();

                $('#pnlAdminBlockHours #ddlResource').val("");

            }
            else {

            }
        });

            defaultTime: false

        });
        $('#pnlAdminBlockHours #blockHoursToTime').timepicker({
            defaultTime: false

        });

    });
</script>
