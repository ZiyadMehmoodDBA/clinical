<div id="CCMICDGroupsDetail">
    <div id="actionPanCCMICDGroupsDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Admin_CCMICDGroups_Detail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Add ICD Group</h4>
                <div class="spacer10"></div><div class="clearfix"></div>
            </div>
            <div class="modal-body">
                <div id="tblCCMICDGroupsDetail" class="col-sm-12">
                    <form method="post" onsubmit="return false" id="frmCCMICDGroupsDetail">
                            <div class="col-sm-2">
                                <label class="control-label">Name <span class="required">*</span></label>
                                <input id="txtICDGroupName" class="form-control" name="Name" type="text" maxlength="100" />
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Description</label>
                                <input id="txtICDGroupDescription" class="form-control" name="Description" type="text" maxlength="300" />
                            </div>
                            <div class="col-sm-1 col-xs-3 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" checked="" name="Active" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>
                            <div class="col-sm-1 pad-a-labelsize-btn">
                                <button class="btn btn-primary rightbtn btn-sm" type="submit" > Save</button>
                            </div>
                            <input type="hidden" id="hftxtICDGroupId" />
                    </form>
                    <span class="spacer10"></span>
                    <div class="col-sm-12">
                        <label class="control-label" id="lblCCMProblems">Problems</label>
                        <input class="form-control" id="txtCCMProblems" oninput="Admin_CCMICDGroups_Detail.BindICD9AutoComplete(this)" name="CCMProblems" type="text" placeholder="Start typing to search" value="">
                    </div>
                    <span class="spacer10"></span>

                    <input type="hidden" id="hftxtICD9Code" />
                    <input type="hidden" id="hftxtICD9Description" />
                    <input type="hidden" id="hftxtICD10Code" />
                    <input type="hidden" id="hftxtICD10Description" />
                    <input type="hidden" id="hftxtSNOMEDCode" />
                    <input type="hidden" id="hftxtSNOMEDDescription" />
                    <input type="hidden" id="Encounter_Open_CCMICDGroupsDetail_SelectedDataKeys" />
                    <div id="dgvCCMICDGroupsDetail"></div>
                    <div id="divCCMICDGroupsDetailPaging"></div>
                   
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
