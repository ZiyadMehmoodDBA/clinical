<div class="row" id="pnlAdminEDITaxIDSetup" style="display:none;">
    <div id="actionPanAdminEDITaxIDSetup" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_EDITaxIDSetup.EDITaxIDSetupAdd();"><i class="fa fa-plus-circle"></i> Add</button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_EDITaxIDSetup.UnLoadTab();"></a>
                </div>
                <h2 class="panel-title">Search EDI Tax ID Setup </h2>
            </header>
            <div class="panel-body" id="pnlEDITaxIDSetup_Search">
                <form class="form-bordered" method="post" onsubmit="return false">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-md-2">
                            <label class="control-label" for="Tax ID">Tax ID</label>
                            <input type="text" class="form-control" id="txtTaxID" maxlength="9">
                        </div>
                        <div class="col-md-3">
                            <label for="Clearinghouse" class="control-label">Clearing House</label>
                            <select id="ddlClearinghouse" class="form-control" ddlist="GetClearingHouse"></select>
                        </div>
                        <div class="col-md-3">
                            <label class="control-label" for="Entity">Entity</label>
                            <select id="ddlEntity" class="form-control" ddlist="GetEntity" onchange="Admin_EDITaxIDSetup.LoadEntityBasedData($(this).val())"></select>
                        </div>
                        <div class="col-sm-2  ">
                            <label class="control-label">Active?</label>
                            <select id="ddlActive" class="form-control ">
                                <option value="">- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-md-2 pad-a-labelsize-btn">
                            <div class="btn-block">
                                <button class="btn btn-primary btn-sm" id="btnEDITaxIDSetupSearch" type="button" onclick="Admin_EDITaxIDSetup.EDITaxIDSetupSearch();">Search</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <div id="pnlEDITaxIDSetup_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="EDITaxIDSetup_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvEDITaxIDSetup">
                    <thead>
                        <tr>
                            <th style="display:none;">EDITaxIDSetupId</th>
                            <th>Action</th>
                            <th>Tax ID</th>
                            <th>Clearing House</th>
                            <th>Entity</th>
                            <th>Submitter</th>
                            <th>Receiver</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divEDITaxIDSetupPaging"></div>
            </div>
        </section>
    </div>
</div>
