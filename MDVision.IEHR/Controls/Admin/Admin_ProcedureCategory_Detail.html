<div id="procedurecategoryDetail">
    <div id="actionPanprocedurecategoryDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="procedurecategoryDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Procedure Category</h4>
            </div>
            <div class="modal-body">
                <div class="col-md-12 p-none">
                    <form method="post" onsubmit="return false" id="frmProcedureCategoryDetail">
                        <!--start - CONTENTS-->
                        <div class="form-group">
                            <div class="col-xs-6">
                                <label class="control-label">Name</label><span class="required">*</span>
                                <input class="form-control" name="Name" id="txtName" maxlength="10" type="text" />
                            </div>
                            <div class="col-xs-2 pad-a-labelsize" id="pnlIsActive">
                                <div class="checkbox-custom checkbox-default">
                                    <input type="checkbox" name="IsActive" id="chkIsActive">
                                    <label for="chkIsActive">Active</label>
                                </div>
                            </div>
                            <div class="col-xs-9">
                                <label class="control-label">Description</label>
                                <input class="form-control" name="Description" id="txtDescription" maxlength="55" type="text" />
                            </div>
                            <div class="col-xs-3 pl-none pr-none mt-md">
                                <button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                                <!--<button id="btnHistoryProcedureCategory" class="btn btn-primary btn-sm rightbtn" type="button" onclick="procedurecategoryDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                        <div class="clearfix"></div>
                    </form>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
