<div class="row" id="pnlAdminEDIReceiver" style="display:none;">
    <div id="actionPanAdminEDIReceiver" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_EDIReceiver.ReceiverSetupAdd();">
            <i class="fa fa-plus-circle"></i> Add
        </button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_EDIReceiver.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Receiver Setup </h2>
            </header>
            <div class="panel-body" id="pnlReceiverSetup_Search">
                <form class="form-bordered" method="get">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-sm-3">
                            <label class="control-label">Short Name</label>
                            <input class="form-control" id="txtShortName" type="text" maxlength="55" />
                        </div>
                        <div class="col-sm-3">
                            <label class="control-label">Submitter ID</label>
                            <input class="form-control" id="txtSubmitterId" type="text" maxlength="60" />
                        </div>
                        <div class="col-sm-3">
                            <label class="control-label">Clearing House</label>
                            <select id="ddlClearingHouse" class="form-control" ddlist="GetClearingHouse"></select>
                        </div>
                        <div class="col-sm-3 col-lg-2">
                            <label class="control-label">Entity</label>
                            <select id="ddlEntity"  class="form-control" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-sm-2  ">
                            <label class="control-label">Active?</label>
                            <select id="ddlActive" class="form-control ">
                                <option value="">- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 col-lg-1 mt-md pull-right">
                            <button class="btn btn-primary btn-sm rightbtn" id="btnReceiverSetupSearch" type="button" onclick="Admin_EDIReceiver.ReceiverSetupSearch('0');">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <div id="pnlReceiverSetup_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="ReceiverSetup_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvReceiverSetup">
                    <thead>
                        <tr>
                            <th style="display:none;">ReceiverSetupId</th>
                            <th>Action</th>
                            <th>Receiver Name</th>
                            <th>Submitter ID</th>
                            <th>ANSI5010</th>
                            <th>Receiver ID</th>
                            <th>Clearing House</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divReceiverSetupPaging"></div>
            </div>
        </section>
    </div>
</div>
