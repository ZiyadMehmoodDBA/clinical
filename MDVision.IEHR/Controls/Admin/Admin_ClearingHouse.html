<div class="row" id="pnlAdminClearingHouse" style="display:none;">
    <div id="actionPanAdminClearingHouse" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_ClearingHouse.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search Clearing House</h4>
            </div>
            <div id="modalbody">

                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Admin_ClearingHouse.ClearingHouseAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>

                    <section class="panel panel-featured">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_ClearingHouse.UnLoadTab()"></a>
                                </div>
                                <h2 class="panel-title max">Search Clearing House </h2>
                            </header>
                        <div class="panel-body" id="pnlClearingHouse_Search">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-2">
                                        <label class="control-label">Short Name</label>
                                        <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="control-label">Type</label>
                                        <select id="ddlClearingHouseType" class="form-control" ddlist="GetClearingHouseType"></select>
                                    </div>
                                    <div id="divClearingHouse_Entity" class="col-sm-3">
                                        <label class="control-label">Entity</label>
                                        <select id="ddlEntity" name="Entity" class="form-control" ddlist="GetEntity"></select>
                                    </div>
                                    <div class="col-sm-2  ">
                                        <label class="control-label">Active?</label>
                                        <select id="ddlActive" class="form-control ">
                                            <option value="">- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-2 pad-a-labelsize-btn pull-right">
                                        <div class="btn-block">
                                            <button class="btn btn-primary btn-sm" id="btnClearingHouseSearch" type="button" onclick="Admin_ClearingHouse.ClearingHouseSearch();">Search</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                    <div id="pnlClearingHouse_Result" style="display: none;">
                        <section class="panel">
                            <div class="panel-body">
                                <input type="hidden" id="ClearingHouse_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvClearingHouse">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">ClearingHouseId</th>
                                            <th>Action</th>
                                            <th>Short Name</th>
                                            <th>Type</th>
                                            <th>EDI Submit Allowed</th>
                                            <th>Claim Status Allowed</th>
                                            <th>Eligibility Allowed</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divClearingHousePaging"></div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
         </div>
    </div>
</div>
