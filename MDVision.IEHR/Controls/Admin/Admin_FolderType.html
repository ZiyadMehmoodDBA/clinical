<div class="row" id="pnlAdminFolderType" style="display:none;">
    <div id="actionPanAdminFolderType" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Admin_FolderType.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Search Folder Type</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Admin_FolderType.FolderTypeAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>

                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Admin_FolderType.UnLoadTab()"></a>
                                </div>
                                <h2 class="panel-title">Search Folder Type </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlAdminFolderType_Search">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <!--start - CONTENTS-->
                                <div class="form-group">
                                    <div class="col-sm-3 col-md-2">
                                        <label class="control-label">Name</label>
                                        <input class="form-control" id="txtName" type="text" />
                                    </div>
                                    <div class="col-sm-6 col-md-5">
                                        <label class="control-label">Description</label>
                                        <input class="form-control" id="txtDiscription" type="text" />
                                    </div>
                                    <div class="col-sm-3 col-md-2">
                                        <label class="control-label">Entity</label>
                                        <select id="ddlEntity" class="form-control" ddlist="GetEntity"></select>
                                    </div>
                                    <div class="col-sm-3 col-md-2">
                                        <label class="control-label">Active?</label>
                                        <select id="chkIsActice" class="form-control">
                                            <option value="" >- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-2 col-md-1 pad-a-labelsize-btn">
                                        <button class="btn btn-primary btn-sm" id="btnFolderTypeSearch" type="button" onclick="Admin_FolderType.FolderTypeSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>

                <div id="pnlAdminFolderType_Result" style="display: none;">
                    <section class="panel">
                        <div class="panel-body">
                            <input type="hidden" id="Folder_SelectedDataKeys" />
                            <table class="table table-bordered table-condensed table-striped table-hover mb-none" id="dgvAdminFolderType">
                                <thead>
                                    <tr>
                                        <th style="display:none;">FolderTypeId</th>
                                        <th class="size110">Action</th>
                                        <th class="size100">Name</th>
                                        <th class="size200">Description</th>
                                        <th class="size100">Entity</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="DivAdminFolderTypePaging"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
