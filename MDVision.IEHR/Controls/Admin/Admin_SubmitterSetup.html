<div class="row" id="pnlAdminSubmitterSetup" style="display:none;">
    <div id="actionPanAdminSubmitterSetup" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="mainScrollPan" id="mainScrollPan">
        <button type="button" class="btn btn-success btn-sm" onclick="Admin_SubmitterSetup.SubmitterSetupAdd();">
            <i class="fa fa-plus-circle"></i> Add
        </button>
        <div class="spacer10"></div><div class="clearfix"></div>
        <section class="panel panel-featured">
            <header class="panel-heading">
                <div class="panel-actions">
                    <a href="#" class="closebtn pull-right" onclick="Admin_SubmitterSetup.UnLoadTab()"></a>
                </div>
                <h2 class="panel-title">Search Submitter Setup </h2>
            </header>
            <div class="panel-body" id="pnlSubmitterSetup_Search">
                <form class="form-bordered" method="get">
                    <!--start - CONTENTS-->
                    <div class="form-group">
                        <div class="col-sm-3">
                            <label class="control-label">Organization Last Name</label>
                            <input class="form-control" id="txtOrganizzationLastName" type="text" maxlength="60" />
                        </div>
                        <div class="col-sm-2 col-md-2">
                            <label class="control-label">Short Name</label>
                            <input class="form-control" id="txtShortName" type="text" maxlength="10" />
                        </div>
                        <div class="col-sm-2">
                            <label class="control-label">Entity</label>
                            <select id="ddlEntity" name="Entity" class="form-control" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-sm-3 col-md-2">
                            <label class="control-label">Active?</label>
                            <select id="ddlIsActice" class="form-control">
                                <option value="" >- All -</option>
                                <option value="1" selected="selected">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                        <div class="col-sm-2 col-md-1 pad-a-labelsize-btn">
                            <button class="btn btn-primary btn-sm" id="btnSubmitterSetupSearch" type="button" onclick="Admin_SubmitterSetup.SubmitterSetupSearch('0');">Search</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <div id="pnlSubmitterSetup_Result" style="display: none;">
        <section class="panel">
            <div class="panel-body">
                <input type="hidden" id="SubmitterSetup_SelectedDataKeys" />
                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvSubmitterSetup">
                    <thead>
                        <tr>
                            <th style="display:none;">SubmitterSetupId</th>
                            <th class="size95">Action</th>
                            <th class="size90">Short Name</th>
                            <th>1000A NM103 Organization Last Name</th>
                            <th>1000A NM105 Submitter First Name</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="divSubmitterSetupPaging"></div>
            </div>
        </section>
    </div>
</div>
