<div id="submitterSetupDetail">
    <div id="actionPansubmitterSetupDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="submitterSetupDetail.UnLoad();"><span class=" red" >&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Submitter Setup</h4>
            </div>
            <div class="modal-body">
                <div id="tblsubmitterSetupDetail" class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmSubmitterSetupDetail">
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="control-label">Short Name<span class="required">*</span></label>
                                <input type="text" id="txtShortName" class="form-control" name="ShortName" maxlength="10">
                            </div>
                            <div class="col-sm-4 ">
                                <label class="control-label">Entity<span class="required">*</span></label>
                                <select id="ddlEntity" name="Entity" class="form-control" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-sm-4">
                                <label for="1000A NM103 Organization Last Name" class="control-label">
                                    100A NM103 Organization Last Name<span class="required">*</span>
                                </label>
                                <input type="text" id="txtOrganizationLastName" class="form-control" name="OrganizationLastName" maxlength="60">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-4 ">
                                <label for="AA0 7 Submitter Address 1" class="control-label">
                                    AA0 7 Submitter Address 1<span class="required">*</span>
                                </label>
                                <input type="text" class="form-control" id="txtSubmitterAddress1" name="SubmitterAddress1" maxlength="55">
                            </div>
                            <div class="col-sm-4">
                                <label for="AA0 8 Submitter Address 2" class="control-label">AA0 8 Submitter Address 2</label>
                                <input type="text" id="txtSubmitterAddress2" name="SubmitterAddress2" class=" form-control" maxlength="55">
                            </div>
                            <div class="col-sm-4 ">
                                <label for="AA0 9 City" class="control-label">AA0 9 City <span class="required">*</span></label>
                                <input type="text" class="form-control" id="txtCity" name="City" maxlength="30">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-4">
                                <label class="control-label" for="AA0 10 State">AA0 10 State <span class="required">*</span></label>
                                <input type="text" class="form-control" id="txtState" name="State" maxlength="2" style="text-transform:uppercase">
                            </div>
                            <div class="col-sm-4 ">
                                <label for="AA0 11 Zipcode" class="control-label">AA0 11 Zipcode <span class="required">*</span></label>
                                <input type="text" id="txtZipcode" class="form-control" name="Zipcode" data-mask="99999-9999" placeholder="99999-9999">
                            </div>
                            <div class="col-sm-4">
                                <label for="AA0 12 Region" class="control-label">AA0 12 Region </label>
                                <input type="text" class="form-control" id="txtRegion" name="Region">
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="col-sm-4 ">
                                <label for="1000A Per02 Contact Name" class="control-label">
                                    1000A Per02 Contact Name<span class="required">*</span>
                                </label>
                                <input type="text" id="txtContactName" class="form-control" name="ContactName" maxlength="60">
                            </div>
                            <div class="col-sm-4">
                                <label for="1000A Per04 Contact Telephone" class="control-label">
                                    1000A Per04 Contact Telephone<span class="required">*</span>
                                </label>
                                <input type="text" id="txtContactTelephone" class="form-control" name="ContactTelephone" data-mask="(999) 999-9999" placeholder="(999) 999-9999">
                            </div>
                            <div class="col-sm-4 hidden">
                                <label for="1000A NM101 Entity Identifier" class="control-label">
                                    1000A NM101 Entity Identifier<span class="required">*</span>
                                </label>
                                <input type="text" class="form-control" id="txtEntityIdentifier" name="EntityIdentifier" maxlength="3">
                            </div>
                            <div class="col-sm-4 ">
                                <label for="1000A NM109 Identification Code" class="control-label">
                                    1000A NM109 Identification Code <span class="required">*</span>
                                </label>
                                <input type="text" class="form-control" id="txtIdentificationCodeQualifier" name="IdentificationCodeQualifier" maxlength="2">
                            </div>
                        </div>
                        <div class="form-group hidden">
                            <div class="col-sm-4 hidden">
                                <label class="control-label" for="1000A NM102 Entity Type Qualifier">
                                    1000A NM102 Entity Type Qualifier<span class="required">*</span>
                                </label>
                                <input type="text" class="form-control" id="txtEntityTypeQualifier" name="EntityTypeQualifier" maxlength="1">
                            </div>
                            <div class="col-sm-4 hidden">
                                <label class="control-label" for="1000A NM104 Submitter First Name">
                                    1000A NM104 Submitter First Name<span class="required">*</span>
                                </label>
                                <input type="text" id="txtSubmitterFirstName" class="form-control" name="SubmitterFirstName" maxlength="35">
                            </div>
                            <div class="col-sm-4 hidden">
                                <label class="control-label" for="1000A NM105 Submitter Middle Name">
                                    1000A NM105 Submitter Middle Name<span class="required">*</span>
                                </label>
                                <input type="text" id="txtSubmitterMiddleName" class="form-control" name="SubmitterMiddleName" maxlength="25">
                            </div>
                        </div>
                        <div class=" col-sm-4">
                            <div class="checkbox-custom checkbox-default">
                                <input type="checkbox" name="IsActive" id="chkIsActive" checked="checked">
                                <label for="chkIsActive">Active</label>
                            </div>
                        </div>
                        <div class="form-group">
                           
                            <div class="col-sm-4 pad-a-labelsize-btn pull-right">
                                <button type="submit" class="btn btn-primary btn-sm rightbtn">Save & Exit</button>
                                <!--<button id="btnHistorysubmitterSetup" class="btn btn-primary btn-sm rightbtn" type="button" onclick="submitterSetupDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                    </form>
                    <div class="clearfix"></div>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
