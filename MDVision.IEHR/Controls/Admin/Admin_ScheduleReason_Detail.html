<div id="scheduleReasonDetail">
    <div id="actionPanscheduleReasonDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="scheduleReasonDetail.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Schedule Reason</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmScheduleReasonDetail" onsubmit="return false">
                    <div class="form-group">
                        <div class="col-xs-4">
                            <label class="control-label">Short Name<span class="required">*</span></label>
                            <input class="form-control " id="txtShortName" name="ShortName" type="text" maxlength="10" />
                        </div>
                        <div id="divReason_Entity" class="col-xs-5">
                            <label class="control-label">Entity<span class="required">*</span></label>
                            <select id="ddlEntity" class="form-control " name="Entity" ddlist="GetEntity"></select>
                        </div>
                        <div class="col-xs-3 pr-none pl-xs">
                            <label class="control-label">Duration(Min)<span class="required">*</span></label>
                            <input class="form-control" id="txtDuration" type="text" name="Duration" maxlength="3" placeholder="999" onkeypress="return utility.ValidateZero(event, this);" />
                        </div>
                       
                    </div>
                    <div class="form-group">
                        <div class="col-xs-10">
                            <label class="control-label">Description</label>
                            <input class="form-control" id="txtDescription" name="Description" type="text" maxlength="55" />
                        </div>
                        <div class="col-xs-2 pad-a-labelsize pl-xs">
                            <div class="checkbox-custom checkbox-default">
                                <input type="checkbox" checked="" name="Active" id="chkActive">
                                <label for="chkActive">Active</label>
                            </div>
                        </div>
                        <div class="col-xs-4 mt-sm pull-right pr-none">
                            <button class="btn btn-primary btn-sm rightbtn" type="submit">Save & Exit</button>
                            <!--<button id="btnHistorySchReason" class="btn btn-primary btn-sm rightbtn" type="button" onclick="scheduleReasonDetail.ShowHistory();">History</button>-->
                        </div>
                    </div>
                    <div class="clearfix"></div>
                </form>
            </div>
            <div class="clearfix"></div>
        </div>
    </div>
</div>
