<div id="editaxidsetupDetail">
    <div id="actionPaneditaxidsetupDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="editaxidsetupDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">EDI Tax ID Setup</h4>
            </div>
            <div class="modal-body">
                <div id="tbleditaxidsetupDetail" class="col-md-12">
                    <form method="post" onsubmit="return false" id="frmEDITaxIDSetupDetail">
                        <div class="form-group">
                            <div class="col-md-4">
                                <label class="control-label" for="Entity">Entity <span class="required">*</span></label>
                                <select id="ddlEntity" class="form-control" onchange="editaxidsetupDetail.LoadEntityBasedData($(this).val())" name="Entity" ddlist="GetEntity"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="control-label" for="Tax ID">Tax ID <span class="required">*</span></label>
                                <input type="text" class="form-control size80" id="txtTaxID" name="TaxID" maxlength="10">
                            </div>
                            <div class="col-md-4">
                                <label for="Clearinghouse" class="control-label">Clearing House<span class="required">*</span></label>
                                <select id="ddlClearingHouse" class="form-control" name="ClearingHouse" ddlist="GetClearingHouse"></select>
                            </div>

                            <div class="clearfix"></div>
                            <div class="col-md-4">
                                <label class="control-label" for="Entity">Submitter <span class="required">*</span></label>
                                <select id="ddlSubmittterSetup" class="form-control" name="Submitter" ddlist="GetSubmitterSetup"></select>
                            </div>
                            <div class="col-md-4">
                                <label class="control-label" for="Entity">Receiver <span class="required">*</span></label>
                                <select id="ddlReceiverSetup" class="form-control" name="Receiver" ddlist="GetEDIReceiverSetup"></select>
                            </div>
                            <div class="col-md-4 pad-a-labelsize">
                                <div class="checkbox-custom  checkbox-default">
                                    <input type="checkbox" checked="" name="Active" id="chkActive">
                                    <label for="chkActive">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="clearfix"></div>
                            <div class="btn-block">
                                <button type="submit" class="btn btn-primary btn-sm rightbtn">Save & Exit</button>
                                <!--<button id="btnHistoryeditaxidsetup" class="btn btn-primary btn-sm rightbtn" type="button" onclick="editaxidsetupDetail.ShowHistory();">History</button>-->
                            </div>
                        </div>
                    </form>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
