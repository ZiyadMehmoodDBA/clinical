<div class="row" id="pnlBatchClinicalQualityMeasure" style="display:none;">
    <div id="actionPanBatchClinicalQualityMeasure" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Batch_ClinicalQualityMeasure.UnLoadTab();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Clinical Quality Measures (CQM) !</h4>
            </div>
            <div id="modalbody">
                <form method="post" id="frmBatchClinicalQualityMeasure" onsubmit="return false">
                    <div class="mainScrollPan" id="mainScrollPan">
                        <div class="spacer10"></div><div class="clearfix"></div>
                        <section class="panel panel-featured">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Batch_ClinicalQualityMeasure.UnLoadTab()"></a>
                                </div>
                                <h2 class="panel-title max">Clinical Quality Measures (CQM) </h2>
                            </header>
                            <div class="panel-body" id="pnlBatchClinicalQualityMeasure_Search">
                                <form class="form-bordered" method="post" onsubmit="return false">
                                    <div class="form-group">
                                        <div class="col-sm-2 col-lg-2">
                                            <label id="lblProvider" class="control-label">Provider</label>
                                            <a id="lnkProviderEdit" style="display:none;" href="#" onclick="Batch_ClinicalQualityMeasure.OpenProviderDetail();" title="Edit Provider">Provider</a>
                                            <div class="input-group">
                                                <input class="form-control" id="txtProvider" type="text" placeholder="Start typing to search" name="Provider" customname="Provider" maxlength="35" oninput="Batch_ClinicalQualityMeasure.ResetNPI();" data-bv-field="Provider" />
                                                <div class="input-group-btn">
                                                    <button id="lnkProvider" class="btn btn-primary btn-xs " type="button" onclick="Batch_ClinicalQualityMeasure.OpenProvider();"><i class="fa fa-search"></i></button>
                                                </div>
                                            </div>

                                        </div>
                                        <div class="col-sm-3 col-lg-2">
                                            <label class="control-label">NPI</label>
                                            <input id="NPItxt" name="NPI" class="form-control" type="text" placeholder="9999999999" maxlength="10" onchange="Batch_ClinicalQualityMeasure.ResetProvider();" onkeypress="return utility.ValidateZero(event, this);" onblur="utility.FillProviderNPI('#pnlBatchClinicalQualityMeasure #frmBatchClinicalQualityMeasure', '#hfProviderId', '#NPItxt')" data-bv-field="NPI" />
                                        </div>
                                        <div class="col-sm-3 col-lg-2 ">
                                            <label class="control-label">Date From </label>
                                            <div class="input-group">
                                                <div class="input-group-addon"><i class="fa fa-calendar"></i></div>
                                                <input type="text" id="dtpDateFrom" name="DateFrom" class="form-control" data-plugin-datepicker="" autocomplete="off">
                                            </div>
                                        </div>
                                        <div class="col-sm-3 col-lg-2 ">
                                            <label class="control-label">Date To </label>
                                            <div class="input-group">
                                                <div class="input-group-addon"><i class="fa fa-calendar"></i></div>
                                                <input type="text" id="dtpDateTo" name="DateTo" class="form-control" data-plugin-datepicker="" autocomplete="off">
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-4">
                                            <div class="pull-left pad-a-labelsize-btn">
                                                <a id="lblAdvanceSearch" href="#" onclick="Batch_ClinicalQualityMeasure.ShowSearchFields(this);" style="text-decoration:none" class="btn btn-link btn-sm">Advance Search</a>
                                            </div>

                                            <div class="pull-left pad-a-labelsize-btn">
                                                <a id="lblBasicSearch" href="#" onclick="Batch_ClinicalQualityMeasure.ShowSearchFields(this);" style="text-decoration:none" class="btn btn-link btn-sm">Basic Search</a>
                                            </div>

                                            <div class="pull-right pad-a-labelsize-btn">
                                                <button id="btnSearch" class="btn btn-primary btn-sm " onclick="Batch_ClinicalQualityMeasure.BatchClinicalQualityMeasureSearch();" type="button">Search</button>
                                                <!--<button id="btnExport" class="btn btn-primary btn-sm " onclick="Batch_ClinicalQualityMeasure.BatchClinicalQualityMeasureExport();" type="button">Export QRDA III</button>-->
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-2" divtype="AdvancedSearch" style="display:none">
                                            <div class="row">
                                                <div class="col-xs-5" >
                                                    <label class="control-label">TIN</label>
                                                    <input id="txtTIN" name="TIN" class="form-control pl-xxs pr-xxs" type="text" placeholder="999999999" maxlength="9" onkeypress="return utility.ValidateZero(event, this);" />
                                                </div>
                                                <div class="col-xs-7">
                                                    <label class="control-label">Provider Type</label>
                                                    <select id="ddlProviderType" name="ProviderTypeId" class="form-control" ddlist="GetProviderType"></select>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-2" divtype="AdvancedSearch" style="display:none">
                                            <label class="control-label">Address</label>
                                            <input class="form-control" id="txtAddress" name="Address" type="text" />
                                        </div>
                                        <div class="col-sm-6 col-lg-2" id="dvPatientName" divtype="AdvancedSearch" style="display:none">
                                            <label for="Patient Name" class="control-label">Patient</label>
                                            <div class="input-group">
                                                <input class="form-control" id="txtFullName" customname="Patient Name" placeholder="Start typing to search" name="PatientName" type="text" />
                                                <div class="input-group-btn">
                                                    <button id="lnkPatientName" type="button" class="btn btn-primary btn-xs" onclick="Batch_ClinicalQualityMeasure.OpenPatient();"><i class="fa fa-search"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-sm-6 col-lg-2" divtype="AdvancedSearch" style="display:none">
                                            <label id="lblInsurancePlan" class="control-label">Insurance Plan</label>
                                            <a id="lnkInsurancePlanDetail" style="display:none;" href="#" onclick="Batch_ClinicalQualityMeasure.OpenInsurancePlanDetail();" title="Edit Insurance Plan">Insurance Plan</a>
                                            <div class="input-group">
                                                <input class="form-control" id="txtInsurancePlan" name="InsurancePlan" placeholder="Start typing to search" type="text" />
                                                <div class="input-group-btn">
                                                    <button class="btn btn-primary btn-xs " type="button" onclick="Batch_ClinicalQualityMeasure.OpenInsurancePlan();"><i class="fa fa-search"></i></button>
                                                </div>
                                            </div>
                                        </div>


                                        <div class="col-sm-3 col-lg-2" id="divEthnicity" divtype="AdvancedSearch" style="display:none">
                                            <label for="Ethnicity" class="control-label">Ethnicity</label>
                                            <select id="ddlEthnicity" name="EthnicityIds" multiple="multiple" class="form-control" ddlmultilist="GetEthnicityForDemographics"></select>
                                        </div>
                                        <div class="col-sm-3 col-lg-2" id="divRace" divtype="AdvancedSearch" style="display:none">
                                            <label class="control-label">Race</label>
                                            <select class="form-control" multiple="multiple" name="RaceIds" id="ddlRace" ddlmultilist="GetRaceForDemographics"></select>
                                        </div>
                                        <div class="col-sm-4 col-md-3 col-lg-2" divtype="AdvancedSearch" style="display:none">
                                            <label class="control-label">Age Condition</label>
                                            <select id="ddlAgeCondition" name="AgeCondition" class="form-control" ddlist="getCDSAgeCondition" onchange="Batch_ClinicalQualityMeasure.addAgeConditionValues()"></select>
                                        </div>
                                        <div id="ageConditionValueMonth" class="col-xs-1 col-lg-1 hidden" divtype="AdvancedSearch" style="display:none">
                                            <label class="control-label">Month</label>
                                            <div class="input-group">
                                                <input class="form-control" type="text" id="txtAgeValueMonth" name="AgeValue" data-plugin-keyboard-numpad maxlength="2">
                                            </div>
                                        </div>
                                        <div id="ageConditionValueYear" class="col-xs-12 col-lg-1 hidden" divtype="AdvancedSearch" style="display:none">
                                            <label class="control-label">Year</label>
                                            <div class="input-group">
                                                <input class="form-control" type="text" id="txtAgeValueYear" name="AgeValue" data-plugin-keyboard-numpad maxlength="3">
                                            </div>
                                        </div>
                                        <div class="col-sm-4 col-lg-2" divtype="AdvancedSearch" style="display:none">
                                            <label for="Sex" class="control-label">Sex</label>
                                            <select id="ddlSearchSex" class="form-control ValidateCriteria" name="Sex" ddlist="GetGenderDemographic"></select>
                                        </div>


                                        <div class="col-sm-4 col-md-3 col-lg-2" divtype="AdvancedSearch" style="display:none">
                                            <label class="control-label" for="Problems">Problems</label>
                                            <div class="input-group">
                                                <input class="form-control" data-popupunload="false" id="txtProblems" placeholder="Start typing to search" oninput="Batch_ClinicalQualityMeasure.BindICD9AutoComplete(this)" name="ProblemName" type="text" value="">
                                                <div class="input-group-btn">
                                                    <button id="btnProblems" class="btn btn-primary btn-xs" type="button" onclick="Batch_ClinicalQualityMeasure.OpenProblemSearch()"><i class="glyphicon glyphicon-search"></i></button>
                                                </div>
                                            </div>
                                            <ul id="ulCQMProblemList" name="ProblemList" class="listPrimary"></ul>
                                        </div>

                                    </div>
                                </form>
                            </div>
                            <input type="hidden" id="hfProviderId" value="" />
                            <input type="hidden" id="hfPatientId" value="" />
                            <input type="hidden" id="hfInsurancePlan" value="" />
                            <input type="hidden" id="hfPatientAccntNum" value="" />
                        </section>
                        <div id="pnlBatchClinicalQualityMeasure_Result" style="display: none;">
                            <section class="panel">
                                <div class="panel-body">
                                    <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvBatchClinicalQualityMeasure">
                                        <thead>
                                            <tr>
                                                <th style="display:none;">CQMId</th>
                                                <th>CQM ID</th>
                                                <th>Measure</th>
                                                <th>Initial Population</th>
                                                <th>Denominator</th>
                                                <th>Numerator</th>
                                                <th>Exclusion</th>
                                                <th>Exception</th>
                                                <th>Performance Rate</th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                    <div id="divBatchClinicalQualityMeasurePaging"></div>
                                </div>
                            </section>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
