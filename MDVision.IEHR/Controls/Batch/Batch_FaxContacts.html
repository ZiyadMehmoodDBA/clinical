<div class="row" id="pnlBatch_FaxContacts" style="display:none;">
    <div id="actionPanBatch_FaxContacts" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Batch_FaxContacts.UnLoadTab();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search Contacts</h4>
            </div>
            <div id="modalbody">
                <div class="spacer10"></div><div class="clearfix"></div>
                <section class="panel panel-featured">
                    <header class="panel-heading">
                        <div class="panel-actions">
                            <a href="#" class="closebtn pull-right" onclick="Batch_FaxContacts.UnLoadTab();"></a>
                        </div>
                        <h2 class="panel-title">Add Contact</h2>
                    </header>
                    <div class="panel-body">
                        <form class="form-bordered" method="post" onsubmit="return false" id="formpanelheading">
                            <div class="form-group">
                                <div class="col-sm-3">
                                    <label class="control-label">Contact Name</label>
                                    <input class="form-control" id="txtContactName" name="ContactName" type="text">
                                </div>
                                <div class="col-sm-3">
                                    <label class="control-label">Fax Number</label>
                                    <input class="form-control" id="txtFaxNumber" name="FaxNumber" placeholder="(999)-999-9999" maxlength="50" data-mask="(999) 999-9999" onblur="utility.ValidateCtrlMask('formpanelheading', this);">
                                </div>
                                <div class="col-sm-3 pad-a-labelsize-btn">
                                    <button class="btn btn-link btn-xs">Save Contact</button>
                                </div>
                                <!--<div class="col-sm-3">
                                    <label class="control-label" for="txtProviderReferral" id="lblRefferingProviderReferral">Ref Provider</label>
                                    <div class="input-group">
                                        <input class="form-control " id="txtProviderReferral" type="text" placeholder="Start typing to search" name="ProviderReferral" onblur="utility.ValidateAutoComplete(this, 'formpanelheading #hfProviderReferral', true);"
                                               oninput="Batch_FaxContacts.BindRefProviderReferral();" maxlength="35" customname="Referral To" />
                                        <input type="hidden" id="hfProviderReferral" value="-1" />
                                        <div class="input-group-btn">
                                            <button id="lnkProviderReferral" class="btn btn-primary btn-xs " type="button" onclick="Batch_FaxContacts.OpenProviderReferral();"><i class="fa fa-search"></i></button>
                                        </div>
                                    </div>
                                </div>-->

                            </div>
                            <div class="form-group">
                                <div class="col-sm-3">
                                    <label class="control-label" for="txtProviderReferral" id="lblRefferingProviderReferral">Ref Provider</label>
                                    <div class="input-group">
                                        <input class="form-control " id="txtProviderReferral" type="text" placeholder="Start typing to search" name="ProviderReferral" maxlength="35" customname="Referral To" />
                                        <input type="hidden" id="hfProviderReferral" value="-1" />
                                        <div class="input-group-btn">
                                            <button id="lnkProviderReferral" class="btn btn-primary btn-xs " type="button" onclick="Batch_FaxContacts.OpenProviderReferral();"><i class="fa fa-search"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </section>
                <div id="pnlContacts" style="display: inline;">
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="tblFaxContacts">
                                <thead>
                                    <tr>
                                        <th class="size10"><input type="checkbox" id="selectAllContactsCC"> CC <input style="margin-left: 5.5%;" type="checkbox" id="selectAllContactsTo"> To</th>
                                        <th class="size90">Contact Name</th>
                                        <th class="size90">Fax Number</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="panel-body">
                            <button type="button" class="btn btn-success pull-left btn-sm" id="btn-add" onclick="Batch_FaxContacts.AddSelectedContacts();"><i class="fa fa-plus-circle"></i> Add </button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
