<div id="Batch_FaxView">

    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Batch_FaxView.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Preview Fax</h4>
            </div>
            <div id="modalbody" class="modal-body pt-xs">
                <div class="mainScrollPan" id="mainScrollPan">

                    <section class="panel">
                        <form method="post" id="frmBatch_FaxView" onsubmit="return false">
                            <div id="pnlNotes_Search">
                                <div class="form-group">
                                    <div class="btn-block">
                                        <button id="LabOrderButtonPrint" type="button" class="btn btn-success btn-xs" onclick="Batch_FaxView.printFax();"><i class="fa fa-print"></i> Print</button>
                                    </div>
                                    <div class="spacer5"></div>
                                    <!--<div class="splitter m-none  pl-sm pt-xxs pb-xxs">Initial Office Visit</div>-->

                                        <div class="col-xs-12 p-none" id="hcfa_claim_form">
                                            <input type="hidden" id="helperPDF" />
                                            <iframe id="PreviewLabOrderForm" src="Scripts/js/pdf/web/viewer.html" class="col-sm-12 noBorder p-none" style="height:1066px;"></iframe>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </div>
