<div id="pnlCCMEnrollmentDecline" style="display:none;">
    <div id="actionPanCCMEnrollmentDecline" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div>
        <div id="modaldialog">
            <div id="modalcontent">
                <div id="modalheader" style="display:none;">
                    <button type="button" class="close" onclick="CCMEnrollmentDecline.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                    <h4 id="headingTitle" class="modal-title">Reason For Decline</h4>
                </div>
                <div id="modalbody">
                    <div class="mainScrollPan" id="mainScrollPan">
                        <div class="clearfix"></div>
                        <form method="post" id="frmCCMEnrollmentDecline" onsubmit="return false">

                            <div class="form-group">
                                <div class="col-xs-12">
                                    <label class="control-label">Enter Reason<span class="required">*</span></label>
                                    <textarea class="form-control" rows="3" id="txtDeclineReason" name="DeclineReason" spellcheck="true" maxlength="100" oninput="CCMEnrollmentDecline.calculateRemainingCharacters();"></textarea>
                                    Characters Remaining: <span id="spnRemainingCharacters">100</span>
                                </div>
                            </div>
                            <span class="spacer10"></span>

                            <button id="btnEnrollmentDeclineSave" class="btn btn-primary btn-sm rightbtn" type="submit">Save</button>
                            <div class="clearfix"></div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
