<div class="row" id="pnlCCMCallDetailsHistory" style="display:none;">
    <div id="actionPanCCMCallDetailsHistory" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog" class="modal-dialog-full">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="CCMCallDetailsHistory.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Timer Logs</h4>
            </div>
            <div id="modalbody">
                <ul class="tabs-custom">
                    <li class="active">
                        <a href="#CCMCallDetailsHistory" data-toggle="tab" onclick="CCMCallDetailsHistory.CCMCallDetailsHistorySearch()">Logs</a>
                    </li>
                    <li>
                        <a href="#CCMCallDetailsPreviousHistory" data-toggle="tab" onclick="CCMCallDetailsHistory.CCMCallDetailsPreviousHistorySearch()">History</a>
                    </li>
                </ul>
                <div class="tab-content tabs-custom-body pt-default">
                    <div id="CCMCallDetailsHistory" class="tab-pane active">
                        <div class="row">
                            <div class="col-sm-3">
                                <label class="control-label">Month</label>
                                <select class="form-control" name="month" id="TaskTimerMonth" onchange="CCMCallDetailsHistory.monthChange(this);">
                                    <option value="1">January</option>
                                    <option value="2">February</option>
                                    <option value="3">March</option>
                                    <option value="4">April</option>
                                    <option value="5">May</option>
                                    <option value="6">June</option>
                                    <option value="7">July</option>
                                    <option value="8">August</option>
                                    <option value="9">September</option>
                                    <option value="10">October</option>
                                    <option value="11">November</option>
                                    <option value="12">December</option>
                                </select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Year</label>
                                <select class="form-control" name="year" id="TaskTimerYear" onchange="CCMCallDetailsHistory.yearChange(this);"></select>
                            </div>
                        </div>
                        <div id="pnlCCMCallDetailsHistory_Result" style="display: none;">
                            <section class="panel">
                                <div class="panel-body">
                                    <input type="hidden" id="CCMCallDetailsHistory_SelectedDataKeys" />
                                    <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvCCMCallDetailsHistory">
                                        <thead>
                                            <tr>
                                                <th style="display:none;">CallDetailsId</th>
                                                <th id="ColumnAction" actiontype="Save,Edit,Delete,Cancel" coltype="Action">Action</th>
                                                <th controlid="txtAddedBy" controlname="AddedBy" iscontroldisabled="1" coltype="textbox" isoptional="">Added By</th>
                                                <th controlid="txtModifiedBy" controlname="ModifiedBy" iscontroldisabled="1" coltype="textbox" isoptional="0">Modified By</th>
                                                <th controlid="ddlCallReason" controlname="CallReason" iscontroldisabled="0" coltype="dropdown" ddlist="TaskReasonLookup" isoptional="0">Task Reason</th>
                                                <th class="size190" controlid="txtNotesComments" controlname="Comments" iscontroldisabled="0" coltype="textbox" isoptional="0">Notes/Comments</th>
                                                <th class="size180" controlid="CallDetailsDuration" controlname="TaskDuration" iscontroldisabled="0" coltype="textbox" isoptional="0">Duration</th>
                                                <th class="size150" controlid="ddlCaller" controlname="Caller" iscontroldisabled="0" coltype="dropdown" ddlist="GetCallDetails" isoptional="0">Caller</th>
                                                <th controlid="txtReceiverName" controlname="ReceiverName" iscontroldisabled="0" coltype="textbox" isoptional="0">Received By</th>
                                                <th controlid="dtpCallDate" controlname="CallDate" iscontroldisabled="1" coltype="datetime" isoptional="0">Date</th>
                                                <th controlid="tpCallTime" controlname="CallTime" iscontroldisabled="1" coltype="time" isoptional="0">Time</th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                    <div id="divCCMCallDetailsHistoryPaging"></div>
                                </div>
                            </section>
                        </div>
                    </div>


                    <div id="CCMCallDetailsPreviousHistory" class="tab-pane">
                            <div id="pnlCCMCallDetailsPreviousHistory_Result" style="display: none;">
                                <section class="panel">
                                    <div class="panel-body">
                                        <input type="hidden" id="CCCMCallDetailsPreviousHistory_SelectedDataKeys" />
                                        <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvCCMCallDetailsPreviousHistory">
                                            <thead>
                                                <tr>
                                                    <th style="display:none;">CallDetailsId</th>
                                                    <th>Added By</th>
                                                    <th>Modified By</th>
                                                    <th>Task Reason</th>
                                                    <th>Notes/Comments</th>
                                                    <th>Duration</th>
                                                    <th>Caller</th>
                                                    <th>Received By</th>
                                                    <th>Date</th>
                                                    <th>Time</th>
                                                </tr>
                                            </thead>
                                            <tbody></tbody>
                                        </table>
                                        <div id="divCCMCallDetailsPreviousHistoryPaging"></div>
                                    </div>

                                </section>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>
