                <div class="tab-content tabs-custom-body pt-default">

                        <div class="row">
                            <div class="col-sm-3">
                                <label class="control-label">Month</label>
                                <select class="form-control" name="month" id="TaskTimerMonth">
                                    <option value="1">January</option>
                                    <option value="2">February</option>
                                    <option value="3">March</option>
                                    <option value="4">April</option>
                                    <option value="5">May</option>

                                    <option value="7">July</option>

                                    <option value="9">September</option>

                                    <option value="11">November</option>
                                    <option value="12">December</option>
                                </select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Year</label>
                                <select class="form-control" name="year" id="TaskTimerYear"></select>
                            </div>
                        </div>
                        <div id="pnlCCMTaskTimerHistory_Result" style="display: none;">
                            <section class="panel">
                                <input type="hidden" id="CCMTaskTimerHistory_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvCCMTaskTimerHistory">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">TaskTimerId</th>
                                            <th id="ColumnAction" actiontype="Save,Edit,Delete,Cancel" coltype="Action">Action</th>
                                            <th>Added By</th>
                                            <th controlid="ddlTaskReason" controlname="TaskReason" iscontroldisabled="0" coltype="dropdown" ddlist="TaskReasonLookup" isoptional="0">Task Reason</th>
                                            <th controlid="Comments" controlname="Comments" iscontroldisabled="0" coltype="TextBox" isoptional="1">Notes/Comments</th>
                                            <!--<th>Type</th>-->
                                            <th controlid="TaskDuration" controlname="TaskDuration" iscontroldisabled="0" coltype="TextBox" isoptional="0" class="size-min100">Duration</th>
                                            <th>Date</th>
                                            <th>Time</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divCCMTaskTimerHistoryPaging"></div>


                            </section>
