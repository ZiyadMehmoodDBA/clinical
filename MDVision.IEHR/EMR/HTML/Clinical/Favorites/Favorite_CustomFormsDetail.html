<div class="row" id="pnlFavoriteCustomFormsDetail">
    <div id="actionPanFavoriteCustomFormsDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" onclick="Favorite_CustomFormsDetail.UnLoadTab()" class="close"></button>
                <h4 id="lblHeading" class="modal-title">Add Favorites List</h4>
            </div>
            <div class="modal-body">
                <form id="frmFavoriteCustomFormsDetail" role="form">
                    <div class="col-sm-10" id="divEntity" hidden>
                        <label class="control-label">Entity<span class="required">*</span></label>
                        <select id="lstEntityId" class="form-control" ddlist="GetEntity" name="EntityId"></select>
                    </div>
                    <div class="col-sm-10">
                        <label for="" class="control-label">Favorite List Name<span class="required">*</span></label>
                        <input id="txtFavoriteListName" type="text" name="FavoriteListName" class="form-control" />
                    </div>
                    <div class="col-sm-2 pad-a-labelsize">
                        <div class="checkbox-custom">
                            <input type="checkbox" id="IsActive" name="IsActive" checked disabled>
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-10" id="divProvider">
                        <select class="form-control" style="display:none;" name="Provider" id="ddlHiddenProvider"></select>
                        <label class="control-label">Provider<span class="required">*</span></label>
                        <select class="form-control" multiple="multiple" name="ProviderIds" id="ddlProvider"></select>
                    </div>

                    <div class="col-sm-10" id="divFavBodyPartCustomForms">
                        <label class="control-label">Body Part</label>
                        <select class="form-control" name="BodyPartId" id="ddlBodyParts" ddlist="GetBodyParts"></select>
                    </div>

                    <div class="col-sm-10" id="divCustomForm">
                        <select class="form-control" style="display:none;" name="CustomForm" id="ddlHiddenCustomForm"></select>
                        <label class="control-label">Custom Form<span class="required">*</span></label>
                        <select class="form-control" multiple="multiple" name="CustomFormIds" id="ddlCustomForm"></select>
                    </div>




                    <div class="col-sm-2 pull-right mt-md">
                        <button type="submit" class="btn btn-primary btn-sm rightbtn">Save</button>
                    </div>
                    <input type="hidden" id="hfFavoriteListId" name="FavoriteListId" value="-1">
                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
