<div class="row" id="pnlFavoriteTherapueticInjectionDetail">
    <div id="actionPanFavoriteTherapueticInjectionDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close" type="button" onclick="Favorite_TherapueticInjection_Detail.UnLoadTab()"></button>
                <h4 id="lblHeading" class="modal-title">Add Favorites List</h4>
            </div>
            <div class="modal-body">
                <form id="frmFavoriteTherapueticInjectionDetail" method="post" onsubmit="return false">
                    <div class="col-sm-4" id="divEntity" hidden>
                        <label class="control-label">Entity<span class="required">*</span></label>
                        <select id="lstEntityId" class="form-control" ddlist="GetEntity" name="EntityId"></select>
                    </div>
                    <div class="col-sm-4">
                        <label for="" class="control-label">Favorites List Name<span class="required">*</span></label>
                        <input id="txtFavoriteListName" maxlength="200" type="text" name="FavoriteListName" class="form-control" />
                    </div>
                    <div class="col-sm-4">
                        <div class="row">
                            <div class="col-xs-9" id="divFavProvider">
                                <select class="form-control" style="display:none;" name="hiddenFavProvider" id="ddlHiddenFavProvider"></select>
                                <label class="control-label">Provider<span class="required">*</span></label>
                                <select class="form-control" multiple="multiple" name="ProviderIds" id="ddlProvider" ddlmultilist="GetProvider"></select>
                            </div>
                            <div class="col-xs-3">
                                <div class="col-sm-2 pad-a-labelsize">
                                    <div class="checkbox-custom">
                                        <input type="checkbox" id="IsActive" name="IsActive" checked>
                                        <label class="control-label">Active</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="clearfix"></div>
                    
                    <div class="col-sm-4">
                        <label class="control-label" for="search">Therapeutic Injection<span class="required">*</span></label>

                        <input class="form-control ui-autocomplete-input" id="txtTherapeuticInjection" name="TherapeuticInjection" placeholder="Start typing to search" type="text" onblur="Favorite_TherapueticInjection_Detail.TherapueticOnBlur(this)" autocomplete="off">

                        <ul id="ulFavTherapueticInjection" name="FavTherapueticInjection" class="listPrimary height300 height-max200 own-scroll"></ul>
                    </div>

                    <div class="col-sm-8">
                        <div class="row">
                            <div class="col-sm-4 Vaccine" id="VaccineDiv">
                                <label for="" class="control-label">CPT Code</label>
                                <input id="txtCptCode" type="text" name="CptCode" class="form-control" disabled />
                            </div>
                            <div class="col-sm-4">
                                <label for="" class="control-label">CVX</label>
                                <input id="txtCVX" type="text" name="CVX" class="form-control" disabled />
                            </div>
                            <div class="col-sm-4">
                                <label for="" class="control-label">Administered Code</label>
                                <input id="txtAdministeredCode" type="text" name="AdministeredCode" class="form-control" disabled />
                            </div>
                        </div>
                    </div>

                    <div class="col-sm-2 pull-right mt-md">
                        <button type="submit" class="btn btn-primary btn-sm rightbtn" onclick="Favorite_TherapueticInjection_Detail.CheckProviderValidation()">Save</button>
                    </div>
                    <input type="hidden" id="hfTherapeuticInjection" name="TherapeuticInjectionId" value="">
                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">

    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });

</script>
