<div class="row" id="pnlFavoriteComplaintsDetail">
    <div id="actionPanFavoriteComplaintsDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close" type="button" onclick="Favorite_Complaints_Detail.UnLoadTab()"></button>
                <h4 id="lblHeading" class="modal-title">Add Favorites List</h4>
            </div>
            <div class="modal-body">
                <form id="frmFavoriteComplaintsDetail" method="post" onsubmit="return false">
                    <div class="col-sm-10" id="divEntity" hidden>
                        <label class="control-label">Entity<span class="required">*</span></label>
                        <select id="lstEntityId" class="form-control" ddlist="GetEntity" name="EntityId"></select>
                    </div>
                    <div class="col-sm-10">
                        <label for="" class="control-label">Favorites List Name<span class="required">*</span></label>
                        <input id="txtFavoriteListName" type="text" name="FavoriteListName" class="form-control" />
                    </div>
                    <div class="col-sm-2 pad-a-labelsize">
                        <div class="checkbox-custom">
                            <input type="checkbox" id="IsActive" name="IsActive" checked>
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-10" id="divFavProvider">
                        <select class="form-control" style="display:none;" name="hiddenFavProvider" id="ddlHiddenFavProvider"></select>
                        <label class="control-label">Provider<span class="required">*</span></label>
                        <select class="form-control" multiple="multiple" name="ProviderIds" id="ddlFavProvider"></select>
                    </div>
                    <div class="col-sm-10" id="divFavBodyPartComplaints">
                        <label class="control-label">Body Part</label>
                        <select class="form-control" name="BodyPartId" id="ddlBodyParts" ddlist="GetBodyParts"></select>
                    </div>
                    <div class="col-sm-10">
                        <label class="control-label" for="search">Complaints<span class="required">*</span></label>
                        <div class="input-group">
                            <input class="form-control" data-popupunload="false" id="txtDiagnosis" name="Complaints" oninput="Favorite_Complaints_Detail.BindICD9AutoComplete(this)" placeholder="Start typing to search" type="text">
                            <div class="input-group-btn">
                                <button class="btn btn-primary btn-xs" type="button" onclick="Favorite_Complaints_Detail.openSearchPopup('ICD', 'txtDiagnosis', 'hfCPTCode,hfCPTDescription')">
                                    <i class="glyphicon glyphicon-search"></i>
                                </button>
                            </div>
                        </div>
                        <ul id="ulFavCompliantDisease" name="FavCompliantDisease" class="listPrimary height150 height-max150 own-scroll"></ul>
                    </div>
                    <div class="col-sm-2 pull-right mt-md">
                        <button type="submit" class="btn btn-primary btn-sm rightbtn">Save</button>
                    </div>
                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">

    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });

</script>
