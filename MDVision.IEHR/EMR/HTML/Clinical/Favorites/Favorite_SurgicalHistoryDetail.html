<div class="row" id="pnlFavoriteSurgicalHistoryDetail">
    <div id="actionPanFavoriteSurgicalHistoryDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" onclick="Favorite_SurgicalHistoryDetail.UnLoadTab()" class="close"></button>
                <h4 id="lblHeading" class="modal-title">Add Favorites List</h4>
            </div>
            <div class="modal-body">
                <form id="frmFavoriteSurgicalHistoryDetail" role="form">
                    <div class="col-sm-10" id="divEntity" hidden>
                        <label class="control-label">Entity<span class="required">*</span></label>
                        <select id="lstEntityId" class="form-control" ddlist="GetEntity" name="EntityId"></select>
                    </div>
                    <div class="col-sm-10">
                        <label for="" class="control-label">Favorite List Name<span class="required">*</span></label>
                        <input id="txtFavoriteListName" type="text" name="FavoriteListName" class="form-control" />
                    </div>
                    <div class="col-sm-10" id="divProvider">
                        <select class="form-control" style="display:none;" name="Provider" id="ddlHiddenProvider"></select>
                        <label class="control-label">Provider<span class="required">*</span></label>
                        <select class="form-control" multiple="multiple" name="ProviderIds" id="ddlProvider"></select>
                    </div>
                    <div class="col-sm-2 pad-a-labelsize">
                        <div class="checkbox-custom">
                            <input type="checkbox" id="Active" name="Active" checked>
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-10">
                        <label class="control-label" for="search">Procedure<span class="required">*</span></label>
                        <!--<div class="input-group">
                            <input class="form-control" name="Diagnosis" data-popupunload="false" id="txtDiagnosis" oninput="Favorite_SurgicalHistoryDetail.bindICD9AutoComplete(this)" placeholder="Start typing to search" type="text">
                            <div class="input-group-btn">
                                <button class="btn btn-primary btn-xs" type="button" onclick="Favorite_SurgicalHistoryDetail.openSearchPopup('ICD', 'txtDiagnosis', 'hfCPTCode,hfCPTDescription')">
                                    <i class="glyphicon glyphicon-search"></i>
                                </button>
                            </div>
                        </div>-->
                        <div class="input-group">
                            <input class="form-control" id="txtDisease" placeholder="search procedure" type="text" name="Diagnosis" oninput="Favorite_SurgicalHistoryDetail.bindAutoComplete(this)" value="" />
                            <div class="input-group-btn">
                                <button class="btn btn-primary btn-xs " type="button" onclick="Favorite_SurgicalHistoryDetail.openCPTCode();"><i class="fa fa-search"></i></button>
                            </div>
                        </div>
                        <ul id="ulFavSurgicalHistoryDisease" name="FavSurgicalHistoryDisease" class="listPrimary height300 height-max300 own-scroll"></ul>
                    </div>
                    <div class="col-sm-2 pull-right mt-md">
                        <button type="submit" onclick="Favorite_SurgicalHistoryDetail.CheckProviderValidation()" class="btn btn-primary btn-sm rightbtn">Save</button>
                    </div>
                    <input type="hidden" id="hfFavoriteListId" name="FavoriteListId" value="-1">
                    <input type="hidden" id="hfCPTCode" name="CPTCodeId" />
                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
