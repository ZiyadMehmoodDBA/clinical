<div class="row" id="pnlFavoriteMedicationDetail">
    <div id="actionPanFavoriteMedicationDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" onclick="Favorite_MedicationDetail.UnLoadTab()" class="close"></button>
                <h4 id="lblHeading" class="modal-title">Add Favorites List</h4>
            </div>
            <div class="modal-body">
                <form id="frmFavoriteMedicationDetail" method="post" onsubmit="return false">
                    <div class="col-sm-10" id="divEntity" hidden>
                        <label class="control-label">Entity<span class="required">*</span></label>
                        <select id="lstEntityId" class="form-control" ddlist="GetEntity" name="EntityId"></select>
                    </div>
                    <div class="col-sm-10">
                        <label for="" class="control-label">Favorite List Name<span class="required">*</span></label>
                        <input id="txtFavoriteListName" type="text" name="FavoriteListName" class="form-control" />
                    </div>
                    <div class="col-sm-10" id="divFavMedicationProvider">
                        <select class="form-control" style="display:none;" name="hiddenFavMedicationProvider" id="ddlHiddenFavMedicationProvider"></select>
                        <label class="control-label">Provider<span class="required">*</span></label>
                        <select class="form-control" multiple="multiple" name="ProviderIds" id="ddlMedicationProvider"></select>
                    </div>
                    <div class="col-sm-10" id="divFavBodyPartProcedure">
                        <label class="control-label">Body Part</label>
                        <select class="form-control" name="BodyPartId" id="ddlBodyParts" ddlist="GetBodyParts"></select>
                    </div>
                    <div class="col-sm-2 pad-a-labelsize">
                        <div class="checkbox-custom">
                            <input type="checkbox" id="Active" name="Active" checked>
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-10 disableAll" id="divFavMedicationSearchList">
                        <label class="control-label" for="search">Medication</label>
                        <div class="input-group">
                            <input class="form-control" placeholder="Start typing to search" oninput="Favorite_MedicationDetail.BindMedicationAutoComplete()" id="txtMedication" type="text" name="Medication" customname="Medication">
                            <div class="input-group-btn">
                                <button class="btn btn-primary btn-xs disabled" type="button">
                                    <i class="glyphicon glyphicon-search"></i>
                                </button>
                            </div>
                        </div>
                        <ul id="ulFavMedication" name="FavMedicationList" class="listPrimary height300 height-max300 own-scroll"></ul>
                    </div>
                    <div class="col-sm-2 pull-right mt-md">
                        <button type="submit" class="btn btn-primary btn-sm rightbtn">Save</button>
                    </div>
                    <input type="hidden" id="hfFavoriteListId" name="FavoriteListId" value="-1">
                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
