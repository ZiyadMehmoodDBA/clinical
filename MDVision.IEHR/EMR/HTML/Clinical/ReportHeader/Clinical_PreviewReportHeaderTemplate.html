<script type="text/javascript">
    $(function () {
        $('#pnlPreviewReportHeaderTemplate [data-plugin-toggle]').each(function () {
            var $this = $(this),
            opts = {};
            var pluginOptions = $this.data('plugin-options');

                opts = pluginOptions;
            $this.themePluginToggle(opts);
        });

</script>
