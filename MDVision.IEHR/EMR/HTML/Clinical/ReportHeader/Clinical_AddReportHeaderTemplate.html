<div id="pnlAddReportHeaderTemplate">
    <div id="actionPanAddReportHeaderTemplate" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog" class="modal-dialog-md">
        <div id="modalcontent">
            <div id="modalheader">
                <button type="button" class="close" onclick="Clinical_AddReportHeaderTemplate.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Add Report Header Template</h4>
            </div>
            <div id="modalbody">

                <form method="post" onsubmit="return false" id="frmAddReportHeader">
                    <div class="mainScrollPan" id="mainScrollPan">
                        <ul class="tabBtn bordered" role="tablist">
                            <li id="LiheaderInfo" class="active">
                                <a data-target="#headerInfo" role="tab" id="tabheaderInfo" data-toggle="tab" class="btn btn-default btn-sm">Header Information</a>
                            </li>
                            <li id="LireportConfiguration" class="disableAll">
                                <a data-target="#reportConfiguration" id="tabreportConfiguration" role="tab" data-toggle="tab" class="btn btn-default btn-sm">Report Configuration</a>
                            </li>
                        </ul>
                        <div class="spacer3"></div>
                        <div class="tab-content noBorder p-none noBoxshadow">
                            <div role="tabpanel" class="tab-pane active" id="headerInfo">
                                <div id="pnlSection_AddReportHeaderTemplate">
                                    <div class="spacer10"></div>

                                    <div class="form-group">
                                        <div class="col-sm-3 col-md-3">
                                            <label class="control-label">Name <span class="required">*</span></label>
                                            <input class="form-control" name="ReportHeaderName" id="txtReportHeaderName" type="text" maxlength="100" />
                                        </div>

                                        <div class="col-sm-3 col-md-3" id="divSpecialty">
                                            <label class="control-label">Specialty </label>
                                            <select id="ddlSpecialty" multiple="multiple" name="SpecialtyIds" class="form-control"></select>
                                        </div>
                                        <div class="col-sm-3 col-md-3" id="divProvider">
                                            <select class="form-control" style="display:none;" name="hiddenProvider" id="ddlHiddenProvider"></select>
                                            <label class="control-label">Provider</label>
                                            <select class="form-control" multiple="multiple" name="ProviderIds" id="ddlProvider"></select>
                                        </div>

                                        <div class="col-sm-3 col-md-3" id="DivFacility">
                                            <label class="control-label">Facility </label>
                                            <select id="ddlFacility" name="FacilityIds" multiple="multiple" customval="Facility" customname="FacilityId" class="form-control multiselect" ddlmultilist="GetFacility" data-bv-field="txtFacility"></select>
                                        </div>

                                        <div id="entityDDL" class="col-sm-3 col-md-3">
                                            <label class="control-label">Entity</label>
                                            <select class="form-control multiselect" ddlmultilist="GetEntity" multiple="multiple" id="ddlEntity" name="EntityId" onchange="Clinical_AddReportHeaderTemplate.isEntitySelected();"></select>
                                        </div>
                                        <div class="col-sm-3 col-md-3">
                                            <label class="control-label">Footer (Generated By)</label>
                                            <input class="form-control" name="FooterText" id="txtFooterText" type="text" maxlength="100" value="MDVision PM EMR" />
                                        </div>
                                        <div class="col-sm-4 col-lg-1">
                                            <label class="control-label"></label>
                                            <div class="checkbox-custom">
                                                <input type="checkbox" id="Active" name="IsActive" checked>
                                                <label class="control-label">Active</label>
                                            </div>
                                        </div>
                                        <div class="pull-right mt-md pr-default">
                                        <button type="button" onclick="Clinical_AddReportHeaderTemplate.PreviewReportHeader();" class="btn btn-sm">Preview</button>
                                            <button type="submit" class="btn btn-primary btn-sm">Save</button>

                                        </div>
                                    </div>
                                    <div class="clearfix"></div>
                                    <div id="divCHIreportHeader" class="toggle" data-plugin-toggle>
                                        <section class="toggle ">
                                            <label>Customize Header Information</label>
                                            <div class="toggle-content panel-body NoRadiusT">

                                                <div id="PracticeTags" class="col-sm-4">
                                                    <header class="panel-heading panel-blue">
                                                        <h2 class="panel-title white">Practice</h2>
                                                    </header>
                                                    <div class="panel-body">
                                                        <div class="col-xs-8 pl-none">
                                                        <select class="form-control" id="ddlPracticeTags"  name="PracticeTags">
                                                            <option selected>-Select-</option>
                                                        </select>
                                                    </div>
                                                        <div class="checkbox-custom col-xs-4">
                                                        <input type="checkbox" id="PracticeDefault" name="PracticeDefault" onchange="Clinical_AddReportHeaderTemplate.loadDefaultPracticeTags();" checked>
                                                            <label class="control-label pl-md">Default</label>
                                                    </div>
                                                        <div class="spacer3"></div>
                                                        <textarea id="txtareaPractice" class="form-control" rows="8" name="PracticeTags" spellcheck="true"></textarea>
                                                </div>
                                                </div>
                                                <div id="PatientTags" class="col-sm-4">
                                                    <header class="panel-heading panel-blue">
                                                        <h2 class="panel-title white">Patient</h2>
                                                    </header>
                                                    <div class="panel-body">
                                                        <div class="col-xs-8 pl-none">
                                                        <select class="form-control" id="ddlPatientTags"  name="PatientTags">
                                                            <option selected>-Select-</option>
                                                        </select>
                                                    </div>
                                                        <div class="checkbox-custom col-xs-4">
                                                        <input type="checkbox" id="PatientDefault" name="IsPatientDefault" onchange="Clinical_AddReportHeaderTemplate.loadDefaultPatientTags();" checked>
                                                            <label class="control-label pl-md">Default</label>
                                                    </div>
                                                        <div class="spacer3"></div>
                                                        <textarea id="txtareaPatient" class="form-control" rows="8" name="PatientTags" spellcheck="true"></textarea>
                                                </div>
                                                </div>
                                                <div id="ProviderTags" class="col-sm-4">
                                                    <header class="panel-heading panel-blue">
                                                        <h2 class="panel-title white">Provider</h2>
                                                    </header>
                                                    <div class="panel-body">
                                                        <div class="col-xs-8 pl-none">
                                                        <select class="form-control" id="ddlProviderTags"  name="ProviderTags">
                                                            <option selected>-Select-</option>
                                                        </select>
                                                    </div>
                                                        <div class="checkbox-custom col-xs-4">
                                                        <input type="checkbox" id="ProviderDefault" name="IsProviderDefault" onchange="Clinical_AddReportHeaderTemplate.loadDefaultProviderTags();" checked>
                                                            <label class="control-label pl-md">Default</label>
                                                    </div>
                                                        <div class="spacer3"></div>
                                                        <textarea id="txtareaProvider" class="form-control" rows="8" name="ProviderTags" spellcheck="true"></textarea>
                                                    </div>
                                                </div>
                                            </div>
                                        </section>

                                    </div>
                                    <div class="clearfix"></div>
                                    <div id="divHLreportHeader" class="toggle" data-plugin-toggle>
                                        <section class="toggle ">
                                            <label>Header Logo</label>
                                            <div class="toggle-content panel-body NoRadiusT">
                                                <div id="pnlSection_AddReportHeaderTemplateHeaderLogo">
                                                <span class="btn btn-success btn-sm pr-sm pl-sm btn-file " id="spnUploadFilebtn">
                                                    <i class="fa fa-folder-open" id=""></i>
                                                    <span id="spnUploadFilebtntxt">Browse</span> 
                                                        <input type="file" accept="image/*" class="txtInput" id="Upload_Image_file" name="fileupload" 
                                                               onchange="Clinical_AddReportHeaderTemplate.BufferFile(this);" 
                                                        
                                                               />   
                                                    <!--    onclick="Clinical_AddReportHeaderTemplate.BrowsebtnClick(this)"--> 
                                                    </span>

                                                <div class="spacer10"></div>
                                                <span class="">
                                                    <input name="HeaderLogoName" type="hidden" id="HeaderLogoName" />
                                                    <label id="lblHeaderLogoTextReportHeader">
                                                       
                                                    </label>
                                                </span>


                                                <div class=" text-center" id="ImguploadContainer_AddHeaderTemplate" style="display:none;" >
                                                        <div style="max-height:350px; overflow-y:auto;margin-top:0px;">
                                                        <img id="imgUploadImage" src="" alt="" 
                                                             style="display:block;max-width: 350px; max-height: 140px;  width:auto;height:auto;" 
                                                             class="pull-left img-responsive img-center mt-lg img-thumbnail" name="HeaderLogo" />
                                                        <div id="RemoveImgAddHeaderTemplate" class="pull-left" 
                                                             style="color: red; font-weight: 800; cursor: pointer;" 
                                                             onclick="Clinical_AddReportHeaderTemplate.RemoveImage()">X</div>
                                                    
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>
                            <div class="clearfix"></div>
                            <div role="tabpanel" class="tab-pane" id="reportConfiguration">
                                <div class="spacer10"></div>
                                <section class="panel panel-featured">
                                    <header class="panel-heading">
                                        <h2 class="panel-title">Attach Header Logo</h2>
                                    </header>
                                    <!--<div class="panel-body" id="pnlReportHeader_Configruation">
                                        <table class="table table-bordered table-striped table-condensed table-hover mb-none">
                                            <thead>
                                                <tr>
                                                    <th>Reports</th>
                                                    <th>Header Logo</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td>Notes</td>
                                                    <td><input type="checkbox"></td>
                                                </tr>
                                            </tbody>
                                        </table>
                        </div>-->

                                    <div id="pnlReportHeader_Configruation" style="display: inline;">
                                        <!--<section class="panel">-->                                       
                                            <div class="panel-body panel-featured">

                                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvReportConfiguration">
                                            <thead>
                                                <tr>
                                                        <th class="size20 p-none" coltype="Expand" style="display:none"></th>
                                                        <th controlid="" iscontroldisabled="1" controlname="" class="noWordBreak size120 size-min120">Reports</th>
                                                        <th controlid="" iscontroldisabled="1" controlname="" class="noWordBreak size120 size-min120">Header Logo</th>
                                                </tr>
                                            </thead>
                                                <tbody></tbody>
                                        </table>
                                    </div>
                                        
                                    </div>
                                    </section>
                            </div>
                    </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(function () {
        $('#pnlAddReportHeaderTemplate [data-plugin-toggle]').each(function () {
            var $this = $(this),
            opts = {};
            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;
            $this.themePluginToggle(opts);
        });
    });
</script>
