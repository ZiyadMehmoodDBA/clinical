<div id="pnlClinicalLabDetail">
    <div id="actionPanClinicalLabDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="ClinicalLabDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Lab Detail</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmClinicalLabDetail" onsubmit="return false">
                    <div class="col-md-12 " id="divLabInformation">
                        <header class="panel-heading panel-blue">
                            <h2 class="panel-title white">Lab Information</h2>
                        </header>
                        <div class="panel-body">
                            <div class="col-sm-3">
                                <label class="control-label">Name<span class="required">*</span></label>
                                <input class="form-control" name="LabName" id="txtLabName" type="text" maxlength="200" />
                            </div>

                            <!--<div class="col-sm-3">
                                <label class="control-label">Type<span class="required">*</span></label>
                                <input class="form-control" name="LabType" id="txtLabType" type="text" maxlength="200" />
                            </div>-->

                            <div id="entityList" class="col-sm-3 hidden">
                                <label class="control-label">Entity <span class="required">*</span></label>
                                <select id="ddlEntity" name="Entity" class="form-control" ddlist="GetEntity"></select>
                            </div>
                            <div id="categoryList" class="col-sm-3">
                                <label class="control-label">Category<span class="required">*</span></label>
                                <select id="ddlCategory" name="Category" class="form-control" ddlist="GetLabCategory"></select>
                            </div>
                            <!--<div class="col-sm-3">
                                <label class="control-label">Client #<span id="clientNo" class="required">*</span></label>
                                <input class="form-control" name="ClientNo" id="txtClientNo" onkeypress="EMRUtility.validateSpecialCharacters(event);" type="text" maxlength="10" />
                            </div>-->
                            <div id="typeList" class="col-sm-3">
                                <label class="control-label">Type<span class="required">*</span></label>
                                <select id="ddlType" name="Type" class="form-control" ddlist="GetLabType"></select>
                            </div>
                            <div id="requisitionTemplateList" class="col-sm-3">
                                <label class="control-label">Requisition Template<span class="required">*</span></label>
                                <select id="ddlRequisitionTemplate" name="RequisitionTemplate" class="form-control" ddlist="GetLabRequisitionTemplate"></select>
                            </div>
                            <div id="codeSystemList" class="col-sm-3">
                                <label class="control-label">Code System<span class="required">*</span></label>
                                <select id="ddlCodeSystem" name="CodeSystem" class="form-control" ddlist="GetLabCodeSystem"></select>
                            </div>

                            <div class="col-sm-2 pad-a-labelsize">
                                <div class="checkbox-custom">
                                    <input type="checkbox" id="Active" name="IsActive" checked>
                                    <label class="control-label">Active</label>
                                </div>
                            </div>



                        </div>
                    </div>

                    <div class="visible-sm visible-xs"><div class="spacer15"></div></div>
                    <div class="pull-right pt-md pr-default">
                        <button type="submit" class="btn btn-sm btn-primary" id="btnSaveLab">Save</button>
                    </div>
                </form>

                <div id="divResultAttributes" class="panel-body col-xs-12 mt-sm tab-content-featured" style="display:none;">
                    <div class="panel-heading panel-blue">
                        <h5 id="headingTitle" class="modal-title">Result Attribute Profiles</h5>
                    </div>
                    <div class="pb-md mt-default pl-default">
                        <button type="button" class="btn btn-sm btn-success" id="btnAddResultAttributes" onclick="ClinicalLabDetail.AddResultAttributes();"><i class="fa fa-plus-circle"></i>Add</button>
                    </div>
                    <span class="pr-xs">Inactive</span>
                    <div class="btnWidgetSwitch switch switch-xs switch-success">
                        <input id="switchActive" isActive="1" type="checkbox" checked="checked" name="Switch" data-plugin-ios-switch="" style="display: inline;" onchange="ClinicalLabDetail.reloadTestsOnSwitch(this);">
                    </div>
                    <span class="pr-xs">Active</span>
                    <div class="clearfix"></div>

                    <div class="col-sm-12 col-md-6">
                        <div id="divLabTestGrid" class="panel panel-featured">
                            <header class="panel-heading">
                                <h2 class="panel-title">Test</h2>
                            </header>
                            <div class="panel-body p-none">
                                <ul id="ulLabTest" class="listPrimary own-scroll height-max180"></ul>
                            </div>
                        </div>
                    </div>
                    <div id="divLabTestAttributesGrid" class="col-sm-12 col-md-6">
                        <div id="pnlLabTestAttributes_Result">
                            
                                <input type="hidden" id="AppointmentStatus_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvLabTestAttributes">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">ID </th>
                                            <th class="size110">Attribute</th>
                                            <th class="size20">UoM</th>
                                            <th class="size50">Reference Range</th>
                                            <th class="size40">Result</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                           
                        </div>
                    </div>
                </div>

                <input type="hidden" id="hfLabId" value="-1" name="LabId" />
                <div class="clearfix"></div>
            </div>

        </div>
    </div>

</div>
