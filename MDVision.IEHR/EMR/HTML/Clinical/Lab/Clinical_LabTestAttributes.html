<div id="pnlClinicalLabTestAttributes">
    <div id="actionPanLabTestAttributes" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="ClinicalLabTestAttributes.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Add Test and Attribute(s)</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmClinicalLabTestAttributes" onsubmit="return false">


                    <div class="col-sm-10">
                        <label class="control-label">Test<i class="required">*</i></label>
                        <div class="input-group">
                            <input class="form-control" id="txtLabCPTCode" placeholder="Search test" type="text" name="LabCPTCode" customname="Test" oninput="ClinicalLabTestAttributes.bindAutoComplete(this);" onblur="    ClinicalLabTestAttributes.validateProcedure();">
                            <div class="input-group-btn">
                                <button disabled class="btn btn-primary btn-xs " type="button" onclick="return false;"><i class="fa fa-search"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="col-sm-2 pad-a-labelsize">
                        <div class="checkbox-custom checkbox-default">
                            <input type="checkbox" name="Active" id="chkActive" onchange="ClinicalLabTestAttributes.onChangeInActive(this);" checked>
                            <label for="chkActive">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-10" id="divAttrTextBox">
                        <label class="control-label">Attribute<i class="required">*</i></label>
                        <div class="input-group">
                            <input class="form-control" id="txtAttribute" placeholder="Search test" maxlength="500" type="text" name="Attribute" oninput="ClinicalLabTestAttributes.BindLOINCCodes();">
                            <div class="input-group-btn">
                                <button class="btn btn-xs btn-success" id="btnSaveAttributes" type="button" onclick="ClinicalLabTestAttributes.saveLabTestAttributes();"><i class="fa fa-plus-square"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="col-sm-2 pad-a-labelsize">
                        <div class="checkbox-custom checkbox-default">
                            <input type="checkbox" name="Template" id="chkTemplate" onchange="ClinicalLabTestAttributes.changeTemplateChkBox(this);">
                            <label for="chkTemplate">Template</label>
                        </div>
                    </div>

                    <div class="col-sm-10" style="display:none" id="divDescription">
                        <label class="control-label">Description</label>
                        <textarea class="form-control" rows="3" spellcheck="true" id="txtDescription" name="Description"></textarea>
                    </div>

                    <div class="col-sm-12 pt-md mb-sm text-right">
                        <button type="submit" class="btn btn-sm btn-primary" id="btnSaveLab">Save</button>
                    </div>

                    <input type="hidden" id="hfLLOINICCODE" name="LOINICCODE" />
                    <input type="hidden" id="hfLOINICDescription" name="LOINICDescription" />
                    <input type="hidden" id="hfLLOINICCODE_AND_DESCRIPTION"  />
                    <input type="hidden" id="hfOBSERVATION" name="OBSERVATION" />
                    <input type="hidden" id="hfLabId" name="" />
                    <input type="hidden" id="hfLabTest" name="" />
                    <div class="clearfix"></div>
                </form>

                <div id="divLabTestAttributesGridDtl">
                    <div id="pnlLabTestAttributes_ResultDtl" class="panel-body panel-featured">
                        <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvLabTestAttributesDtl">
                            <thead>
                                <tr>
                                    <th style="display:none;">ID </th>
                                    <th class="size110">Attribute</th>
                                    <th class="size40">UoM</th>
                                    <th class="size40">Reference Range</th>
                                    <th class="size30">Result</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>
