<div class="row" id="clinicalFaceSheetAppointments" style="display:none;">
    <div id="actionPanClinicalFaceSheetAppointment" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="clinicalFaceSheetAppointments.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Appointments Detail</h4>
            </div>
            <div class="modal-body">
                <form method="post" onsubmit="return false" id="frmClinicalFaceSheetAppointment">

                    <div id="pnlClinicalFaceSheetAppointment_Result" style="display: inline;">
                        <div class="panel-body panel-featured">

                            <table class="table table-bordered table-striped table-hover mb-none" id="dgvClinicalFaceSheetAppointments">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Reason</th>
                                        <th>Provider</th>
                                        <th>Time</th>
                                        <th>Duration</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="divFaceSheetAppointmentPaging"></div>
                        </div>
                    </div>
                </form>

            </div>
            <div id="FaceSheetPager"></div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>
