<div id="Clinical_FaceSheetComponentSelection">

            <div class="modal-header" style="">
                <button type="button" class="close" onclick="Clinical_FaceSheetComponentSelection.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>

            </div>
            <div class="modal-body">

                        </div>
                        <div class="clearfix"></div>
                        <div class="pull-right mt-md pr-default">
                            <button id="btnOK" type="submit" class="btn btn-primary btn-sm" value="Accepted" onclick="Clinical_FaceSheetComponentSelection.UnLoad();">Print</button>

            </div>
        </div>
    </div>
