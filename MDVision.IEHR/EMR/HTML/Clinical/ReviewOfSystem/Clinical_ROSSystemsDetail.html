<div id="pnlAdminROSSystemsDetail">
    <div id="actionPanAdminROSSystemsDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_ROSSystemsDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Systems</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmROSSystem" onsubmit="return false">
                    <div class="col-sm-9">
                        <label class="control-label" for="Name">System<span class="required">*</span></label>
                        <input class="form-control" id="txtName" maxlength="150" onchange="Clinical_ROSSystemsDetail.TextChanged()" name="Name" type="text">
                    </div>
                    <div class="col-sm-2 mt-lg">
                        <div class="checkbox-custom">
                            <input type="checkbox" checked="checked" id="chkActive" onchange="Clinical_ROSSystemsDetail.TextChanged()" name="IsActive">
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-9">
                        <label id="lblObservations" for="Charatristics" class="control-label">Associated Characteristics</label>
                        <div class="input-group">
                            <input class="form-control" id="txtCharatristics" name="Characteristics" type="text">
                            <div class="input-group-btn">
                                <button id="lnkName" onclick="Clinical_ROSSystemsDetail.OpenCharatristics()" class="btn btn-primary btn-xs " type="button"><i class="fa fa-search"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 mt-md pull-right text-right">
                        <button id="btnSave" type="submit" class="btn btn-default btn-sm" style="background-color: #468aea !important;border-color: #2464bf !important;">Save</button>
                        <a id="btnSaveAs" onclick="Clinical_ROSSystemsDetail.saveAs(this)" class="btn btn-default btn-sm" style="background-color:#468aea !important">Save As</a>
                        <!--<button id="btnSaveAndExit" type="submit" onclick="Clinical_ROSSystemsDetail.SetforExit(this)" class="btn btn-default btn-sm" style="background-color:#468aea !important">Save & Exit</button>-->
                    </div>
                    <input type="hidden" id="hfROSCharatristicsIds" name="ROSCharatristicsids" />
                </form>
                <div class="clearfix"></div>
                <div class="spacer10"></div>

                <ul id="ulCharatristics" name="Charatristics" onchange="Clinical_ROSSystemsDetail.TextChanged()" class="listPrimary own-scroll height-150 overflowY p-default"></ul>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
