<div class="row" id="pnlAdminROSChatristics" style="display:none;">
    <div id="actionPanAdminROSChatristics" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Clinical_ROSCharatristics.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search characteristics</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Clinical_ROSCharatristics.PEObservationsAdd();"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <div class="clearfix"></div>
                    <div class="panel-body" id="pnl_PEObservations">
                        <div id="ROSCharatristics">
                            <section class="panel panel-featured">
                                <div id="formpanelheading">
                                    <header class="panel-heading">
                                        <div class="panel-actions">
                                            <a href="#" class="closebtn pull-right" onclick="Clinical_ROSCharatristics.UnLoadTab();"></a>
                                        </div>
                                        <h2 class="panel-title">Search characteristic</h2>
                                    </header>
                                </div>
                                <div class="panel-body" id="pnl_carePlan">
                                    <form class="form-bordered" id="frmSearchPEObservations" method="post" onsubmit="return false">
                                        <div class="form-group">
                                            <div class="col-sm-4">
                                                <label class="control-label"> Characteristic</label>
                                                <input class="form-control" id="txtName" name="Name" type="text" />
                                            </div>
                                            <div class="col-sm-4">
                                                <label class="control-label"> Status </label>
                                                <select id="ddlStatus" name="IsActive" class="form-control">
                                                    <option value="">- All -</option>
                                                    <option value="1">Active</option>
                                                    <option value="0">In Active</option>
                                                </select>
                                            </div>
                                            <div class="col-sm-1 mt-sm">
                                                <button class="btn btn-primary rightbtn btn-sm" id="btnROSCharatristicSearch" type="submit" onclick="Clinical_ROSCharatristics.searchROSCharatristics();">Search</button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </section>

                            <span class="spacer10"></span>
                            <div id="dgvROSCharatristics"></div>
                            <div id="divPEObservationsPaging"></div>
                            <span class="spacer10"></span>
                        </div>
                        <div class="clearfix"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
