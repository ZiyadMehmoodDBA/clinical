<!--Patient List-->
<div class="panel panel-featured" id="pnlBatchPatientList">
    <div id="actionPanPatientList" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>

    <header class="panel-heading">
        <h2 class="panel-title">Patient List</h2>
        <div class="panel-actions"><a href="javascript:void(0);" class="closebtn pull-right" onclick="Batch_PatientList.UnLoad();"></a></div>
    </header>
    <form id="frmBatchPatientList" method="post" name="frmBatchPatientListf" onsubmit="return false">

        <div class="panel-body">
            <div class="col-sm-4 col-md-3 p-none">
                <div class="col-xs-12">
                    <label for="" class="control-label">Age</label>
                </div>
                <div class="col-xs-12">
                    <input id="ageFrom" name="ageFrom" maxlength="3" type="text" onkeydown="utility.ValidateDecimal(event, 0);" onblur="Batch_PatientList.compareAge(this);" class="form-control size45per pull-left" />
                    <span class="text-center p-none pull-left size10per"><i class="fa fa-minus"></i></span>
                    <input id="ageTo" name="ageTo" maxlength="3" type="text" onkeydown="utility.ValidateDecimal(event, 0);" onblur="Batch_PatientList.compareAge(this);" class="form-control size45per pull-left" />
                </div>

            </div>
            <div class="col-sm-4 col-md-3">
                <label class="control-label">Sex</label>
                <select id="ddlSex" class="form-control " name="gender" ddlist="GetGender"></select>
            </div>
            <div class="col-sm-4 col-md-3">
                <label class="control-label">Smoking Status</label>
                <select id="ddlSmokingStatus" class="form-control " name="SmokingStatusId" ddlist="GetTobaccoSmokingStatus"></select>
            </div>
            <div class="col-sm-4 col-md-3">
                <label class="control-label">Race</label>
                <select id="ddlRace" name="RaceId" class="form-control " ddlist="GetRace"></select>
            </div>
            <div class="col-sm-4 col-md-3">
                <label class="control-label">Ethnicity</label>
                <select id="ddlEthnicity" name="EthnicityId" class="form-control " ddlist="GetEthnicity"></select>
            </div>
            <div class="col-sm-4 col-md-3">
                <label class="control-label">Preffered Language</label>
                <select id="ddlPrefLanguage" name="PrefLanguageId" class="form-control " ddlist="GetLanguages"></select>
            </div>
            <div class="col-sm-4 col-md-3">
                <label class="control-label">Communication Preference</label>
                <select id="ddlPreferredComm" name="PrefCommunicationId" class="form-control" ddlist="GetCommunication"></select>
            </div>
            <div class="col-sm-4 col-md-3 pad-a-labelsize">
                <div class="pl-default" id="divLabel">
                    <div class="checkbox-custom">
                        <input type="checkbox" id="ptCreateDate" onclick="Batch_PatientList.showFromToCalendar(this);">
                        <label for="ptCreateDate" class="control-label">Pt.Create Date</label>
                    </div>
                </div>
                <div class="col-xs-12 p-none hidden" id="divCalendar">
                    <input type="text" class="form-control size45per pull-left" id="dtFromPtCreate" name="Pt_CreationFrom" />
                    <span class="text-center p-none pull-left size10per"><i class="fa fa-minus"></i></span>
                    <input type="text" class="form-control size45per pull-left" id="dtToPtCreate" name="Pt_CreationTo" />
                </div>
            </div>



            <div class="clearfix"></div>
            <hr class="hrLine" />

            <!--panels-->
            <div class="" id="PMAL">
                <div class="col-sm-6 col-md-3">
                    <div class="col-xs-4 size-max80 p-none">
                        <label class="control-label text-bold">Problems</label>
                    </div>
                    <div class="col-xs-8 p-none">
                        <div class="" id="divLabel">
                            <div class="checkbox-custom">
                                <input type="checkbox" id="chkProblems" onclick="Batch_PatientList.showFromToCalendar(this);">
                                <label for="ptCreateDate" class="control-label">Problem Date</label>
                            </div>
                        </div>
                        <div class="hidden" id="divCalendar">
                            <input type="text" class="form-control size45per pull-left" id="dtFromProblems" name="ProblemsFrom" />
                            <span class="text-center p-none pull-left size10per"><i class="fa fa-minus"></i></span>
                            <input type="text" class="form-control size45per pull-left" id="dtToProblems" name="ProblemsTo" />

                        </div>
                    </div>
                    <div class="spacer3"></div>
                    <header class="panel-blue">
                        <h2 class="panel-title">Problem List</h2>
                    </header>
                    <div class="panel-body p-none">
                        <div class="col-xs-12 mt-sm mb-sm">
                            <div class="input-group">
                                <input class="form-control" id="txtProblem" placeholder="Start typing to search" type="text" oninput="Batch_PatientList.BindproblemText(this)">
                                <div class="input-group-btn">
                                    <button class="btn btn-primary btn-xs" type="button">
                                        <i class="glyphicon glyphicon-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <ul class="listPrimary height-max150 height150 overflowY own-scroll" id="ulProblems">
                            <!--<li><a class="">15348 PhenoSense GT <span class="removeIconList"><i class="fa fa-times"></i></span> </a></li>
                            <li><a class="">15348 PhenoSense GT <span class="removeIconList"><i class="fa fa-times"></i></span> </a></li>
                            <li><a class="">15348 PhenoSense GT <span class="removeIconList"><i class="fa fa-times"></i></span> </a></li>-->
                        </ul>

                    </div>

                </div>

                <div class="col-sm-6 col-md-3">
                    <div class="col-xs-4 size-max80 p-none">
                        <label class="control-label text-bold">Medication</label>
                    </div>
                    <div class="col-xs-8 p-none">
                        <div class="" id="divLabel">
                            <div class="checkbox-custom">
                                <input type="checkbox" id="chkMedication" onclick="Batch_PatientList.showFromToCalendar(this);">
                                <label for="ptCreateDate" class="control-label">Medication Date</label>
                            </div>
                        </div>
                        <div class="hidden" id="divCalendar">
                            <input type="text" class="form-control size45per pull-left" id="dtFromMedication" name="MedicationsFrom" />
                            <span class="text-center p-none pull-left size10per"><i class="fa fa-minus"></i></span>
                            <input type="text" class="form-control size45per pull-left" id="dtToMedication" name="MedicationsTo" />

                        </div>
                    </div>
                    <div class="spacer3"></div>
                    <header class="panel-blue">
                        <h2 class="panel-title">Medication</h2>
                    </header>
                    <div class="panel-body p-none">
                        <div class="col-xs-12 mt-sm mb-sm">
                            <div class="input-group">
                                <input class="form-control" id="txtMedication" placeholder="Start typing to search" type="text" oninput="Batch_PatientList.BindMedicationText(this)">
                                <div class="input-group-btn">
                                    <button class="btn btn-primary btn-xs" type="button">
                                        <i class="glyphicon glyphicon-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <ul class="listPrimary height-max150 height150 overflowY own-scroll" id="ulMedications"></ul>
                    </div>

                </div>

                <div class="col-sm-6 col-md-3">
                    <div class="col-xs-4 size-max80 p-none">
                        <label class="control-label text-bold">Allergies</label>
                    </div>
                    <div class="col-xs-8 p-none">
                        <div class="" id="divLabel">
                            <div class="checkbox-custom">
                                <input type="checkbox" id="chkAllergies" onclick="Batch_PatientList.showFromToCalendar(this);">
                                <label for="ptCreateDate" class="control-label">Allergies Date</label>
                            </div>
                        </div>
                        <div class="hidden" id="divCalendar">
                            <input type="text" class="form-control size45per pull-left" id="dtFromAllergies" name="AllergiesFrom" />
                            <span class="text-center p-none pull-left size10per"><i class="fa fa-minus"></i></span>
                            <input type="text" class="form-control size45per pull-left" id="dtToAllergies" name="AllergiesTo" />

                        </div>
                    </div>
                    <div class="spacer3"></div>
                    <header class="panel-blue">
                        <h2 class="panel-title">Allergies</h2>
                    </header>
                    <div class="panel-body p-none">
                        <div class="col-xs-12 mt-sm mb-sm">
                            <div class="input-group">
                                <input class="form-control" id="txtAllergies" placeholder="Start typing to search" type="text" oninput="Batch_PatientList.BindAllergiesText(this)">
                                <div class="input-group-btn">
                                    <button class="btn btn-primary btn-xs" type="button">
                                        <i class="glyphicon glyphicon-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <ul class="listPrimary height-max150 height150 overflowY own-scroll" id="ulAllergies"></ul>

                    </div>

                </div>

                <div class="col-sm-6 col-md-3">
                    <div class="col-xs-4 size-max80 p-none">
                        <label class="control-label text-bold">Lab Result</label>
                    </div>
                    <div class="col-xs-8 p-none">
                        <div class="" id="divLabel">
                            <div class="checkbox-custom">
                                <input type="checkbox" id="chkLabResult" onclick="Batch_PatientList.showFromToCalendar(this);">
                                <label for="ptCreateDate" class="control-label">Lab Result Date</label>
                            </div>
                        </div>
                        <div class="hidden" id="divCalendar">
                            <input type="text" class="form-control size45per pull-left" id="dtFromLabResult" name="LabResultsFrom" />
                            <span class="text-center p-none pull-left size10per"><i class="fa fa-minus"></i></span>
                            <input type="text" class="form-control size45per pull-left" id="dtToLabResult" name="LabResultsTo" />

                        </div>
                    </div>
                    <div class="spacer3"></div>
                    <header class="panel-blue">
                        <h2 class="panel-title">Lab Result</h2>
                    </header>
                    <div class="panel-body p-none">
                        <div class="col-xs-12 mt-sm mb-sm">
                            <div class="input-group">
                                <input class="form-control" id="txtLabResult" placeholder="Start typing to search" type="text" oninput="Batch_PatientList.BindLabResultText(this)">
                                <div class="input-group-btn">
                                    <button class="btn btn-primary btn-xs" type="button">
                                        <i class="glyphicon glyphicon-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <ul class="listPrimary height-max150 height150 overflowY own-scroll" id="ulLabResults">
                            <!--<li><a class="">15348 PhenoSense GT <span class="removeIconList"><i class="fa fa-times"></i></span> </a></li>
                            <li><a class="">15348 PhenoSense GT <span class="removeIconList"><i class="fa fa-times"></i></span> </a></li>
                            <li><a class="">15348 PhenoSense GT <span class="removeIconList"><i class="fa fa-times"></i></span> </a></li>-->
                        </ul>

                    </div>

                </div>

            </div>
            <!--panels-->
            <div class="pull-right pt-md pr-default">
                <button class="btn btn-success btn-sm" type="button" onclick=" Batch_PatientList.patientListSearch(null,1,30,true);">Search</button>
                <button class="btn btn-success btn-sm" type="button" onclick=" Batch_PatientList.patientListPrint();">Print</button>
            </div>
        </div>
    </form>

    <div class="spacer20"></div>
    <div id="pnlBatchPatientList_Result" style="display: inline;">
        <div class="col-md-12 col-sm-12" id="filterGridBatchPatientList" style="display:none;">
            <div class="pull-right pt-md pr-default col-md-3 pb-md">
                <input type='text' id='txtSearchCharacteristics' onkeyup='Batch_PatientList.getFilteredGrid(this);' class='form-control' placeholder='Search ...' />
            </div>
        </div>
        <div class="panel-body panel-featured">
            <input type="hidden" id="BatchPatientList_SelectedDataKeys" />

            <table class="table table-bordered table-striped table-hover mb-none table-condensed" id="dgvBatchPatientList">
                <thead>
                    <tr>
                        <th class="size80 size-min80">Action</th>
                        <th>Account</th>
                        <th>Patient</th>
                        <th>Gender</th>
                        <th>DOB</th>
                        <th>Smoking</th>
                        <th class="size100 size-min100">Race</th>
                        <th class="size100 size-min100">Ethnicity</th>
                        <th>Language</th>
                        <th>Communication</th>
                        <th class="noWordBreak">Pt. Creation</th>
                        <th class="size100 size-min100">Problem</th>
                        <th class="noWordBreak">Problem Date</th>
                        <th class="size100 size-min100">Medication</th>
                        <th class="noWordBreak">Medication Date</th>
                        <th class="size100 size-min100">Allergy</th>
                        <th class="noWordBreak">Allergy Date</th>
                        <th class="noWordBreak">Lab Results</th>
                        <th class="noWordBreak">Lab Results Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <!--This div is used for pagination purpose-->
            <div id="divBatchPatientListPaging"></div>
        </div>


    </div>

</div>

<!--/Patient List-->
