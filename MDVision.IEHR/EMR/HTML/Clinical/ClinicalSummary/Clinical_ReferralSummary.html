Overview: This function is created to show Referral Summary
*/-->
<div class="row" id="Clinical_ReferralSummary" style="display:none;">

    <div id="actionPanReferralSummary" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_ReferralSummary.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Referral Summary</h4>
            </div>
            <div class="modal-body">
                <form method="post" onsubmit="return false" id="frmReferralSummary">



                    <div class="panel-heading  panel-blue">
                        <h2 class="panel-title white">GENERATE YOUR REFERRAL SUMMARY</h2>
                    </div>
                    <div class="panel-body">
                        <div class="col-md-4 p-none">
                            <div class="col-sm-12">
                                <div class="checkbox-custom">
                                    <input type="checkbox" id="chkEncryption" /><label class="control-label" for="chkEncryption">Encrypt</label>
                                </div>
                            </div>
                            <div class="col-sm-12">
                                <label class="control-label">Password</label>
                                <input class="form-control" name="Password" id="txtPassword" type="password" maxlength="500" />
                            </div>
                        </div>
                        <div class="col-md-8 p-none">
                            <div class="col-sm-12">
                                <div class="checkbox-custom">
                                    <input type="checkbox" id="chkIncludeHashCode" /><label class="control-label" for="chkIncludeHashCode">Include Hash Code in download file</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="control-label">Confirm Password</label>
                                <input class="form-control" name="ConfirmPassword" id="txtConfirmPassword" type="password" maxlength="500" />
                            </div>

                            <div class="col-md-6">
                                <label class="control-label">Clinical Visit<span class="required">*</span> </label>
                                <select id="ddlClinicalVisit" class="form-control" name="ClinicalVisit">
                                    <option value="">--Select--</option>
                                </select>
                            </div>

                        </div>
                        <div class="col-md-4">
                            <label class="control-label">Referring Provider </label>
                            <select id="ddlReferringProvider" class="form-control" name="ReferringProvider">
                                <option value="">--Select--</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="control-label">Referral Reason </label>
                            <textarea class="form-control" name="ReferralReason" id="txtReferralReason" rows="3" spellcheck="true"></textarea>
                        </div>



                    </div>

                    <div class="spacer20"></div>

                    <div class="panel-heading  panel-blue">
                        <h2 class="panel-title text-capitalize white">CUSTOMIZE YOUR CLINICAL SUMMARY</h2>
                    </div>

                    <div class="panel-body">
                        <p>Select which Data Elements to include in Clinical Summary:</p>

                        <header class="panel-heading pl-xs">
                            <div class="checkbox  checkbox-custom">
                                <input id="chkSelectAllDataElements" onclick="Clinical_ReferralSummary.selectAllDataElements(this)" name="SelectAllDataElements" type="checkbox" />
                                <label class="control-label" for="chkSelectAllDataElements">Select All</label>
                            </div>
                        </header>

                        <div id="divDataElements" class="panel-body p-none pb-xs table-responsive">
                            <table id="ulDataElements" class="table table-condensed table-striped">
                                <tbody>
                                    <tr>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkDemographicDataElement" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="DemographicDataElement" class="DemographicDataElement" type="checkbox" disabled="disabled" checked="checked" />
                                                <label class="control-label" for="chkDemographicDataElement">Patient demographics</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkProviderDataElement" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="ProviderDataElement" class="ProviderDataElement" type="checkbox" disabled="disabled" checked="checked" />
                                                <label class="control-label" for="chkProviderDataElement">Provider and office contact</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkSocialHxElement" notecomponenttext="SocialHx" class="SocialHx" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="SocialHistoryDataElement" type="checkbox" />
                                                <label class="control-label" for="chkSocialHxElement">Smoking status</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkProblemDataElement" notecomponenttext="ProblemLists" class="ProblemLists" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="ProblemDataElement" type="checkbox" />
                                                <label class="control-label" for="chkProblemDataElement">Problems</label>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkMedicationDataElement" notecomponenttext="Medications" class="Medications" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="MedicationDataElement" type="checkbox" />
                                                <label class="control-label" for="chkMedicationDataElement">Medications</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkAllergiesDataElement" notecomponenttext="Allergies" class="Allergies" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="AllergiesDataElement" type="checkbox" />
                                                <label class="control-label" for="chkAllergiesDataElement">Allergies</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkImmunizationDataElement" notecomponenttext="Immunization" class="Immunization" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="ImmunizationDataElement" type="checkbox" />
                                                <label class="control-label" for="chkImmunizationDataElement">Immunization</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkAssessmentDataElement" notecomponenttext="Assessment" class="Assessment" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="AssessmentDataElement" type="checkbox" />
                                                <label class="control-label" for="chkAssessmentDataElement">Assessment</label>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkPlanofTreatmentDataElement" notecomponenttext="PlanofTreatment" class="PlanofTreatment" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="PlanofTreatmentDataElement" type="checkbox" />
                                                <label class="control-label" for="chkPlanofTreatmentDataElement">Plan of Treatment</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkPlanOfCareDataElement" notecomponenttext="PlanOfCare" class="PlanOfCare" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="PlanOfCareDataElement" type="checkbox" />
                                                <label class="control-label" for="chkPlanOfCareDataElement">Goals</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkLabResultDataElement" notecomponenttext="LabResults" class="LabResults" labresults"" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="LabResultDataElement" type="checkbox" />
                                                <label class="control-label" for="chkLabResultDataElement">Lab Result(s)</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkVitalSignDataElement" notecomponenttext="Vitals" class="Vitals" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="VitalSignDataElement" type="checkbox" />
                                                <label class="control-label" for="chkVitalSignDataElement">Vital Signs</label>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkMedicalEquipmentDataElement" notecomponenttext="MedicalEquipment" class="MedicalEquipment" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="MedicalEquipmentDataElement" type="checkbox" />
                                                <label class="control-label" for="chkMedicalEquipmentDataElement">Unique Device Identifier</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkProceduresDataElement" notecomponenttext="Procedures" class="Procedures" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="ProceduresDataElement" type="checkbox" />
                                                <label class="control-label" for="chkProceduresDataElement">Procedures</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkCareTeamMembersDataElement" notecomponenttext="CareTeamMembers" class="CareTeamMembers" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="CareTeamMembersDataElement" type="checkbox" />
                                                <label class="control-label" for="chkCareTeamMembersDataElement">Care Team Members</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkRefferralReasonDataElement" notecomponenttext="Refferral" class="Refferral" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="VisitReasonDataElement" type="checkbox" />
                                                <label class="control-label" for="chkRefferralReasonDataElement">Reason for Referral</label>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkPatientInstructionDataElement" notecomponenttext="HealthConcerns" class="HealthConcerns" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="HealthConcernsDataElement" type="checkbox" />
                                                <label class="control-label" for="chkPatientInstructionDataElement">Health Concerns</label>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="checkbox  checkbox-custom">
                                                <input id="chkCognitivesDataElement" notecomponenttext="Cognitives" class="Cognitives" onclick="Clinical_ReferralSummary.selectDataElement(this)" name="CognitivesDataElement" type="checkbox" />
                                                <label class="control-label" for="chkCognitivesDataElement">Functional Status</label>
                                            </div>
                                        </td>
                                        <td></td>
                                        <td></td>
                                    </tr>

                                    <!--<tr>
                                        <td></td>
                                        <td></td>
                                        <td></td>
                                        <td></td>
                                    </tr>-->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mt-md pull-right">
                        <button class="btn btn-primary btn-sm rightbtn" id="btnTransmitCCDA" type="button" onclick="Clinical_ReferralSummary.Transmit();">Transmit CCDA</button>
                        <!--onclick="Clinical_ReferralSummary.downloadReferralSummaryXMLData();"-->
                        <button class="btn btn-primary btn-sm rightbtn" id="btnDownloadCCDAXML" type="button" onclick="Clinical_ReferralSummary.downloadReferralSummaryXMLData('DownloadCCDA');">Download CCDA</button>
                        <!--onclick="Clinical_ReferralSummary.displayReferralSummaryHTML('ReferralSummaryHTML')"-->
                        <button class="btn btn-primary btn-sm rightbtn" id="btnDisplayCCDA" type="button" onclick="Clinical_ReferralSummary.displayReferralSummaryHTML('ReferralSummaryHTML')">Display CCDA</button>
                        <button class="btn btn-primary btn-sm rightbtn" id="btnSavePreferenceDisplayCCDA" type="button" onclick="Clinical_ReferralSummary.SavePreferenceDisplayCCDA()">Save Preference</button>
                    </div>
                    <input type="hidden" id="hfXMLData" />
                    <input type="hidden" id="hfDataIsEncrypted" />

                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
