<div id="pnlClinicalRadiologyOrderDetail">

                                            <i class="glyphicon glyphicon-search"></i>
                                        </button>
                                    </div>
                                </div>

                                    <input class="form-control" id="txtFacilityTo" name="FacilityToName" placeholder="Start typing to search" type="text" oninput="ClinicalRadiologyOrderDetail.OnInputFacilityTo()" />

                                        <button id="lnkFacilityTo" class="btn btn-primary btn-xs " type="button" onclick="ClinicalRadiologyOrderDetail.OpenFacilityTo();"><i class="glyphicon glyphicon-search"></i></button>

                                </div>

                                    <input class="form-control" id="txttAssignee" name="Assignee" placeholder="Start typing to search" type="text">
                                    <div class="input-group-btn">
                                        <button class="btn btn-primary btn-xs" type="button" onclick="ClinicalRadiologyOrderDetail.OpenAssignee()">
                                            <i class="glyphicon glyphicon-search"></i>
                                        </button>
                                    </div>
                                </div>-->

                                <div>
                                    <input class="form-control " id="ddlAssigneeId" type="text" placeholder="Start typing to search" name="Assignee" maxlength="35" />

                                </div>

                            </div>
                            <div class="col-sm-4 col-md-6 p-none">
                                <div class="col-xs-6">
                                    <label class="control-label" for="Date">Date</label>
                                    <div class="input-group">
                                        <span class="input-group-addon"> <i class="fa fa-calendar"></i> </span>
                                        <input type="text" id="txtOrderDate" class="form-control" name="OrderDate" data-plugin-datepicker="">
                                    </div>
                                </div>

                                        <input type="text" id="txtOrderTime" name="OrderTime" class="form-control">

                                </div>

                    <div class="visible-sm visible-xs"><div class="spacer15"></div></div>

                            </div>
                            <div class="col-sm-4 col-md-6">

                                <input id="ddlSecondaryInsuraceId" name="SecondaryInsuraceId" class="form-control" ddlist="" disabled />
                            </div>
                            <div class="col-sm-4 col-md-6">

                                <div class="input-group">

                                    <input class="form-control ui-autocomplete-input" id="txtGuarantor" name="Guarantor" placeholder="Start typing to search" type="text" oninput="ClinicalRadiologyOrderDetail.bindGuarantor();" onblur="utility.ValidateAutoComplete(this, 'frmClinicalRadiologyOrderDetail #hfRadiologyGuarantorId', true);" autocomplete="off">
                                    <div class="input-group-btn">
                                        <button id="lnkGurantor" class="btn btn-primary btn-xs " type="button" onclick="ClinicalRadiologyOrderDetail.openGuarantor();"><i class="glyphicon glyphicon-search"></i></button>
                                    </div>
                                </div>-->
                            </div>
                            <!--<div>
                                <label for="" class="control-label">Guarantor</label>
                                <input id="txtRadiologyGuarantorId" type="text" name="RadiologyGuarantorId" placeholder="Paul Jebblekith" class="form-control" />
                            </div>-->

                                <!--<label for="" class="control-label">Relationship</label>-->
                                <label class="control-label">Relation<span class="required">*</span></label>
                                <!--<select id="ddlRelationShipId" class="form-control " name="RelationShipId" ddlist="GetRelationship" disabled></select>-->
                                <input id="txtRadiologyRelationShipId" type="text" name="RadiologyRelationShipId" class="form-control" disabled />
                            </div>

                        </div>
                    </div>
                    <div class="spacer15"></div>


                    <!-- Start Irfan Code for Editable Grid portion  -->

                        </header>
                        <div class="panel-body pl-none pr-none">

                                </div>

                                            <button disabled class="btn btn-primary btn-xs " type="button" onclick="return false;"><i class="fa fa-search"></i></button>
                                        </div>
                                    </div>

                                </div>

                                            <tr class="">
                                                <th class="size20 p-none" coltype="Expand"></th>
                                                <th id="ColumnAction" actiontype="Delete" coltype="Action" class="size90 size-min90">Action</th>
                                                <th id="thRadiologyDate" controlid="dtpRadiologyDate" iscontroldisabled="0" controlname="RadiologyDate" controlwidth="size80" class="size-min130 size130  text-center va-middle" coltype="datetime">Date</th>
                                                <th id="thRadiologyTime" controlid="tpRadiologyTime" iscontroldisabled="0" controlname="RadiologyTime" controlwidth="size80" class="size-min130 size130  text-center va-middle" coltype="time">Time</th>
                                                <th hfcontrolid="RadiologyOrderTestId" hfcontrolname="RadiologyOrderTestId" controlid="RadiologyProcedure" iscontroldisabled="1" controlname="RadiologyProcedure" coltype="TextBox" isoptional="0">Imaging</th>
                                                <th controlid="Reason" class="size-min130 size130 noWordBreak" controlname="Reason" coltype="datalist" ddlist="GetRadiologyReason">Reason</th>
                                                <th controlid="BodySite" iscontroldisabled="0" controlname="BodySite" class="noWordBreak size30" coltype="textbox">Body Site</th>
                                                <!--<th controlid="RadiologyOrderTestId" style="display:none" class=" size-minp60 size75 noWordBreak" controlname="RadiologyOrderTestId" coltype="hidden">Urgency</th>-->
                                            </tr>
                                        </thead>
                                        <tbody></tbody>

                                    </table>
                                    <input type="hidden" name="RadiologyTestIdsa" id="hfRadiologyTestIds" />
                                </div>
                            </div>
                        </div>

                        <input type="hidden" id="hfCPTCode" name="CPTCodeId" />
                        <input type="hidden" id="hfCPTDescription" name="CPTDescription" />
