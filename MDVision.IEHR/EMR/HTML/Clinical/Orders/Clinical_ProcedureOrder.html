<div class="row" id="pnlClinicalProcedureOrder" style="display:none;">
    <div id="actionPanClinicalProcedureOrder" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog" class="modal-dialog-full">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Clinical_ProcedureOrder.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search Procedure Orders</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" id="btn-add" onclick="Clinical_ProcedureOrder.procedureOrderAddEdit(-1);"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                        <div class="splitterBody mt-xs" id="splitterBody">
                        <section class="panel panel-featured">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Clinical_ProcedureOrder.UnLoadTab()"></a>
                                </div>
                                <h2 class="panel-title">Search Procedure Order </h2>
                            </header>
                            <div class="panel-body" id="pnlProcedureOrder_Search">
                                <form class="form-bordered" method="post" onsubmit="return false" id="frmClinicalProcedureOrder">

                                    <div class="form-group">
                                        <div class="col-md-6">
                                            <label class="control-label">Procedure</label>
                                            <!--<input class="form-control" name="procedure" id="txtProcedure" type="text" maxlength="30" />-->
                                            <div class="input-group ">
                                                <input class="form-control" id="txtCPTCode" maxlength="100" placeholder="Search Procedure" type="text" name="CPTCode" oninput="Clinical_ProcedureOrder.bindAutoComplete(this);" />
                                                <div class="input-group-btn">
                                                    <button class="btn btn-primary btn-xs " type="button" onclick="Clinical_ProcedureOrder.openCPTCode();"><i class="fa fa-search"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <label class="control-label">Order Number</label>
                                            <input class="form-control" name="OrderNo" id="txtOrderNumber" type="text" maxlength="30" />
                                        </div>
                                        <div class="col-sm-4 col-md-2">
                                            <label class="control-label">Provider</label>
                                            <select id="txtProvider" class="form-control" name="Provider"></select>
                                            <!--<div class="input-group">
                                <input class="form-control " id="txtProvider" type="text" placeholder="Start typing to search" name="Provider" onblur="utility.ValidateAutoComplete(this, 'pnlClinicalProcedureOrder #hfProvider', false);" maxlength="35" />
                                <div class="input-group-btn">
                                    <button id="lnkProvider" class="btn btn-primary btn-xs " type="button" onclick="Clinical_ProcedureOrder.OpenProvider();"><i class="fa fa-search"></i></button>
                                </div>
                            </div>-->
                                        </div>
                                        <div class="col-sm-4 col-md-2">
                                            <label class="control-label">Date From</label>
                                            <div class="input-group">
                                                <span class="input-group-addon"> <i class="fa fa-calendar"></i> </span>
                                                <input type="text" class="form-control" id="dpStartDate" name="OrderFromDate" data-plugin-datepicker autocomplete="off">
                                            </div>
                                        </div>
                                        <div class="col-sm-4 col-md-2">
                                            <label class="control-label">Date To</label>
                                            <div class="input-group">
                                                <span class="input-group-addon"> <i class="fa fa-calendar"></i> </span>
                                                <input type="text" class="form-control" id="dpToDate" name="OrderToDate" data-plugin-datepicker autocomplete="off">
                                            </div>
                                        </div>
                                        <div class="col-sm-4 col-md-2">
                                            <label class="control-label">Status </label>
                                            <select id="ddlStatus" class="form-control" name="Status">
                                                <option value="">-All-</option>
                                                <option value="Draft">Draft</option>
                                                <option value="Signed">Signed</option>
                                            </select>
                                        </div>
                                        <div class="mt-md pr-default pull-right">
                                            <button class="btn btn-primary btn-sm rightbtn" id="btnProcedureSearch" type="button" onclick="Clinical_ProcedureOrder.procedureOrderSearch('0');">Search</button>
                                            <button class="btn btn-primary btn-sm rightbtn" id="btnProcedureReset" type="button" onclick="Clinical_ProcedureOrder.procedureOrderReset();">Reset</button>
                                        </div>
                                    </div>
                                    <input type="hidden" id="hfCPTCode" name="CPTCodeId" />
                                    <input type="hidden" id="hfCPTDescription" name="CPTDescription" />
                                    <input type="hidden" id="hfProvider" name="ProviderId" />
                                </form>
                            </div>
                        </section>
                        </div>
                        <div class="splitterBtn mb-none"></div>
                        <input type="hidden" id="hfProcedureOrderId" value="-1" />
                        <input type="hidden" id="hfCPTCode" name="CPTCodeId" />
                    </div>
                
                <div id="pnlProcedureOrder_Result" style="display: inline;">
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <div class="spacer5"></div>
                            <input type="hidden" id="Provider_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvProcedureOrder">
                                <thead>
                                    <tr>
                                        <th style="display:none">ProcedureOrderId</th>
                                        <th id="ColumnAction" actiontype="Save,Edit,Delete,Cancel,Active" coltype="Action" class="size90 size-min90">Action</th>
                                        <th class="size110">Data & Time</th>
                                        <th class="size200 size-min150">Procedure</th>
                                        <th class="size110">Order Number</th>
                                        <th class="size50">Status</th>
                                        <th class="size110">Provider</th>
                                        <th class="size90">Assigned To</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="dgvProcedureOrder_Paging"></div>
                        </div>
                        <div class="pull-right mt-sm">
                            <button class="btn btn-success btn-sm" type="button" onclick="Clinical_ProcedureOrder.addOrdersToNotes();" id="btnAddProcedureOrderToNote"><i class="fa fa-plus"></i> Add to Note</button>
                        </div>
                        <div class="clearfix"></div>
                    </section>
                </div>
            </div>
            <div id="FaceSheetPager"></div>
            <div class="modal-footer"></div>
        </div>

    </div>
</div>
