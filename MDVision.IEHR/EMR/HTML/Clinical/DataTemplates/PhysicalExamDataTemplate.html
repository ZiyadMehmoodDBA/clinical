<div class="row" id="pnlPhysicalExamDataTemplate" style="display:none;">
    <div id="actionPanPhysicalExamDataTemplate" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Clinical_PhysicalExamTemplate.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Search Review Of Systems Template</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" id="btn-add" onclick="PhysicalExamDataTemplate.PhysicalExamDataTemplateAddEdit(-1);"><i class="fa fa-plus-circle"></i> Add</button>
                    <div class="spacer10"></div><div class="clearfix"></div>
                </div>

                <div id="pnlPhysicalExamDataTemplate_Result" style="display: inline;">
                    <section class="panel">
                        <div class="panel-body panel-featured">
                            <div class="col-sm-3" id="divSwitch">
                                <span class="pr-xs">Inactive</span>
                                <div class="btnWidgetSwitch switch switch-xs switch-success">
                                    <input id="switchVisit" isactive="1" type="checkbox" checked="checked" name="switch" data-plugin-ios-switch="" style="display: none;" onchange="PhysicalExamDataTemplate.activeDataTemplateSearch(this);">
                                </div>
                                <span class="pl-xs">Active</span>
                            </div>
                            <div class="clearfix"></div>
                            <div class="spacer5"></div>
                            <input type="hidden" id="Provider_SelectedDataKeys" />
                            <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPhysicalExamDataTemplate">
                                <thead>
                                    <tr>
                                        <th style="display:none;">DataTemplateId</th>
                                        <th id="ColumnAction" actiontype="Save,Edit,Delete,Cancel,Active" coltype="Action" class="size20 size-min20">Action</th>
                                        <th class="size80 size-min80">Data Templates</th>
                                        <th class="size80 size-min80">Templates</th>
                                        <th class="size80 size-min80">Specialty</th>
                                        <th class="size140 size-min140">Last Updated</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                            <div id="dgvPhysicalExamDataTemplate_Paging"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</div>
