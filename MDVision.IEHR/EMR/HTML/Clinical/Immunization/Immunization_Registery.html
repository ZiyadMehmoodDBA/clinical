<div id="pnlImmunization_Registery">
    <div id="actionPanImmunization_Registery" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Immunization_Registery.UnLoadTab()"></a>
            </div>
            <h2 class="panel-title">Registry</h2>
        </header>
        <div class="panel-body">
            <form id="frmRegistery">
                <button type="button" class="btn btn-success btn-sm" onclick="Immunization_Registery.AddRegistery()"><i class="fa fa-plus-circle"></i> Add</button>
                <div class="spacer5"></div>
                <div class="col-sm-4 col-lg-2">
                    <label class="control-label">Provider</label>
                    <select id="ddlprovider" name="ProviderId" class="form-control " ddlist="GetProvider"></select>
                </div>
                <div class="col-sm-4 col-lg-2">
                    <label class="control-label">Registry</label>
                    <select id="ddlregistery" name="RegisteryId" class="form-control " ddlist="GetRegistery"></select>
                </div>
                <div class="col-sm-4  col-sm-2">
                    <label class="control-label">Active?</label>
                    <select id="ddlActive" name="IsActive" class="form-control ">
                        <option value="">- All -</option>
                        <option value="1" selected="selected">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                </div>
                <div class="col-sm-4 col-lg-1 mt-md">
                    <div class="btn-block">
                        <button class="btn btn-primary btn-sm rightbtn" type="button" onclick="Immunization_Registery.SearchRegisteryConfiguration();">Search</button>
                    </div>
                </div>
                <div class="spacer5"></div>
                <div class="spacer5"></div>
            </form>
            <div class="table-responsive" id="pnlImmunization_Registery_Result">
                <table class="table table-striped table-condensed table-hover table-bordered" id="dgvRegistery">
                    <thead>
                        <tr>
                            <th>Action</th>
                            <th>Provider</th>
                            <th>Registry</th>
                            <th>Status</th>
                            <th>Submission</th>
                            <th>Interface</th>
                            <th>Setup Date</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
                <div id="dgvRegistery_Paging"></div>
            </div>
        </div>
    </div>
</div>
