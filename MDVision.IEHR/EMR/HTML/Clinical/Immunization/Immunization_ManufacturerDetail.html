<div id="pnlImmunization_ManufacturerDetail">
    <div id="actionPanImmunization_ManufacturerDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div id="modaldialog" class="modal-dialog-md">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Immunization_ManufacturerDetail.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Add Manufacturer</h4>
            </div>
            <div id="modalbody" class="panel-body">
                <form id="frmManufacturerDetail">
                    <div class="col-md-6">
                        <label class="control-label">Manufacturer Name<span class="required">*</span></label>
                        <input class="form-control" id="txtManufacturerName" type="text" maxlength="500" name="ManufacturerName">
                    </div>
                    <div class="col-md-3">
                        <label class="control-label">MVX Code<span class="required">*</span></label>
                        <input class="form-control" id="txtMVXCode" type="text" name="MVXCode" maxlength="25">

                    </div>
                   
                    <div class="col-md-3 pad-a-labelsize">
                        <div class="checkbox-custom">
                            <input type="checkbox" id="IsActive" name="IsActive" checked>
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="spacer15"></div>
                    
                    <div class="col-sm-4 pull-right mt-md">
                        <button class="btn btn-success btn-sm rightbtn" type="submit" id="btnAdd">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
