<div id="pnlImmunization_ImmunizationAddImmInj">
    <div id="actionPanImmunization_ImmunizationAddImmInj" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Immunization_ImmunizationAddImmInj.UnLoadTab()"></a>
            </div>
            <h2 class="panel-title">Search Imm/Inj</h2>
        </header>
        <div class="panel-body">
            <form id="frmSImmInj">
                <button type="button" class="btn btn-success btn-sm" onclick="Immunization_ImmunizationAddImmInj.AddVaccine()"><i class="fa fa-plus-circle"></i> Add</button>
                <div class="spacer5"></div>
                <div class="col-md-6">
                    <label class="control-label">Immunization/Therapeutic Inj.</label>
                    <div class="">
                        <input class="form-control" id="txtImmInj" type="text" name="ImmInj" customname="Immunization Therapeutic" oninput="Immunization_ImmunizationAddImmInj.BindAutocomplete();" onblur="utility.ValidateAutoComplete(this, 'pnlImmunization_ImmunizationAddImmInj #hfImmInj', false, false, true);">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="control-label">Type</label>
                    <select class="form-control" id="ddlType" name="Type">
                        <option value="0" selected="selected">All</option>
                        <option value="1">Immunization</option>
                        <option value="2">Therapeutic</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="control-label">Status</label>
                    <select class="form-control" id="ddlStatus" name="Status">
                        <option value="">All</option>
                        <option value="1" selected="selected">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                </div>
                <div class="spacer5"></div>
                <button class="btn btn-primary btn-sm rightbtn" type="button" onclick="Immunization_ImmunizationAddImmInj.SearchVaccineAndTherapeutic();">Search</button>
                <div class="spacer5"></div>
            </form>
            <div class="table-responsive">
                <table class="table table-striped table-condensed table-hover table-bordered" id="dgvVaccine">
                    <thead>
                        <tr>
                            <th>Action</th>
                            <th>Im/Inj</th>
                            <th>Name</th>
                            <th id="CVX">CVX</th>
                            <th>CPT</th>
                            <th>Admin Code</th>
                            <th>Modified Date</th>
                            <th>Modified By</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
                <div id="dgvVaccine_Paging"></div>
            </div>

            <input type="hidden" name="hfImmInj" id="hfImmInj" />
        </div>
    </div>
</div>
<script type="text/javascript">

    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });

</script>
