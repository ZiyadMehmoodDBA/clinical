<div id="pnlImmunization_Manufacturer">
    <div id="actionPanImmunization_Manufacturer" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="panel panel-featured">
        <header class="panel-heading">
            <div class="panel-actions">
                <a href="#" class="closebtn pull-right" onclick="Immunization_Manufacturer.UnLoadTab()"></a>
            </div>
            <h2 class="panel-title">Manufacturer</h2>
        </header>
        <div class="panel-body">
            <form id="frmManufacturer">
                <button type="button" class="btn btn-success btn-sm" onclick="Immunization_Manufacturer.AddManufacturer()"><i class="fa fa-plus-circle"></i> Add</button>
                <div class="spacer5"></div>
                <div class="col-md-6">
                    <label class="control-label">Manufacturer Name</label>
                    <div class="">
                        <input class="form-control" id="txtManufacturer" type="text" name="ManufacturerName" oninput="Immunization_Manufacturer.BindAutocomplete();" onblur="    utility.ValidateAutoComplete(this, 'frmManufacturer #hfManufacturerId', false, false, false);">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="control-label">MVX Code</label>
                    <div class="">
                        <input class="form-control" id="txtMVXCode" type="text" name="MVXCode" maxlength="25">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="control-label">Status</label>
                    <select class="form-control" id="ddlStatus" name="Status">
                        <option value="">All</option>
                        <option value="1" selected="selected">Active</option>
                        <option value="0">Inactive</option>
                    </select>
                </div>
                <div class="spacer5"></div>
                <button class="btn btn-primary btn-sm rightbtn" type="button" onclick="Immunization_Manufacturer.SearchManufacturer();">Search</button>
                <div class="spacer5"></div>
            </form>
            <div class="table-responsive">
                <table class="table table-striped table-condensed table-hover table-bordered" id="dgvManufacturer">
                    <thead>
                        <tr>
                            <th>Action</th>
                            <th>Manufacturer Name</th>
                            <th>MVX Code</th>
                            <th>Status</th>
                            <th>Modified Date</th>
                            <th>Modified By</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
                <div id="dgvManufacturer_Paging"></div>
            </div>

            <input type="hidden" name="ManufacturerId" id="hfManufacturerId" />
        </div>
    </div>
</div>
<script type="text/javascript">

    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });

</script>
