<div class="row" id="pnlClinicalHPIComplaints">
    <div id="actionPanClinicalHPIComplaints" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div id="modaldialog" class="modal-dialog ml-lg mr-lg modal-dialog-full size-max100per">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" id="btnClose" class="close" onclick="Clinical_HPIComplaints.unLoadTab(event, false);"></button>
                <h4 class="modal-title">Complaints</h4>
            </div>
            <div class="modal-body">
                <form id="frmClinicalComplaints" method="post" onsubmit="return false">
                    <div class="col-sm-4 col-md-3 col-lg-2">
                        <label class="control-label" for="Date">Date</label>
                        <div class="input-group">
                            <span class="input-group-addon"> <i class="fa fa-calendar"></i> </span>
                            <input type="text" class="form-control" id="dtComplaintDate" name="DateCaptured" data-plugin-datepicker autocomplete="off">
                        </div>
                    </div>
                    <div class="spacer10"></div>
                    <div class="panel-featured panel-body p-none">


                        <div style="height:535px">
                            <div id="favSectionDiv" class="toggleHorDefault toggled" data-title="Favorites">
                                <div class="col-xs-12 pb-sm">
                                    <span class="pull-left">Favorites List</span>
                                    <a class="btn btn-link btn-xs pull-right" onclick="Clinical_HPIComplaints.BindAllFavComplaints()">Select All</a>
                                    <div class="clearfix"></div>
                                    <select id="ddlFavComplaint" name="FavComplaintId" class="form-control" onchange="Clinical_HPIComplaints.BindFavComplaints()"></select>
                                    <input class="form-control mt-default" maxlength="500" type="text" id="FavSearchBox" placeholder="Search" onkeyup="Clinical_HPIComplaints.AutoSearchFavComplaints()" />
                                </div>
                                <ul class="listPrimary overflowY own-scroll scroll-2x" id="ulFavCompliantDisease" name="favCompliantDisease" style="max-height: 435px;"></ul>
                            </div>
                            <div id="FormDiv" class="col-xs-12 pt-default">

                                <div class="col-md-4 col-lg-3">
                                    <section class="panel panel-featured mb-none">
                                        <header class="panel-heading">
                                            <h2 class="panel-title">Complaint</h2>
                                        </header>
                                        <div class="panel-body pl-none pr-none">
                                            <div class="col-xs-12 mb-sm">
                                                <div class="radio-custom col-sm-4">
                                                    <input id="radioProcedure" type="radio" name="radioFreetext" checked="checked" onchange="Clinical_HPIComplaints.changeICDField();" value="procedure">
                                                    <label for="rdFreeText">ICD</label>
                                                </div>
                                                <div class="radio-custom col-sm-4">
                                                    <input id="radioFreetext" type="radio" name="radioFreetext" onchange="Clinical_HPIComplaints.changeICDField();" value="freetext">
                                                    <label for="rdFreeText">Custom</label>
                                                </div>
                                                <div class="radio-custom col-sm-4">
                                                    <input id="radioTemplate" type="radio" name="radioFreetext" onchange="Clinical_HPIComplaints.changeHPITemplate();" value="template">
                                                    <label for="rdFreeText">Template</label>
                                                </div>
                                                <div class="input-group">
                                                    <input class="form-control" id="txtComplaints" data-popupunload="false" oninput="Clinical_HPIComplaints.BindICD9AutoComplete(this)" name="ComplaintName" type="text" value="">
                                                    <div class="input-group-btn" id="btnSearchCPT">
                                                        <button id="btnComplaints" class="btn btn-primary btn-xs" type="button" onclick="Clinical_HPIComplaints.OpenSearchPopup('ICD', 'txtDisease', 'hfCPTCode,hfCPTDescription')"><i class="fa fa-search"></i></button>
                                                    </div>
                                                </div>
                                                <div class="input-group col-xs-12">
                                                    <input class="form-control hidden" placeholder="enter free text" type="text" id="txtFreeText" name="Disease" onblur="Clinical_HPIComplaints.createFreeTextLi();" />
                                                </div>
                                                <div class="input-group col-xs-12">
                                                    <input class="form-control hidden" placeholder="Select Template" type="text" id="txtHPITemplate" />
                                                </div>
                                            </div>
                                            <ul id="ulCompliantDisease" name="CompliantDisease" class="listPrimary  own-scroll" style="height: 256px; max-height: 256px;"></ul>
                                            <ul id="ulHPITemplates" name="HPITemplates" class="listPrimary own-scroll overflowY" style="height: 305px; max-height: 305px;"></ul>
                                        </div>
                                    </section>
                                </div>


                                <div class="col-md-8 col-lg-9 hidden" id="divHPITemplates">
                                    <section id="sectionHPITemplate">
                                        <div id="HPITemplate">
                                            <div class="col-xs-3">
                                                <section class="panel panel-featured" id="System">
                                                    <header class="panel-heading">
                                                        <h2 id="headingHPISymptoms" class="panel-title pull-left">Symptoms</h2>
                                                        <div class="pull-right" id="divAddNewSymptom" onclick="Clinical_HPIComplaints.addNewItem('symptom')"><button class="btn-link white btn btn-xs" type="button"><i class="fa fa-plus-circle"></i></button></div>
                                                        <div class="clearfix"></div>
                                                    </header>

                                                    <div class="panel-body pl-none pr-none own-scroll overflowY" style="height: 381px; max-height: 381px;">
                                                        <div class="demo-section k-content pl-default pr-default mb-xs">
                                                            <input id="Symptoms" class="form-control" />
                                                        </div>
                                                        <div id="divHPISymptoms" class="table-responsive Of-a">
                                                            <table id="ulHPISymptoms" name="HPISymptoms" class="table table-bordered table-condensed hidden">
                                                                <tbody>
                                                                    <tr>
                                                                        <td class="size20">C/O</td>
                                                                        <td class="size20">Denies</td>
                                                                        <td></td>

                                                                    </tr>
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </div>
                                                </section>
                                            </div>
                                            <div class="col-xs-3">
                                                <section id="SymptomFindings" class="panel panel-featured size100per  ">
                                                    <header class="panel-heading">
                                                        <h2 id="headingFindings" class="panel-title pull-left">Findings</h2>
                                                        <div class="pull-right" id="divAddNewFinding" onclick="Clinical_HPIComplaints.addNewItem('finding')"><button class="btn-link white btn btn-xs" type="button"><i class="fa fa-plus-circle"></i></button></div>
                                                        <div class="clearfix"></div>
                                                    </header>
                                                    <div class="panel-body pl-none pr-none own-scroll overflowY" style="height: 381px; max-height: 381px;">
                                                        <div class="demo-section k-content pl-default pr-default">
                                                            <input id="Findings" class="form-control" />
                                                        </div>
                                                          <div id="divHPISymptomFindings">
                                                            <ul id="ulHPISymptomFindings" name="HPISymptomFindings" class="listPrimary"></ul>
                                                        </div>
                                                    </div>
                                                </section>
                                            </div>

                                            <div class="col-md-6">
                                                <section id="sectionFindingDetails" class="panel panel-featured mb-none">
                                                    <header class="panel-heading">
                                                        <h2 class="panel-title">Details</h2>
                                                    </header>
                                                    <div class="panel-body pb-sm">
                                                        <div id="hpiDetails">
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Severity</label>
                                                                <select id="ddlSeverity" name="HPISymptoms_SeverityId" class="form-control" ddlist="GetSeverity"></select>
                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Location</label>
                                                                <select id="ddlLocation" name="HPISymptoms_LocationIds" multiple="multiple" ddlmultilist="GetLocation" class="form-control"></select>
                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Radiation</label>
                                                                <select id="ddlRadiation" name="HPISymptoms_RadiationId" class="form-control" ddlist="GetRadiation"></select>

                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Quality</label>
                                                                <select id="ddlQuality" name="HPISymptoms_QualityId" class="form-control" ddlist="GetQuality"></select>

                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Onset</label>
                                                                <input class="form-control" type="text" id="txtOnset" name="Onset" maxlength="100">
                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Associated with</label>
                                                                <input class="form-control" type="text" id="txtAssociatedWith" name="AssociatedWith" maxlength="100">
                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Aggravated by</label>
                                                                <select id="ddlAggravatedBy" name="HPISymptoms_AggravatedById" class="form-control" ddlist="GetAggravatedBy"></select>
                                                            </div>
                                                            <div class="col-sm-4">
                                                                <label class="control-label">Relieved by</label>
                                                                <select id="ddlRevieledBy" name="HPISymptoms_RelievedById" class="form-control" ddlist="GetRevieledBy"></select>
                                                            </div>                                                            
                                                        </div>
                                                        <div class="col-sm-12 pt-default">                                                            
                                                            <textarea id="txtDetailComments" spellcheck="true" rows="2" name="DetailComments" class="form-control" onchange="" onblur=""></textarea>
                                                        </div>
                                                    </div>
                                                </section>
                                                <section id="sectionComplaintDetails" class="panel panel-featured mb-none">
                                                    <header class="panel-heading">
                                                        <h2 class="panel-title">Details</h2>
                                                    </header>
                                                    <div class="panel-body pb-sm">
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Severity</label>
                                                            <select id="ddlSeverity" name="Complaint_SeverityId" class="form-control" ddlist="GetSeverity"></select>
                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Location</label>
                                                            <select id="ddlLocation" name="Complaint_LocationIds" multiple="multiple" ddlmultilist="GetLocation" class="form-control"></select>
                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Radiation</label>
                                                            <select id="ddlRadiation" name="Complaint_RadiationId" class="form-control" ddlist="GetRadiation"></select>

                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Quality</label>
                                                            <select id="ddlQuality" name="Complaint_QualityId" class="form-control" ddlist="GetQuality"></select>

                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Onset</label>
                                                            <input class="form-control" type="text" id="txtOnset" name="Onset" maxlength="100">
                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Associated with</label>
                                                            <input class="form-control" type="text" id="txtAssociatedWith" name="AssociatedWith" maxlength="100">
                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Aggravated by</label>
                                                            <select id="ddlAggravatedBy" name="Complaint_AggravatedById" class="form-control" ddlist="GetAggravatedBy"></select>
                                                        </div>
                                                        <div class="col-sm-4">
                                                            <label class="control-label">Relieved by</label>
                                                            <select id="ddlRevieledBy" name="Complaint_RelievedById" class="form-control" ddlist="GetRevieledBy"></select>
                                                        </div>
                                                        <div class="col-sm-4 pad-a-labelsize">
                                                            <div class="checkbox-custom">
                                                                <input type="checkbox" id="chkChiefComplaints" name="IsChiefComplaint" value="0">
                                                                <label class="control-label">Chief Complaint</label>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </section>
                                            </div>

                                            <div class="col-xs-6 mt-md">
                                                <section id="SymptomPreview" class="panel panel-featured size100per">
                                                    <header class="panel-heading">
                                                        <h2 id="headingPreview" class="panel-title">Preview</h2>
                                                    </header>
                                                    <div class="panel-body pl-none pr-none" style="min-height:138px; overflow-y:auto;">
                                                        <div class="col-xs-12 borderB pb-sm">
                                                            <div class="col-xs-3 col-lg-2">
                                                                <label class="control-label">Delimiter</label>
                                                            </div>
                                                            <div class="col-xs-3 col-lg-2">
                                                                <select id="delimator" class="form-control bold">
                                                                    <option id="comma" value=",">,</option>
                                                                    <option id="fullstop" value=".">.</option>
                                                                    <option id="collon" value=":">:</option>
                                                                    <option id="terminator" value=";">;</option>
                                                                    <option id="hiphen" value="-">-</option>
                                                                </select>
                                                            </div>
                                                            <div class="col-xs-6">
                                                                <button class="btn btn-xs btn-success" id="btnBold" type="button" data-toggle="tooltip" title="" data-original-title="Bold" onclick="Clinical_HPIComplaints.applyStyle('bold');">B</button>
                                                                <button class="btn btn-xs btn-success" id="btnItalic" type="button" data-toggle="tooltip" title="" data-original-title="Italic" onclick="Clinical_HPIComplaints.applyStyle('italic');"><i>I</i></button>
                                                                <button class="btn btn-xs btn-success" id="btnUnderline" type="button" data-toggle="tooltip" title="" data-original-title="Underline" onclick="Clinical_HPIComplaints.applyStyle('underline');"><u>U</u></button>
                                                                <button class="btn btn-xs btn-success" type="button" data-toggle="tooltip" title="" data-original-title="Clear All" onclick="Clinical_HPIComplaints.applyStyle('clear');">Clear All</button>
                                                            </div>
                                                        </div>
                                                        <div class="col-xs-12 ">                                                            
                                                            <div style="max-height:80px; overflow-y:auto" id="findingContent">
                                                            </div>
                                                            <div id="divFindingContents" class="hidden" ></div>
                                                        </div>
                                                    </div>
                                                </section>
                                            </div>
                                        </div>

                                    </section>
                                </div>

                                <div class="col-xs-12" id="commentsDiv">
                                    <label class="control-label">Comments</label>
                                    <!--<textarea class="form-control" rows="3" id="txtComments" name="Comments" maxlength="5000" spellcheck="true"></textarea>-->
                                    <div id="MacroDescDetails" class="tinymce-autocomplete" hidden>
                                        <ul id="MacroDescriptions" class="list-unstyled list-underlined"></ul>
                                    </div>
                                    <input type="hidden" id="txtComments" name="Comments" />
                                    <div class="form-control editable" style="height:60px; font-size: 12px; overflow-y:auto" maxlength="3000" id="txtComment" name="Comments" contenteditable="true" spellcheck="true"></div>
                                    <textarea class="form-control" rows="3" id="txtTemplateComments" name="TemplateComments" maxlength="5000" spellcheck="true"></textarea>
                                </div>
                                <div class="clearfix"></div>
                            </div>
                        </div>

                    </div>


                    <div class="col-xs-11 pl-none">
                        <label class="control-label">Overall Comments</label>
                        <textarea class="form-control" rows="3" id="txtOverallComments" name="OverallComments" maxlength="5000" spellcheck="true"></textarea>
                    </div>
                    <div class="pull-right pad-a-labelsize">
                        <button class="btn btn-success btn-sm" id="btnAdd" onclick="Clinical_HPIComplaints.AddCompalintsToNotes();">Add to Note</button>
                    </div>
                </form>
                <div class="spacer15"></div>
            </div>
            <div id="Clinical_ComplaintHiddenfields">
                <input type="hidden" id="txtComplaintId" name="ComplaintId" value="0" />
            </div>
            <div id="FaceSheetPager"></div>
            <div class="modal-footer"></div>

        </div>
    </div>
</div>
<script type="text/javascript">

    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });

</script>
