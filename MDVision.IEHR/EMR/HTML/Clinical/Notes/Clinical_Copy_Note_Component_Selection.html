<div id="Clinical_NoteCopyComponentSelection">
    <div id="actionPanNoteCopyComponentSelection" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content">
            <div class="modal-header" style="">
                <button type="button" class="close" onclick="Clinical_Copy_Note_Component_Selection.UnLoad(true);"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Copy Components</h4>
            </div>
            <div class="modal-body">
                
                <form method="post" id="frmClinical_NoteCopyComponentSelection" onsubmit="return false">
                    <h10 class="selection-heading">Select the Components to copy on the new note:</h10>
                    <div class="spacer10"></div>
                    <div class="form-group" id="chkBoxes">
                        
                    </div>

                    <div class="col-sm-1 pull-right">
                        <button class="btn btn-success btn-sm rightbtn" type="button" id="btnCopy" onclick="Clinical_Copy_Note_Component_Selection.CopyNote()">Copy</button>
                    </div>
                    <div class="spacer10"></div>
                    
                </form>
            </div>
        </div>
    </div>
</div>
