<div id="pnlClinicalHPISymFindingDetail">
    <div id="actionPanClinicalHPISymFindingDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_HPISymFindingDetail.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">HPI Complaint</h4>
            </div>
            <div class="modal-body">
                <div id="tblClinicalHPISymFindingDetail">
                    <form method="post" onsubmit="return false;" id="frmClinicalHPISymFindingDetail" name="frmClinicalHPISymFindingDetail">
                        <div class="spacer10"></div>
                        <div class="clearfix"></div>
                        <div class="form-group">
                            <section id="sectionPhysicalExam" class="panel-body tab-content-featured toggleVertical">
                                <div id="PhysicalExam">
                                    <div class="col-md-4 col-lg-3">
                                        <section id="SymptomSections" class="panel panel-featured size100per hidden">
                                            <header class="panel-heading">
                                                <h2 id="headingFamilyMember" class="panel-title pull-left">Findings</h2>
                                                <div class="pull-right" id="divAddNewSubSystem" onclick="Clinical_HPISymFindingDetail.addNewItem('subsystem')"><button class="btn-link white btn btn-xs" type="button"><i class="fa fa-plus-circle"></i></button></div>
                                                <div class="clearfix"></div>
                                            </header>
                                            <div class="panel-body pl-none pr-none">
                                                <div class="demo-section k-content pl-default pr-default">
                                                    <input id="Findings" class="form-control" />
                                                </div>
                                                <div id="divPhysicalExamSystemSection" class="height330 height-max330 own-scroll overflowY">
                                                    <ul id="ulHPISymptomFindings" name="PhysicalExamSystemSection" class="listPrimary"></ul>
                                                </div>
                                            </div>
                                        </section>
                                    </div>
                                    <div class="col-md-8 col-lg-9">
                                        <div class="col-md-12">
                                            <section id="sectionFindingDetails" class="panel panel-featured size100per">
                                                <header class="panel-heading">
                                                    <h2 class="panel-title">Details</h2>
                                                </header>
                                                <div class="panel-body pb-sm">
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Severity</label>
                                                        <select id="ddlSeverity" name="HPISymptoms_SeverityId" class="form-control" ddlist="GetSeverity"></select>
                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Location</label>
                                                        <select id="ddlLocation" name="HPISymptoms_LocationIds" multiple="multiple" ddlmultilist="GetLocation" class="form-control"></select>
                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Radiation</label>
                                                        <select id="ddlRadiation" name="HPISymptoms_RadiationId" class="form-control" ddlist="GetRadiation"></select>

                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Quality</label>
                                                        <select id="ddlQuality" name="HPISymptoms_QualityId" class="form-control" ddlist="GetQuality"></select>

                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Onset</label>
                                                        <input class="form-control" type="text" id="txtOnset" name="Onset" maxlength="100">
                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Associated with</label>
                                                        <input class="form-control" type="text" id="txtAssociatedWith" name="AssociatedWith" maxlength="100">
                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Aggravated by</label>
                                                        <select id="ddlAggravatedBy" name="HPISymptoms_AggravatedById" class="form-control" ddlist="GetAggravatedBy"></select>
                                                    </div>
                                                    <div class="col-sm-4">
                                                        <label class="control-label">Relieved by</label>
                                                        <select id="ddlRevieledBy" name="HPISymptoms_RelievedById" class="form-control" ddlist="GetRevieledBy"></select>
                                                    </div>
                                                    <div class="col-sm-12 pt-default">                                                        
                                                        <textarea id="txtDetailComments" rows="2" spellcheck="true" name="DetailComments" class="form-control" onchange="" onblur=""></textarea>
                                                    </div>
                                                </div>
                                            </section>
                                        </div>
                                        <div class="col-md-12">
                                            <section id="SymptomPreview" class="panel panel-featured size100per">
                                                <header class="panel-heading">
                                                    <h2 id="headingFamilyMember" class="panel-title">Preview</h2>
                                                </header>
                                                <div class="panel-body pl-none pr-none height330 height-max330 own-scroll overflowY">
                                                    <div class="col-xs-12 borderB pb-sm">
                                                        <div class="col-xs-3 col-lg-2">
                                                            <label class="control-label">Delimiter</label>
                                                        </div>
                                                        <div class="col-xs-3 col-lg-2">
                                                            <select id="delimiter" class="form-control">
                                                                <option id="comma" value=",">,</option>
                                                                <option id="fullstop" value=".">.</option>
                                                                <option id="collon" value=":">:</option>
                                                                <option id="terminator" value=";">;</option>
                                                                <option id="hiphen" value="-">-</option>
                                                            </select>
                                                        </div>
                                                        <div class="col-xs-6">
                                                            <button class="btn btn-xs btn-success" onclick="Clinical_HPISymFindingDetail.applyStyle('bold');">B</button>
                                                            <button class="btn btn-xs btn-success" onclick="Clinical_HPISymFindingDetail.applyStyle('italic');"><i>I</i></button>
                                                            <button class="btn btn-xs btn-success" onclick="Clinical_HPISymFindingDetail.applyStyle('underline');"><u>U</u></button>
                                                            <button class="btn btn-xs btn-success" onclick="Clinical_HPISymFindingDetail.applyStyle('reset');">C</button>
                                                            <button class="btn btn-xs btn-success" onclick="Clinical_HPISymFindingDetail.applyStyle('clear');">Clear All</button>
                                                        </div>
                                                    </div>
                                                    <div class="col-xs-12">
                                                        <div class="spacer20">
                                                            <div style="max-height:80px; overflow-y:auto" id="findingContent"></div>
                                                        </div>
                                                    </div>

                                                </div>
                                            </section>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </div>
                        <div class="clearfix"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
