<div id="pnlAdminHPISymptomsDetail">
    <div id="actionPanAdminHPISymptomsDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_HPISymptomsDetail.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Symptoms</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmHPISymptomsDetail" onsubmit="return false">
                    <div class="col-sm-9">
                        <label class="control-label" for="txtName">Symptoms<span class="required">*</span></label>
                        <input class="form-control" id="txtName" maxlength="150" onchange="Clinical_HPISymptomsDetail.TextChanged()" name="Name" type="text">
                    </div>
                    <div class="col-sm-2 mt-lg">
                        <div class="checkbox-custom">
                            <input type="checkbox" checked="checked" id="chkActive" onchange="Clinical_HPISymptomsDetail.TextChanged()" name="IsActive">
                            <label class="control-label" for="chkActive">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-9">
                        <label id="lblFindings" for="txtFindings" class="control-label">Associated Findings</label>
                        <div class="input-group">
                            <input class="form-control" id="txtFindings" name="Findings" type="text">
                            <div class="input-group-btn">
                                <button id="lnkName" onclick="Clinical_HPISymptomsDetail.OpenFinding()" class="btn btn-primary btn-xs " type="button"><i class="fa fa-search"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 mt-md pull-right text-right">
                        <button id="btnSave" type="submit" class="btn btn-default btn-sm" style="background-color: #468aea !important;border-color: #2464bf !important;">Save</button>
                        <a id="btnSaveAs" onclick="Clinical_HPISymptomsDetail.saveAs(this)" class="btn btn-default btn-sm" style="background-color:#468aea !important">Save As</a>
                    </div>
                    <input type="hidden" id="hfHPIFindingsIds" name="HPIFindingsIds" />
                </form>
                <div class="clearfix"></div>
                <div class="spacer10"></div>

                <ul id="ulFinding" name="Findings" onchange="Clinical_HPISymptomsDetail.TextChanged()" class="listPrimary own-scroll height-150 overflowY p-default"></ul>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
