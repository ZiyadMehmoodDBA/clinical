<div class="row" id="pnlClinicalSection">
    <div id="actionPanClinicalSection" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Clinical_Section.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Section</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button type="button" class="btn btn-success btn-sm" onclick="Clinical_Section.SectionAdd();"><i class="fa fa-plus-circle"></i> Add</button> <!------>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Clinical_Section.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Section </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlSection_Search">
                            <form class="form-bordered" method="post" onsubmit="return false">
                                <div class="form-group">
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Short Name">Short Name</label>
                                        <input class="form-control" id="txtSectionShortName" type="text">
                                    </div>
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Section Title">Section Title</label>
                                        <input class="form-control" id="txtSectionTitle" type="text">
                                    </div>
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Description">Description</label>
                                        <input class="form-control" id="txtSectionDescription" type="text">
                                    </div>
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Type">Section Type</label>
                                        <select class="form-control" id="ddlsectionType" ddlist="GetSectionType">
                                            <option selected="selected" value="">-Select-</option>
                                            <option value="1">Practice 1</option>
                                            <option value="2">Practice 2</option>
                                        </select>
                                    </div>
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Speciality">Specialty</label>
                                        <select class="form-control" name="Speciality" ddlist="GetSpecialty" id="Specialitydd">
                                            <option selected="selected" value="">-Select-</option>
                                        </select>
                                    </div>
                                    <div class="col-xs-2">
                                        <label class="control-label">Active?</label>
                                        <select id="ddlActive" class="form-control">
                                            <option value="">- All -</option>
                                            <option value="1" selected="selected">Active</option>
                                            <option value="0">Inactive</option>
                                        </select>
                                    </div>
                                    <div class="col-sm-1 pull-right pad-a-labelsize-btn">
                                        <button class="btn btn-primary btn-sm rightbtn" id="sectionSearch" type="submit" onclick="Clinical_Section.SectionSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>

                    <div id="pnlSection_Result">
                        <section class="panel">
                            <div class="panel-body">
                                <input type="hidden" id="CPTCode_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvSection">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">SectionId</th>
                                            <th>Action</th>
                                            <th>Short Name</th>
                                            <th>Title</th>
                                            <th>Description</th>
                                            <th>Section Type</th>
                                            <th>Specialty</th>
                                            <th>Active</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divSectionPaging"></div>
                            </div>
                        </section>
                    </div>
                    <input type="hidden" id="hfSectionId" value="-1" />
                </div>
            </div>
        </div>
    </div>
</div>
