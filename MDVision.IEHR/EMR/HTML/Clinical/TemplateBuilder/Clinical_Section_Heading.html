<div id="sectionHeadingDetail">
    <div id="actionPansectionHeadingDetail" class="modal fade" role="dialog"></div>
    <div id="modaldialog" class="modal-dialog modal-dialog-lg">
        <div id="modalcontent" class="modal-content">
            <div id="modalheader" class="modal-header">
                <button type="button" class="close" onclick="sectionHeadingDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Section Heading Deatils</h4>
            </div>
            <div id="modalbody">
                <div class="modal-body pt-xs" id="mainScrollPan">
                    <input type="hidden" name="QuestionGroupID" id="QuestionGroupID" value="-1" />
                    <form method="post" id="frmsectionHeadingDetail">
                        <div class="form-group">
                            <div class="col-md-2 col-sm-3">
                                <label class="control-label" for="Short Name">Short Name<span class="required">*</span></label>
                                <input class="form-control" name="ShortName" maxlength="20" id="ShortName" type="text">
                            </div>
                            <div class="col-md-3 col-sm-6">
                                <label class="control-label" for="Description">Description</label>
                                <input class="form-control" name="Description" maxlength="100" id="Description" type="text">
                            </div>

                            <div class="col-md-2 col-sm-3">
                                <label class="control-label" for="Specialty">Specialty<span class="required">*</span></label>
                                <select class="form-control" name="Specialty" ddlist="GetSpecialty" id="SpecialityID">
                                    SpecialityID: "190"
                                    <option selected="selected" value="">-Select-</option>
                                    <option value="P1">Practice 1</option>
                                    <option value="P2">Practice 2</option>
                                </select>
                            </div>

                            <div class="col-md-2 col-sm-3">
                                <label class="control-label" for="BodySystems">Body Systems<span class="required">*</span></label>
                                <select class="form-control" name="BodySystems" ddlist="GetBodySystem" id="BodySystemId">
                                    <option selected="selected" value="">-Select-</option>
                                    <option value="P1">Practice 1</option>
                                    <option value="P2">Practice 2</option>
                                </select>
                            </div>

                            <div class="col-md-2 col-sm-3 size-max120">
                                <label class="control-label size-min120" for="Canvas Columns">Canvas Columns<span class="required">*</span></label>
                                <select class="form-control" id="Canvas">
                                    <option selected="selected" value="">-Select-</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>

                            <div class="col-sm-1 size-max70 pad-a-labelsize">
                                <div class="checkbox-custom checkbox-default ">
                                    <input type="checkbox" id="Active" type="text">
                                    <label class="control-label" for="Active">Active</label>
                                </div>
                            </div>
                            <div class="col-sm-1 pull-right pad-a-labelsize-btn">
                                <button class="btn btn-primary btn-sm rightbtn" type="submit">Save</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
