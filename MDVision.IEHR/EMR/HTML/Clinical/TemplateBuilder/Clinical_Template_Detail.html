<div id="pnlClinicalTemplateDetail">
    <div class="modal-dialog modal-dialog-full">
        <div id="modalcontent" class="modal-content">

                <h4 class="modal-title">Template Details</h4>

                        </div>
                        <div class="col-sm-3 col-md-2">
                            <label class="control-label">Type<span class="required">*</span></label>
                            <select class="form-control" name="TemplateTypeId" ddlist="GetTemplateType" id="TemplateTypeId">
                                <option selected="selected" value="">-Select-</option>

                            </select>
                        </div>
                        <div class="col-sm-5 col-md-4">
                            <label class="control-label">Description</label>
                            <input class="form-control" id="Description" type="text" maxlength="100" />
                        </div>
                        <div class="col-sm-2">

                            <select class="form-control" ddlist="GetSpecialty" id="SpecialityId">

                            </select>
                        </div>
                        <div class="col-sm-2" id="divICDCode_Entity">

                            </select>
                        </div>
                        <div class="col-sm-2" id="divICDCode_Entity">

                            <select class="form-control" ddlist="GetDocument" id="FolderId">
                                <option selected="selected" value="">-Select-</option>

                            </select>
                        </div>
                        <div class="col-sm-1 size-max70 pad-a-labelsize">
                            <div class="checkbox-custom checkbox-default ">
                                <input type="checkbox" id="Active" checked="checked" type="text">
                                <label class="control-label" for="Active">Active</label>
                            </div>
                        </div>
                        <div class="col-sm-1 pull-right pad-a-labelsize-btn">

                                </div>
