<div id="ClinicalCDSQuestionnaireDropdown">
    <div id="actionPanClinicalCDSQuestionnaireDropdown" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-sm">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="ClinicalCDSQuestionnaireDropdown.UnLoad();"><span class="red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="headingTitle" class="modal-title">Questionnaire Dropdown Values</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmQuestionnaireDropdown" onsubmit="return false">
                    <div id="dvQuestionnaireDropdown" class="col-sm-12 comList">
                        <div class="col-xs-12">
                            <div class="input-group">
                                <input class="form-control" id="txtQuestionnaireDropdownValue" maxlength="100" name="QuestionnaireDropdownValue" type="text">
                                <div class="input-group-btn">
                                    <button class="btn btn-success btn-xs" onclick="ClinicalCDSQuestionnaireDropdown.buildulQuestionnaireDropdownLi();" type="button">
                                        <i class="fa fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="col-xs-12 mt-sm">
                            <ul id="ulQuestionnaireDropdown" name="QuestionnaireDropdown" class="listPrimary own-scroll panel-body height-150 overflowY p-default"></ul>
                        </div>

                    </div>
                </form>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
