<div id="pnlMacroQuickAddDetail">
    <div id="actionPanMacroQuickAddDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content ">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_MacroQuickAddDetail.UnLoad();">
                    <span class=" red">&nbsp;</span><span class="sr-only">Close</span>
                </button>
                <h4 id="headingTitle" class="modal-title"><span id="headingMode">Add </span> Macro</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmMacroQuickAddDetail" onsubmit="return false">
                    <div class="col-sm-3">
                        <label for="" class="control-label">Macro Name<span class="required">*</span></label>
                        <input id="txtMacroName" type="text" maxlength="255" name="MacroName" class="form-control" />
                    </div>
                    <div class="col-sm-3">
                        <label for="" class="control-label">Keyword<span class="required">*</span></label>
                        <input id="txtKeyword" type="text" maxlength="80" name="Keyword" class="form-control" />
                    </div>
                    <div class="col-sm-12">
                        <label for="" class="control-label">Description<span class="required">*</span></label>
                        <textarea id="txtDescription" type="text" spellcheck="true" name="Description" class="form-control height300-fixed" />
                    </div>
                    <div class="pull-right pr-default">
                        <button style="margin-top:5px;" class="btn btn-success btn-sm" type="submit" id="btnMacroDetailSave">Save </button>
                        <!--onclick="AOETemplateDetail.saveAOETemplateDetail();"-->
                    </div>
                    <!-- End Irfan Code for Editable Grid portion -->
                </form>
                <div class="clearfix"></div>
            </div>

        </div>
    </div>

</div>
