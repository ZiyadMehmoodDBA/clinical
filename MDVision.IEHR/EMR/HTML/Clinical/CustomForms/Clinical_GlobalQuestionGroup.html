<div class="row" id="pnlClinicalGlobalQuestionGroup">
    <div id="actionPanGlobalQuestionGroup" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_GlobalQuestionGroup.UnLoadTab();"></button>
                <h4 class="modal-title">Global Question Details</h4>
            </div>
            <div class="modal-body">
                <div class="mainScrollPan" id="mainScrollPan">
                    <form method="post" id="frmGlobalQuestionGroup" onsubmit="return false">
                        <div class="form-group">
                            <div class="col-md-4 col-lg-2">
                                <label class="control-label" for="Group Name">Group Name<span class="required">*</span></label>
                                <input class="form-control" name="QuestionGroupName" id="txtGroupName" type="text">
                            </div>
                            <div class="col-md-4 col-lg-3">
                                <label class="control-label" for="Group Titile">Group Title</label>
                                <input class="form-control" id="txtGroupTitile" name="QuestionGroupTitle" type="text">
                            </div>
                            <div class="col-md-4 col-lg-2 hidden">
                                <label class="control-label" for="CanvasCol">Canvas Col(s)<span class="required">*</span></label>
                                <select class="form-control" name="CanvasCols" id="ddlCanvasCol">
                                    <option value="1">6</option>
                                </select>
                            </div>
                            <div class="col-md-10 col-lg-3 p-none">
                                <div class="col-md-4 pad-a-labelsize">
                                    <div class="checkbox-custom checkbox-default ">
                                        <input type="checkbox" id="chkActive" name="IsActive" checked class="disableAll">
                                        <label class="control-label" for="Active">Active</label>
                                    </div>
                                </div>
                                <div class="col-md-8 pad-a-labelsize">
                                    <div class="checkbox-custom checkbox-default ">
                                        <input type="checkbox" id="chkSaveGlobally" name="SaveGlobally">
                                        <label class="control-label" for="SaveGlobally">Save Globally</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-1 pull-right mt-sm">
                                <button class="btn btn-primary btn-sm rightbtn" type="submit">Save</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
