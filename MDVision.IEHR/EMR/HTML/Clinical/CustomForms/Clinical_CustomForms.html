<div class="row" id="pnlClinicalCustomForms">
    <div id="actionPanClinicalCustomForms" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Clinical_CustomForms.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Custom Forms</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button id="customFormAdd" type="button" class="btn btn-success btn-sm" onclick="Clinical_CustomForms.AddCustomForm();"><i class="fa fa-plus-circle"></i> Add</button> <!------>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Clinical_CustomForms.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Section </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlSection_Search">
                            <form class="form-bordered" method="post" onsubmit="return false" id="frmClinicalCustomForms">
                                <div class="form-group">
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Name">Name</label>
                                        <input class="form-control" id="txtCustomFormName" type="text">
                                    </div>

                                    <div class="col-sm-3 col-md-3" id="divCustomFormsSpecialty">
                                        <label class="control-label">Specialty </label>
                                        <select id="ddlSpecialtyCustomForm" multiple="multiple" name="Specialty" class="form-control"></select>
                                    </div>
                                    <div class="col-sm-3 col-md-3" id="divCustomFormsProvider">
                                        <select class="form-control" style="display:none;" name="hiddenPhysicalExamTemplateProvider" id="ddlHiddenCustomFormsProvider"></select>
                                        <label class="control-label">Provider</label>
                                        <select class="form-control" multiple="multiple" name="Provider" id="ddlProviderCustomForm"></select>
                                    </div>

                                    <div class="col-sm-1 pull-right pad-a-labelsize-btn">
                                        <button class="btn btn-primary btn-sm rightbtn" id="sectionSearch" type="submit" onclick="Clinical_CustomForms.customFormsSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>
                    <a id="showAllCFLnk" class="btn btn-link btn-xs pull-right" onclick="Clinical_CustomForms.showAllCustomForms()" style="display:none">Show All</a>
                    <div class="clearfix"></div>
                    <div>
                        <div id="favSectionDiv" data-title="Favorites" class="toggleHorDefault" style="display:none">
                            <div class="col-xs-12 pb-sm">
                                <span class="pull-left">Favorites List</span>
                                <div class="clearfix"></div>
                                <select id="ddlFavoriteListCF" name="FavoriteListCF" onchange="Clinical_CustomForms.loadfavoriteListCF(this)" class="form-control"></select>
                            </div>
                            <ul id="ulFavoriteListCF" name="FavoriteListCF" class="listPrimary overflowY"></ul>
                        </div>


                        <div id="pnlCustomForms_Result">
                            <section class="panel">
                                <div class="panel-body">
                                    <input type="hidden" id="CPTCode_SelectedDataKeys" />
                                    
                                    <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvCustomForms">
                                        <thead>
                                            <tr>
                                                <th>Action</th>
                                                <th>Name</th>
                                                <th>Specialty</th>
                                                <th>Provider</th>
                                                <th>Last Updated</th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                    <div id="divCustomFormsPaging"></div>
                                </div>
                            </section>
                        </div>
                    </div>
                    <input type="hidden" id="hfSectionId" value="-1" />
                </div>
            </div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>
