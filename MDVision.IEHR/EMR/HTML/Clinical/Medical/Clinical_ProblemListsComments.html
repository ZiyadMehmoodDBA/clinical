<div id="Clinical_ProblemListsComments">
    <div id="actionPanProblemListsComments" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_ProblemListsComments.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title" id="titleBlockReason">Comments</h4>
            </div>
            <div class="modal-body">
                <form method="post" onsubmit="return false" id="frmProblemListsComments">
                    <div class="form-group">
                        <div class="col-sm-12">
                            <label class="control-label ">Comments</label>
                            <textarea id="txtComments" name="Comments" class="form-control" maxlength="500" rows="3" spellcheck="true"></textarea>
                        </div>
                    </div>
                    <div class="spacer5"></div>
                    <button class="btn btn-primary btn-sm rightbtn" type="button" onclick="Clinical_ProblemListsComments.SaveComments();">Save & Exit</button>
                    <div class="clearfix"></div>
                </form>
            </div>
        </div><!-- /.modal-content -->
    </div><!-- /.modal-dialog -->
</div><!-- /.modal -->
