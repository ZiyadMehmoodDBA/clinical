<div id="pnlAdminPESystemsDetail">
    <div id="actionPanAdminPESystemsDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_PhysicalExamSystemsDetail.UnLoad();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Systems</h4>
            </div>
            <div class="modal-body">
                <form method="post" id="frmPESystem" onsubmit="return false">
                    <div class="col-sm-9">
                        <label class="control-label" for="Name">System<span class="required">*</span></label>
                        <input class="form-control" id="txtName" maxlength="150" onchange="Clinical_PhysicalExamSystemsDetail.TextChanged()" name="Name" type="text">
                    </div>
                    <div class="col-sm-2 mt-lg">
                        <div class="checkbox-custom">
                            <input type="checkbox" checked="checked" id="chkActive" onchange="Clinical_PhysicalExamSystemsDetail.TextChanged()" name="IsActive">
                            <label class="control-label">Active</label>
                        </div>
                    </div>
                    <div class="col-sm-9">
                        <label id="lblObservations" for="Observations" class="control-label">Associated Observation</label>
                        <div class="input-group">
                            <input class="form-control" id="txtObservations" name="Observations"  type="text">
                            <div class="input-group-btn">
                                <button id="lnkName" onclick="Clinical_PhysicalExamSystemsDetail.OpenObservation()" class="btn btn-primary btn-xs " type="button"><i class="fa fa-search"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 mt-md pull-right text-right">
                        <button id="btnSave" type="submit" class="btn btn-default btn-sm" style="background-color: #468aea !important;border-color: #2464bf !important;" >Save</button>
                        <a id="btnSaveAs" onclick="Clinical_PhysicalExamSystemsDetail.saveAs(this)" class="btn btn-default btn-sm" style="background-color:#468aea !important" >Save As</a>
                    </div>
                    <input type="hidden" id="hfPEObservationIds" name="PEObservationIds" />
                </form>
                <div class="clearfix"></div>
                <div class="spacer10"></div>

                <ul id="ulObservation" name="Observations" onchange="Clinical_PhysicalExamSystemsDetail.TextChanged()" class="listPrimary own-scroll height-150 overflowY p-default"></ul>
                <div class="clearfix"></div>
            </div>
        </div>
    </div>
</div>
