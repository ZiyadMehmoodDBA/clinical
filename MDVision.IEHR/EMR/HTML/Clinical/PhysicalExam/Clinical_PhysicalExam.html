                    <div role="tabpanel" class="tab-pane" id="add">

                            <section class="panel panel-featured">
                                <div id="formpanelheading">
                                    <header class="panel-heading">
                                        <div class="panel-actions">
                                            <a href="#" class="closebtn pull-right" onclick="Clinical_PhysicalExam.unLoadTab();"></a>
                                        </div>
                                        <h2 class="panel-title">Add Physical Exam</h2>
                                    </header>

                                <div class="panel-body NoRadiusT" id="pnlSection_Search">
                                    <form id="frmClinicalPhysicalExam" method="post" name="frmClinicalPhysicalExam" onsubmit="return false">

                                        <div class="clearfix"></div>
                                        <div class="form-group">
                                            <div class="col-sm-4 col-lg-2">
                                                <label class="control-label" for="Date">Date</label>

                                                    <input type="text" class="form-control" id="dtPhysicalExamDate" name="PatientPhysicalExamDate" data-plugin-datepicker>
                                                </div>
                                            </div>
                                            <div class="col-sm-4 col-lg-2 size-max120 pad-a-labelsize">
                                                <div class="checkbox-custom">
                                                    <input type="checkbox" id="chkPhysicalExamsNormal" onclick="Clinical_PhysicalExam.AllSystemNormarl(this,true);" name="bNormal">

                                                </div>
                                            </div>
                                            <div id="divNormalExams" class="col-sm-12 col-lg-8 pad-a-labelsize hidden">

                                                        <textarea id="txtNormalExamsDetail" spellcheck="true" name="NormalExamsDetail" rows="2" class="pl-sm pr-xlg height-max105 size100per textAreaScroll" onblur="Clinical_PhysicalExam.saveSystemNormalCommentInJSON(this)"></textarea>
                                                        <div class="clearfix"></div>
                                                        <div class="rightInnerAddonBtn"><a id="btnSaveNormalExam" onclick="Clinical_PhysicalExam.saveExamNormalDetail(this);" class="btn btn-link btn-xs"><i class="fa fa-save"></i></a></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="spacer20"></div>
                                            <section id="sectionPhysicalExam" class="panel-body tab-content-featured toggleVertical">

                                                            <h2 id="headingFamilyMember" class="panel-title pull-left">Systems</h2>

                                                        </header>
                                                        <div class="panel-body pl-none pr-none">

                                                                <ul id="ulPhysicalExamSystems" name="PhysicalExamSystems" class="listPrimary"></ul>
                                                            </div>
                                                        </div>
                                                    </section>

                                                    </div>-->

                                                            <h2 id="headingFamilyMember" class="panel-title pull-left">Sub systems</h2>

                                                        </header>

                                                                <ul id="ulPhysicalExamSystemSection" name="PhysicalExamSystemSection" class="listPrimary"></ul>
                                                            </div>
                                                        </div>
                                                    </section>

                                                    </div>-->
                                                    <section id="SectionCharacteristics" class="panel panel-featured panel-xs hidden">
                                                        <header class="panel-heading">
                                                            <h2 id="headingFamilyMember" class="panel-title pull-left">Characteristics</h2>
                                                            <!--<div class="pull-right" id="divAddNewCharacteristic" onclick="Clinical_PhysicalExam.addNewItem('characteristic')"><button class="btn-success btn btn-xs" type="button"><i class="fa fa-plus-circle"></i></button></div>-->
                                                            <div class="clearfix"></div>
                                                        </header>
                                                        <div class="panel-body pl-none pr-none">
                                                            <div id="divExamCharacteristics" class="height330 height-max330 own-scroll overflowY">
                                                                <div class="col-xs-12 mt-xs mb-xs">
                                                                    <div class="input-group">
                                                                        <input class="form-control" id="txtSearchMember" oninput="Clinical_PhysicalExam.filterOptions(this, 'ulExamCharacteristics')" name="SearchMember" placeholder="Search" type="text" value="">
                                                                        <div class="input-group-btn">
                                                                            <button id="btnDisease" class="btn btn-primary btn-xs" type="button" onclick=""><i class="glyphicon glyphicon-search"></i></button>
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                    </div>-->

                                                        </header>
                                                        <div class="panel-body pl-none pr-none">

                                                                <div class="col-xs-12 mt-xs mb-xs">
                                                                    <div class="input-group">
                                                                        <input class="form-control" id="txtSearchMember" oninput="Clinical_PhysicalExam.filterOptions(this, 'ulExamSubCharacteristics')" name="SearchMember" placeholder="Search" type="text" value="">
                                                                        <div class="input-group-btn">
                                                                            <button id="btnDisease" class="btn btn-primary btn-xs" type="button" onclick=""><i class="glyphicon glyphicon-search"></i></button>
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                            </div>

                                                                    <textarea id="txtPhysicalExamPreviousHistory" name="PhysicalExamPreviousHistory" rows="2" class="form-control" spellcheck="true"></textarea>
                                                                </div>

                                                                    <select id="ddlPhysicalExamStatus" name="PhysicalExamStatus" ddlist="GetMedicalHxStatus" class="form-control"></select>
                                                                </div>

                                                                </div>

                                                                </div>
                                                                <div class="col-sm-4 col-md-4 col-lg-4">
                                                                    <label class="control-label">Aggravated by</label>
                                                                    <select id="ddlPhysicalExamAgggravatedby" name="PhysicalExamAgggravatedby" ddlist="GetMedicalHxAggravatedBy" class="form-control"></select>
                                                                </div>
                                                                <div class="col-sm-4 col-md-4 col-lg-4">

                                                                    <select id="ddlPhysicalExamRelievedby" name="PhysicalExamRelievedby" ddlist="getPhysicalExamRelievedBy" class="form-control"></select>

                                                                </div>
                                                                <div class="col-sm-4 col-md-4 col-lg-4">
                                                                    <label class="control-label">Precipitated by</label>
                                                                    <textarea id="txtPhysicalExamPercipitatedby" name="PhysicalExamPercipitatedby" rows="2" class="form-control" spellcheck="true"></textarea>
                                                                </div>
                                                                <div class="col-md-12">
                                                                    <label class="control-label">Associated with</label>
                                                                    <textarea id="txtPhysicalExamAssociatedwith" name="PhysicalExamAssociatedwith" rows="2" class="form-control" spellcheck="true"></textarea>
                                                                </div>

                                                                <div class="pull-right pt-sm pr-default hidden">
                                                                    <button id="btnPhysicalExamSave" type="button" onclick="Clinical_PhysicalExam.PhysicalExamSave('');" class="btn btn-sm btn-success">Save</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </section>
                                                    <div id="divTogglePhysicalExamDetails" class="toggle hidden" data-plugin-toggle="">
                                                        <section class="toggle">
                                                            <label>Detail</label>
                                                        </section>
                                                    </div>

                                                </div>
                                            </section>
                                        </div>
                                        <div class="clearfix"></div>
                                    </form>
                                </div>
                            </section>
                            <div class="col-md-12">
                                <label class="control-label">Overall Comments</label>
                                <textarea id="txtComments" name="Comments" maxlength="5000" rows="3" class="form-control" spellcheck="true"></textarea>
                            </div>
                            <div class="pull-right pad-a-labelsize-btn pr-default">
                                <button class="btn btn-success btn-sm pull-right mr-sm" style="display:none;" type="button" onclick="Clinical_PhysicalExam.addPhysicalExamToNotes();" id="btnAddVitalsOnNote">Add on Note</button>
                                <!--<button class="btn btn-cancel btn-sm  mr-sm" type="button" onclick="Clinical_PhysicalExam.resetPhysicalExam();" id="btnResetPhysicalExam"><i class="fa fa-refresh"></i> Reset</button>-->
                                <button class="btn btn-success btn-sm pull-right mr-sm hidden" type="button" onclick="Clinical_PhysicalExam.PhysicalExamSave('');" id="btnPhysicalExamSave">Save</button>
                            </div>
                            <div class="clearfix"></div>
                            <!-- /Physical Exam -->

                    </div>

                <div class="clearfix"></div>

                <input type="hidden" name="PatientId" id="hfPatientId" />

                <input type="hidden" name="NotesId" id="hfNotesId" value="-1" />
                <input type="hidden" name="PhysicalExamType" id="hfPhysicalExamType" value="tobacco" />
                <input type="hidden" name="PhysicalExamSoapText" id="hfPhysicalExamSoapText" value="" />
                <input type="hidden" name="gridComments" id="hfGridComments" />
