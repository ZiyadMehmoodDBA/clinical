<div id="pnlClinicalSuperBillTemplate">
    <div id="actionPanClinicalSuperBillTemplate" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Clinical_SuperBillTemplate.UnLoad();"><span class=" red" aria-hidden="true">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title" id="titleBlockReason">eSuperbill Template</h4>
            </div>
            <div id="MainDiv" class="modal-body">
                <form method="post" onsubmit="return false" id="frmSuperBillTemplate">

                    <div class="col-md-4">
                        <label class="control-label">Template</label><span class="required">*</span>
                        <select id="ddlSuperBillTemplate" name="SuperBillTemplate" class="form-control" onchange="Clinical_SuperBillTemplate.appendCodes(this)" ddlist="GetSupperBill"></select>
                    </div>
                    <div class="spacer10"></div>
                    <div class="panel-body panel-featured">
                        <div id="girdCPTICD" class="height-max400 col-md-12">
                            <div id="cptCodes" class="col-md-6" style="width:50%; float:left;">
                                <h6 class="btn-link disableHover" >CPT Codes</h6>
                                <div id="pnlCPTCodes" class="table-responsive">
                                    <table class="table table-bordered table-condensed table-striped table-hover" id="tblCPTCodes">
                                        <thead class="printheading">
                                            <tr class="">
                                                <th style="vertical-align: middle;" id="ColumnMasterCheckbox" class="size20"><input onclick="Clinical_SuperBillTemplate.markAllCPTCodes(this);" type="checkbox" name="masterCPTCheckbox" /></th>
                                                <th style="vertical-align: middle;" id="thCPT">CPT</th>
                                                <th style="vertical-align: middle;" id="thCPTDiscription" class="size250">Description</th>
                                                <th style="vertical-align: middle;" class="hidden size40" id="thCPTUnits">Unit(s)</th>
                                            </tr>
                                        </thead>
                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>

                            <div id="icdCodes" class="col-md-6" style="width:50%; float:left;">
                                <h6 class="btn-link disableHover">Diagnosis Codes</h6>
                                <div id="pnlICDCodes" class="table-responsive">
                                    <table class="table table-bordered table-condensed table-striped table-hover" id="tblDiagnosisCodes">
                                        <thead class="printheading">
                                            <tr class="">
                                                <th style="vertical-align: middle;" id="ColumnMasterCheckbox" class="size20"><input onclick="Clinical_SuperBillTemplate.markAllICDCodes(this);" type="checkbox" name="masterICDCheckbox" /></th>
                                                <!--<th style="vertical-align: middle;" id="thICD9">ICD-9</th>-->
                                                <th style="vertical-align: middle;" id="thICD10">ICD-10</th>
                                                <th style="vertical-align: middle;" id="thICDDiscription" class="size200">Description</th>
                                            </tr>
                                        </thead>

                                        <tbody></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div id="btnSavePrint" class="pull-right pt-md pr-default">
                            <button type="button" class="btn btn-sm btn-primary" onclick="Clinical_SuperBillTemplate.pushCodesToBillingInfo();" id="btnSaveTemplate">Save</button>
                            <button type="button" onclick="Clinical_SuperBillTemplate.PrintReport();" class="btn btn-sm btn-primary" id="btnPrintTemplate">Print</button>
                        </div>
                    </div>

                    <div class="panel-body" id="PrintPdfControlDiv" style="display:none;">
                        <input type="hidden" id="helperPDF" />
                        <iframe id="PreviewReportPrint" src="Scripts/js/pdf/web/viewer.html" class="col-sm-12" style="height:1066px;"></iframe>
                    </div>
                    <script>

                        kendo.pdf.defineFont({
                            "DejaVu Sans": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans.ttf",
                            "DejaVu Sans|Bold": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Bold.ttf",
                            "DejaVu Sans|Bold|Italic": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Oblique.ttf",
                            "DejaVu Sans|Italic": "http://cdn.kendostatic.com/2016.2.714/styles/fonts/DejaVu/DejaVuSans-Oblique.ttf"
                        });
                    </script>
                    <style type="text/css">
                        .blueBgPrint {
                            background: #005da9 !important;
                            color: #fff !important;
                        }

                        .blueBorderPrint {
                            border-bottom: 2px solid #005da9;
                        }
                        .line-height-fix li{                           
                                line-height:18px !important;
                            }                      
                    </style>

                    <script type="x/kendo-template" id="page-template">
                        <div class="page-template">
                            <div class="blueBorderPrint" style="position:absolute;left:20px; right: 20px;font-size: 90%;height: 100%;top: 15px; padding:2px 5px 0 5px;">
                                <div class="col-sm-12 col-lg-12">
                                    <div class="col-sm-5 col-lg-5 pull-left">
                                        <img id="ClinicalReportsHeaderLogo" src="content/images/SHS-nav-logo-small-100.png" class="img-responsive" style="max-width: 350px;max-height:140px;" />
                                    </div>

                                    <div class="pull-right col-sm-5 col-lg-5" id="PracticeDiv"></div>
                                </div>
                                <div class='clearfix'></div><div class='splitter m-none mt-xs'>
                                    <div class='spacer3'></div>
                                </div>
                                <div class="col-sm-12 col-lg-12">
                                    <div class="pull-left col-sm-5 col-lg-5" id="PatientDiv"></div>
                                    <div class="pull-right col-sm-5 col-lg-5" id="ProviderDiv"></div>
                                </div>
                                <div class='clearfix'></div><div class='splitter m-none mt-xs'>
                                    <div class='spacer3'></div>
                                </div>
                            </div>
                            <div style="position: absolute;left: 20px;right: 20px;font-size: 90%;bottom: 20px;">
                                <div class="blueBgPrint" style=" float:left; width:100%; height:3px;margin-bottom:3px;"></div>
                                <div id="ClinicalReportsFooterText" class="blueBgPrint" style="float:left; width:100%;padding:2px 5px 0 5px;height:22px;">
                                    Generated by:<span id="ClinicalReportsFooter">MDVISION PM EMR</span><span class="whiteColorPrint" style="float:right;"> Page #:pageNum# of #:totalPages#</span>
                                </div>
                            </div>

                        </div>
                    </script>

                    <div id="printcall" style="display:none;">
                        <div id="PatientInfo" class="panel-body panel-featured">
                            <div class="col-sm-4 col-lg-2 pull-left">
                                <img src="content/images/SHS-nav-logo-small-100.png" class="img-responsive" style="max-width: 350px;max-height:140px;" >
                            </div>

                            <ul class="list-unstyled pull-right line-height-fix" id="PracticeList">
                                <li id="PracticeName"> </li>
                                <li id="PracticeAddress"></li>
                                <li id="PracticeCity"></li>
                                <li id="PracticePhone"></li>
                            </ul>
                            <div class="clearfix"></div>
                            <div class="splitter m-none mt-xs"><div class="spacer3"></div></div>


                            <ul class="list-unstyled pull-left line-height-fix" id="PatientList">
                                <li id="PatientName"></li>
                                <li id="PatientAge"></li>
                                <li id="PatientAccount"></li>
                                <li id="PatientPhone"></li>
                                <li id="PatientAddress"></li>
                            </ul>

                            <ul class="list-unstyled pull-right line-height-fix" id="ProviderList">
                                <li id="ProviderName"></li>
                                <li id="Specialty"></li>
                                <li id="NoteDateTime"></li>
                                <li id="VisitReason"></li>
                            </ul>
                        </div>
                        <div class="spacer5"></div>
                        <section class="panel panel-featured">
                            <div class="panel-body" id="ulContent">
                            </div>
                        </section>
                    </div>
                </form>
            </div>
        </div><!-- /.modal-content -->
    </div><!-- /.modal-dialog -->
</div><!-- /.modal -->
