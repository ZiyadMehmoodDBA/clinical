<div id="ENMCodeSuggest">
    <div id="actionPanENMCodeSuggest" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true">
    </div>
    <div class="modal-dialog modal-dialog-lg">
        <div class="modal-content ">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="ENMCodeSuggest.UnLoad();"><span class="" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Evaluation & Management</h4>
            </div>
            <div class="modal-body">
                <div class="panel">

                    <label for="suggestEMCode"><span id="EMCode" style="color:#468aea;">  Current Recommended E&M Code: </span></label>
                    <div id="divEvalnMangement" class="panel panel-featured">
                        <header class="panel-heading">
                            <h4 class="panel-title">Add the following for the next E&M level </h4>
                        </header>
                        <div class="panel-body">
                            <div>
                                <ul id="suggestions"></ul>
                            </div>
                        </div>
                        <div class="pull-right">
                            <button class="btn btn-success btn-sm mt-sm" type="button" id="btnContinue"  onclick="ENMCodeSuggest.UnLoad();"> Continue</button>
                            <button class="btn btn-success btn-sm mt-sm" type="button" id="btnBack" onclick="ENMCodeSuggest.UnLoadToMain();"> Back to note</button>
                        </div>
                    </div>
                </div>
              
                  <p>- It is only a suggestion. You can use any other E&M code you feel is suitable for this encounter.</p>
            </div>
        </div>
    </div>
</div>
