<div class="row" id="pnlPatientAppointments">
    <div id="actionPatientAppointments" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Patient_Appointments.UnLoadTab();"><span class="red"></span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Patient Appointments</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured mb-default">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Patient_Appointments.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Search Patient Appointments </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlSection_Search">
                            <form class="form-bordered" method="post" onsubmit="return false" id="frmPatientAppointments">
                                <div class="form-group">
                                    <div class="col-sm-3">
                                        <label class="control-label">Provider</label>
                                        <div class="input-group">
                                            <input class="form-control" id="txtProvider" type="text" placeholder="Start typing to search" name="Provider" customname="Provider" maxlength="35" data-bv-field="Provider" />
                                            <div class="input-group-btn">
                                                <button id="lnkProvider" class="btn btn-primary btn-xs " type="button" onclick="Patient_Appointments.OpenProvider();"><i class="fa fa-search"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="control-label">Facility</label>
                                        <div class="input-group">
                                            <input class="form-control" id="txtFacility" type="text" placeholder="Start typing to search" name="Facility" customname="Facility" maxlength="35" data-bv-field="Facility" />
                                            <div class="input-group-btn">
                                                <button id="lnkFacility" class="btn btn-primary btn-xs " type="button" onclick="Patient_Appointments.OpenFacility();"><i class="fa fa-search"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="control-label">Status</label>
                                        <select id="ddlAppointmentStatus" name="AppointmentStatusIds" multiple="multiple" ddlmultilist="GetAppointmentStatus" class="form-control"></select>
                                    </div>
                                    <div class="pull-left pl-default pt-lg pr-default">
                                        <button class="btn btn-primary btn-sm" id="sectionSearch" type="button" onclick="Patient_Appointments.PatientAppoitmentsSearch();">Search</button>
                                    </div>
                                </div>
                                <input type="hidden" id="hfPatientId" value="" />
                                <input type="hidden" id="hfProvider" value="" />
                                <input type="hidden" id="hfFacility" value="" />
                            </form>
                        </div>
                    </section>
                    <div id="pnlPatientAppoitments_Result" style="display: inline;">
                        <section class="panel">
                            <div class="panel-body">
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPatientAppoitments">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">Id</th>
                                            <th>Date</th>
                                            <th>Time</th>
                                            <th>Reason</th>
                                            <th>Provider</th>
                                            <th>Facility</th>
                                            <th>Duration</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divPatientAppoitmentsPaging" class="col-sm-12 p-none mt-xs" style="display: inline;"></div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>
