<div class="row" id="pnlSelectCustomForm">
    <div id="actionPanSelectCustomForm" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <!--<div class="clearfix"></div>-->

    <div class="modal-dialog modal-dialog-md">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Select_CustomForm.UnLoadTab();"></button>
                <h4 class="modal-title">Select Custom Form</h4>
            </div>
            <div class="modal-body">
                <div class="panel-body p-none" id="pnlSection_Search" >
                    <div style="height:345px">
                        <div id="favSectionDiv" data-title="Favorites" class="toggleHorDefault">

                            <div class="col-xs-12 pb-sm">
                                <span class="pull-left">Favorites List</span>
                                <!--<a id="favSelectAllLink" href="#" onclick="Select_CustomForm.selectAllFavoriteListContent()" class="btn btn-link btn-xs pull-right disableAll">Select All</a>-->
                                <div class="clearfix"></div>
                                <select id="ddlFavoriteListCustomForms" name="FavoriteListCustomForms" onchange="Select_CustomForm.loadfavoriteListContent(this)" class="form-control"></select>
                            </div>
                            <ul id="ulFavoriteListCustomFormsContent" name="FavoriteListCustomFormsContent" class="listPrimary height-max285 overflowY"></ul>

                        </div>
                        <div class="col-xs-12">
                            <form id="frmSelectCustomForm" method="post" onsubmit="return false">
                                <div class="col-sm-12">
                                    <label class="control-label">Form <span class="required">*</span></label>
                                    <select id="ddlCustomForm" name="TemplateLetterId" class="form-control" ddlist="GetCustomFormName"></select>
                                </div>

                                <div class="pull-right mt-default pr-default"><button type="submit" class="btn btn-primary btn-sm">Create</button></div>
                                <div class="spacer10"></div>

                            </form>
                        </div>
                    </div>
                </div>

               
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">

    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });

</script>
