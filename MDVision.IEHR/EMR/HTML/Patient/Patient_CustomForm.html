<div class="row" id="pnlPatientCustomForm">
    <div id="actionPanCustomForm" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="clearfix"></div>
    <div id="modaldialog">
        <div id="modalcontent">
            <div id="modalheader" style="display:none;">
                <button type="button" class="close" onclick="Clinical_CustomForms.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 class="modal-title">Custom Forms</h4>
            </div>
            <div id="modalbody">
                <div class="mainScrollPan" id="mainScrollPan">
                    <button id="customFormAdd" type="button" class="btn btn-success btn-sm" onclick="Patient_CustomForm.AddCustomForm();"><i class="fa fa-plus-circle"></i> Add</button> <!------>
                    <div class="spacer10"></div><div class="clearfix"></div>
                    <section class="panel panel-featured mb-default">
                        <div id="formpanelheading">
                            <header class="panel-heading">
                                <div class="panel-actions">
                                    <a href="#" class="closebtn pull-right" onclick="Clinical_Section.UnLoadTab();"></a>
                                </div>
                                <h2 class="panel-title">Search Custom Form </h2>
                            </header>
                        </div>
                        <div class="panel-body" id="pnlSection_Search">
                            <form class="form-bordered" method="post" onsubmit="return false" id="frmPatientCustomForms">
                                <div class="form-group">
                                    <div class="col-md-2 col-sm-3">
                                        <label class="control-label" for="Name">Name</label>
                                        <input class="form-control" id="txtCustomFormName" type="text"> 
                                    </div>
                                    <div class="pull-left pl-default pt-lg pr-default">
                                        <button class="btn btn-primary btn-sm" id="sectionSearch" type="submit" onclick="Patient_CustomForm.patientCustomFormSearch();">Search</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </section>

                    <div id="pnlPatCustomForms_Result" style="display: inline;">
                        <section class="panel">
                            <div class="panel-body">
                                <input type="hidden" id="CPTCode_SelectedDataKeys" />
                                <table class="table table-bordered table-striped table-condensed table-hover mb-none" id="dgvPatCustomForms">
                                    <thead>
                                        <tr>
                                            <th style="display:none;">Action</th>
                                            <th>Action</th>
                                            <th>Name</th>
                                            <th>Last Updated</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                                <div id="divPatCustomFormsPaging" class="col-sm-12 p-none mt-xs" style="display: inline;"></div>
                            </div>
                        </section>
                    </div>
                    <input type="hidden" id="hfSectionId" value="-1" />
                    <div id="CustomFormPrintPDF">
                        <input type="hidden" id="helperPDF" />
                        <iframe hidden id="Patient_Custom_PreviewDiv" src="Scripts/js/pdf/web/viewer.html" class="col-sm-12" style="height:1066px;"></iframe>
                    </div>
                </div>
            </div>
            <div class="modal-footer"></div>
        </div>
    </div>

    <div id="CustomeformprintparentdivPatient" class="hidden"></div>

</div>
