<div class="row" id="pnlPatientReferralsIncomingDetail">
    <div id="actionPanPatientReferralsIncomingDetail" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>
    <div class="modal-dialog modal-dialog-full">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" onclick="Patient_Referrals_Incoming_Detail.UnLoadTab();"><span class=" red">&nbsp;</span><span class="sr-only">Close</span></button>
                <h4 id="IncomingScreenTitle" class="modal-title">Add Incoming Referral</h4>
            </div>
            <div class="modal-body">
                <form method="post" onsubmit="return false;" id="frmPatientReferralsIncomingDetail">
                    <div class="col-sm-12" id="divIncomingReferralInfo">
                        <header class="panel-heading panel-blue">
                            <h2 class="panel-title white">Referral Information</h2>
                        </header>
                        <div class="panel-body">
                            <div class="col-sm-3 col-md-3 p-none hidden">
                                <div class="col-xs-6">
                                    <label class="control-label" for="Date">Date</label>
                                    <div class="input-group">
                                        <span class="input-group-addon"> <i class="fa fa-calendar"></i> </span>
                                        <input type="text" class="form-control" data-plugin-datepicker name="Date" id="dtDate">
                                    </div>
                                </div>
                                <div class="col-xs-6">
                                    <label class="control-label" for="">Time</label>
                                    <div class="input-group">
                                        <span class="input-group-addon"> <i class="fa fa-clock-o"></i> </span>
                                        <input type="text" data-plugin-timepicker class="form-control" data-plugin-options='{ "minuteStep": 5 }' id="tmTime" name="Time">
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 col-md-3 canDisable">
                                <label id="lblRefProvider" for="Ref Provider" class="control-label">Referral From<span class="required">*</span></label>
                                <!--<a id="lnkRefProviderEdit" style="display:none;" href="#" onclick="Patient_Referrals_Incoming_Detail.OpenRefProviderDetail();" title="Edit Ref Provider">Reffering Provider</a>-->
                                <div class="input-group">
                                    <input class="form-control" id="txtRefProvider" name="RefProvider" placeholder="Search Ref Provider" type="text" onblur="utility.ValidateAutoComplete(this, 'frmPatientReferralsIncomingDetail #hfRefProvider', false);">
                                    <div class="input-group-btn">
                                        <button id="lnkRefProvider" class="btn btn-primary btn-xs " type="button" onclick="Patient_Referrals_Incoming_Detail.OpenRefProvider();"><i class="glyphicon glyphicon-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 canDisable">
                                <label class="control-label" name="lblFacilityFrom">Facility From</label>
                                <div class="input-group">
                                    <input class="form-control" id="txtFacilityFrom" name="FacilityFromName" placeholder="Start typing to search" type="text" />
                                    <div class="input-group-btn">
                                        <button id="lnkFacilityFrom" class="btn btn-primary btn-xs " type="button" onclick="Patient_Referrals_Incoming_Detail.OpenFacilityFrom();"><i class="glyphicon glyphicon-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 col-md-3 canDisable">
                                <label class="control-label" for="Date" id="lblRefferingProvider">Referral To</label>
                                <div class="input-group">
                                    <input class="form-control " id="txtProvider" type="text" placeholder="Start typing to search" name="Provider" onblur="utility.ValidateAutoComplete(this, 'pnlPatientReferralsIncomingDetail #hfProvider', true);" maxlength="35" />
                                    <div class="input-group-btn">
                                        <button id="lnkProvider" class="btn btn-primary btn-xs " type="button" onclick="Patient_Referrals_Incoming_Detail.OpenProvider();"><i class="fa fa-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 canDisable">
                                <label class="control-label" name="lblFacilityTo">Facility To</label>
                                <div class="input-group">
                                    <input class="form-control" id="txtFacilityTo" name="FacilityToName" placeholder="Start typing to search" type="text" />
                                    <div class="input-group-btn">
                                        <button id="lnkFacilityTo" class="btn btn-primary btn-xs " type="button" onclick="Patient_Referrals_Incoming_Detail.OpenFacilityTo();"><i class="glyphicon glyphicon-search"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 canDisable">
                                <label for="" class="control-label canDisable">Reason</label>
                                <input id="txtReason" type="text" class="form-control" name="Reason" />
                            </div>
                            <div class="col-sm-3 canDisable">
                                <label class="control-label">Visit Type</label>
                                <select id="ddlVisits" name="Visits" class="form-control">
                                    <option value="">Select</option>
                                    <option value="1">Follow Up</option>
                                    <option value="2">New Patient</option>
                                    <option value="3">Physical</option>
                                    <option value="4">Surgical Clearance</option>
                                    <option value="5">Consult</option>
                                    <option value="6">Office Visit</option>
                                    <option value="7">Immunization</option>
                                    <option value="8">Injection</option>
                                    <option value="9">Bloodwork</option>
                                    <option value="10">Ultrasound</option>
                                    <option value="11">Procedure</option>
                                    <option value="12">Surgery</option>
                                    <option value="13">Infusion</option>
                                    <option value="14">Test</option>
                                </select>
                            </div>    
                            <div class="col-sm-3 canDisable">
                                <label class="control-label">Insurance Plan</label>
                                <select class="form-control" id="ddlInsurance" name="PatientInsurance"></select>
                            </div>
                            <div class="col-sm-3">
                                <label id="lblStatus" class="control-label" for="Status">Status<span class="required">*</span></label>                               
                                    <select id="ddlReferralStatus" name="Status" class="form-control" onchange="Patient_Referrals_Incoming_Detail.GetStatusReasons('pnlPatientReferralsIncomingDetail');">
                                        <option value="">Select</option>
                                        <option value="1">Not started</option>
                                        <option value="2">In progress</option>
                                        <option value="3">Completed</option>
                                    </select>                               
                            </div>
                            <div class="col-sm-4 col-md-2">
                                <label class="control-label">Reason</label>
                                <select id="ddlStatusReasons" name="StatusReasonsIds" multiple="multiple"  class="form-control" disabled>

                                </select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label" name="lblAssignee">Assignee</label>                           
                                    <input class="form-control" id="txtAssignee" name="Assignee" placeholder="Start typing to search" type="text" oninput="Patient_Referrals_Incoming_Detail.OpenAssignee()"  onblur="utility.ValidateAutoComplete(this, 'frmPatientReferralsIncomingDetail #hfAssignee', false)" />
                            </div>
                            <div class="col-sm-3">
                                <div class="dropdown" id="attachDiv">
                                    <a id="btnScanResult" href="#" class="dropdown-toggle btn btn-link btn-xs p-none" data-toggle="dropdown" role="button" aria-haspopup="true" aria-expanded="false">Attach</a>                                    
                                </div>
                                <div class="clearfix"></div>
                                <div class="dropdown" id="attachmentDiv">                                    
                                </div>                                
                                <div class="clearfix"></div>
                            </div>                         
                        </div>
                        
                    </div>
                        <input type="hidden" name="PatientId" id="hfPatientId" value="-1" />
                        <input type="hidden" name="ReferralId" id="hfReferralID" value="-1" />
                        <input type="hidden" id="hfRefProvider" name="RefProviderId" />
                        <input type="hidden" id="hfProvider" name="ProviderId" />
                        <input type="hidden" id="hfFacilityTo" name="FacilityTo" />
                        <input type="hidden" id="hfFacilityFrom" name="FacilityFrom" />
                        <input type="hidden" id="hfAssignee" name="AssigneeId" value="-1">

                    <div class="spacer15"></div>                   
                    <div id="comments">                        
                        <div id="" class="col-xs-12">
                            <label class="control-label">Comments</label>
                            <textarea id="txtComments" name="Comments" rows="3" class="form-control" spellcheck="true"></textarea>
                        </div>
                    </div>

<script type="text/javascript">
    $(function () {
        $('[data-plugin-toggle]').each(function () {
            var $this = $(this),
                opts = {};

            var pluginOptions = $this.data('plugin-options');
            if (pluginOptions)
                opts = pluginOptions;

            $this.themePluginToggle(opts);
        });
    });

    $(document).ready(function () {

        (function ($) {
            'use strict';
            $(function () {
                $('[data-plugin-ios-switch]').each(function () {
                    var $this = $(this);

                    $this.themePluginIOS7Switch();
                });
            });
        }).apply(this, [jQuery]);


    });
</script>
